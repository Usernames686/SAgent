<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="url(#bg3)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">extends 继承 — 父子原型链拼接</text>

  <!-- Parent class -->
  <rect x="40" y="70" width="320" height="140" rx="12" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.35"/>
  <text x="200" y="93" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle" font-family="monospace">class Animal</text>
  <line x1="60" y1="105" x2="340" y2="105" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="60" y="125" font-size="10" fill="#94a3b8" font-family="monospace">constructor(name) { this.name = name; }</text>
  <text x="60" y="145" font-size="10" fill="#94a3b8" font-family="monospace">speak() { return `${this.name}叫`; }</text>
  <text x="60" y="165" font-size="10" fill="#94a3b8" font-family="monospace">eat() { return `${this.name}吃饭`; }</text>
  <text x="60" y="190" font-size="9.5" fill="#64748b">Animal.prototype: { speak, eat }</text>

  <!-- Child class -->
  <rect x="400" y="70" width="320" height="140" rx="12" fill="#60a5fa" fill-opacity="0.06" stroke="#60a5fa" stroke-opacity="0.35"/>
  <text x="560" y="93" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle" font-family="monospace">class Dog extends Animal</text>
  <line x1="420" y1="105" x2="700" y2="105" stroke="#60a5fa" stroke-opacity="0.2"/>
  <text x="420" y="125" font-size="10" fill="#94a3b8" font-family="monospace">constructor(name) { super(name); }</text>
  <text x="420" y="145" font-size="10" fill="#94a3b8" font-family="monospace">speak() { return super.speak()+"汪"; }</text>
  <text x="420" y="165" font-size="10" fill="#94a3b8" font-family="monospace">fetch() { return `${this.name}捡球`; }</text>
  <text x="420" y="190" font-size="9.5" fill="#64748b">Dog.prototype: { speak(重写), fetch(新增) }</text>

  <!-- extends arrow -->
  <line x1="400" y1="140" x2="362" y2="140" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arr3)"/>
  <text x="381" y="133" font-size="9" fill="#a78bfa" text-anchor="middle">extends</text>

  <!-- __proto__ link -->
  <path d="M 560 210 Q 560 240 480 240 Q 380 240 380 270" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arr3)"/>
  <text x="500" y="232" font-size="9" fill="#fbbf24">Dog.prototype.__proto__ → Animal.prototype</text>

  <!-- Key points -->
  <rect x="40" y="270" width="680" height="120" rx="10" fill="#a78bfa" fill-opacity="0.04" stroke="#a78bfa" stroke-opacity="0.2"/>
  <text x="60" y="293" font-size="11" font-weight="600" fill="#c4b5fd">🔑 extends 做了三件事：</text>
  <text x="60" y="313" font-size="10" fill="#94a3b8">① Dog.prototype.__proto__ → Animal.prototype（原型链拼接）</text>
  <text x="60" y="333" font-size="10" fill="#94a3b8">② 子类 constructor 必须先调 super()，否则 this 不可用</text>
  <text x="60" y="353" font-size="10" fill="#94a3b8">③ super.method() 调用父类同名方法，实现"重写+扩展"</text>
  <text x="60" y="378" font-size="10" fill="#6ee7b7">✅ dog instanceof Dog === true，dog instanceof Animal === true</text>
</svg>
