<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">作用域链 · 变量查找规则</text><text x="40" y="64" font-size="13" font-weight="600" fill="#3b82f6">① 查找规则：由内向外逐层搜索</text><rect x="30" y="74" width="720" height="200" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25"/><rect x="50" y="90" width="680" height="30" rx="4" fill="#ef4444" fill-opacity="0.08"/><text x="62" y="109" font-size="9" fill="#ef4444">全局: const name = "global"</text><rect x="80" y="128" width="630" height="30" rx="4" fill="#3b82f6" fill-opacity="0.08"/><text x="92" y="147" font-size="9" fill="#3b82f6">函数outer: const name = "outer"</text><rect x="110" y="166" width="580" height="30" rx="4" fill="#22c55e" fill-opacity="0.08"/><text x="122" y="185" font-size="9" fill="#22c55e">函数inner: const name = "inner"</text><text x="50" y="218" font-size="10" fill="#22c55e" font-family="monospace">inner中访问name → 找到"inner" ✅</text><text x="50" y="238" font-size="10" fill="#3b82f6" font-family="monospace">inner中访问age → 去outer找 ✅</text><text x="50" y="258" font-size="10" fill="#ef4444" font-family="monospace">inner中访问global → 去全局找 ✅</text><text x="40" y="296" font-size="13" font-weight="600" fill="#22c55e">② 规则总结</text><rect x="30" y="306" width="720" height="80" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2"/><text x="50" y="328" font-size="10" fill="#22c55e">1. 先在当前作用域找</text><text x="50" y="348" font-size="10" fill="#22c55e">2. 找不到就去外层作用域找</text><text x="50" y="368" font-size="10" fill="#22c55e">3. 一直找到全局作用域，还找不到 → ReferenceError</text><text x="40" y="410" font-size="13" font-weight="600" fill="#a855f7">③ 关键：内层可访问外层，外层不能访问内层</text><rect x="30" y="420" width="350" height="60" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2"/><text x="50" y="442" font-size="10" fill="#22c55e" font-weight="600">✅ 内层访问外层</text><text x="50" y="462" font-size="9" fill="#94a3b8" font-family="monospace">inner可以读outer和global</text><rect x="400" y="420" width="350" height="60" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2"/><text x="420" y="442" font-size="10" fill="#ef4444" font-weight="600">❌ 外层访问内层</text><text x="420" y="462" font-size="9" fill="#94a3b8" font-family="monospace">outer不能读inner的变量</text><text x="40" y="508" font-size="13" font-weight="600" fill="#eab308">④ 词法作用域（静态）</text><rect x="30" y="518" width="720" height="44" rx="8" fill="#eab308" fill-opacity="0.04" stroke="#eab308" stroke-opacity="0.2"/><text x="50" y="540" font-size="10" fill="#eab308">作用域在代码编写时就确定了，不是运行时决定。函数定义在哪，就记住哪的作用域。</text></svg>
