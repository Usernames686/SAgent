<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="780" height="400" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">算术运算符一览</text>

  <!-- 6个运算符卡片 -->
  <rect x="30" y="52" width="110" height="80" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="85" y="80" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">+</text>
  <text x="85" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">加法</text>
  <text x="85" y="118" font-size="10" fill="#64748b" text-anchor="middle">1 + 2 → 3</text>

  <rect x="155" y="52" width="110" height="80" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="210" y="80" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">−</text>
  <text x="210" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">减法</text>
  <text x="210" y="118" font-size="10" fill="#64748b" text-anchor="middle">5 - 2 → 3</text>

  <rect x="280" y="52" width="110" height="80" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="335" y="80" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">×</text>
  <text x="335" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">乘法</text>
  <text x="335" y="118" font-size="10" fill="#64748b" text-anchor="middle">3 * 4 → 12</text>

  <rect x="405" y="52" width="110" height="80" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="460" y="80" font-size="28" font-weight="700" fill="#3b82f6" text-anchor="middle">÷</text>
  <text x="460" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">除法</text>
  <text x="460" y="118" font-size="10" fill="#64748b" text-anchor="middle">10 / 3 → 3.33</text>

  <rect x="530" y="52" width="110" height="80" rx="8" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="585" y="80" font-size="28" font-weight="700" fill="#f59e0b" text-anchor="middle">%</text>
  <text x="585" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">取余</text>
  <text x="585" y="118" font-size="10" fill="#64748b" text-anchor="middle">10 % 3 → 1</text>

  <rect x="655" y="52" width="95" height="80" rx="8" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="702" y="80" font-size="28" font-weight="700" fill="#f59e0b" text-anchor="middle">**</text>
  <text x="702" y="100" font-size="11" fill="#94a3b8" text-anchor="middle">幂</text>
  <text x="702" y="118" font-size="10" fill="#64748b" text-anchor="middle">2**10 → 1024</text>

  <!-- + 的双义性 -->
  <text x="390" y="168" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">⚠️ + 的双义性：加法 vs 拼接</text>

  <!-- 流程图 -->
  <rect x="60" y="190" width="160" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="140" y="212" font-size="11" fill="#94a3b8" text-anchor="middle">+ 遇到两个数字</text>
  <text x="140" y="228" font-size="11" fill="#3b82f6" text-anchor="middle">→ 做加法</text>

  <line x1="220" y1="215" x2="280" y2="215" stroke="#334155" stroke-width="1" marker-end="url(#arrow)"/>
  <polygon points="278,212 284,215 278,218" fill="#334155"/>

  <rect x="280" y="190" width="200" height="50" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="380" y="212" font-size="11" fill="#94a3b8" text-anchor="middle">+ 遇到字符串（任一操作数）</text>
  <text x="380" y="228" font-size="11" fill="#ef4444" text-anchor="middle">→ 做拼接！⚠️</text>

  <line x1="480" y1="215" x2="540" y2="215" stroke="#334155" stroke-width="1"/>
  <polygon points="538,212 544,215 538,218" fill="#334155"/>

  <rect x="540" y="190" width="200" height="50" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="640" y="212" font-size="11" fill="#94a3b8" text-anchor="middle">显式转换: Number() / +</text>
  <text x="640" y="228" font-size="11" fill="#22c55e" text-anchor="middle">→ 安全做加法 ✅</text>

  <!-- 示例 -->
  <rect x="40" y="262" width="700" height="120" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="60" y="286" font-size="11" fill="#64748b">// 数字 + 数字 = 加法</text>
  <text x="60" y="304" font-size="11" fill="#3b82f6">1 + 2</text>
  <text x="120" y="304" font-size="11" fill="#94a3b8">→ 3</text>
  <text x="60" y="324" font-size="11" fill="#64748b">// 数字 + 字符串 = 拼接 ⚠️</text>
  <text x="60" y="342" font-size="11" fill="#ef4444">1 + "2"</text>
  <text x="130" y="342" font-size="11" fill="#94a3b8">→ "12"</text>
  <text x="60" y="362" font-size="11" fill="#64748b">// 显式转换 → 安全 ✅</text>
  <text x="60" y="378" font-size="11" fill="#22c55e">Number("2") + 1</text>
  <text x="210" y="378" font-size="11" fill="#94a3b8">→ 3</text>

  <text x="420" y="286" font-size="11" fill="#64748b">// 从左到右计算</text>
  <text x="420" y="304" font-size="11" fill="#f59e0b">1 + 2 + "3"</text>
  <text x="530" y="304" font-size="11" fill="#94a3b8">→ "33"（先1+2=3，再拼"3"）</text>
  <text x="420" y="324" font-size="11" fill="#f59e0b">"1" + 2 + 3</text>
  <text x="530" y="324" font-size="11" fill="#94a3b8">→ "123"（全是拼接）</text>
  <text x="420" y="344" font-size="11" fill="#64748b">// % 取余妙用</text>
  <text x="420" y="362" font-size="11" fill="#f59e0b">n % 2 === 0</text>
  <text x="530" y="362" font-size="11" fill="#94a3b8">→ 判断奇偶</text>
  <text x="420" y="378" font-size="11" fill="#f59e0b">arr[i % arr.length]</text>
  <text x="570" y="378" font-size="11" fill="#94a3b8">→ 循环索引</text>
</svg>
