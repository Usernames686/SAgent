<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">闭包实战 · 数据私有化</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#ec4899">🔒 用闭包实现私有变量</text>
<rect x="30" y="76" width="720" height="220" rx="8" fill="#ec4899" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.2"/>
<text x="50" y="96" font-size="10" fill="#3b82f6" font-family="monospace">function createWallet(initial = 0) {</text>
<text x="70" y="116" font-size="10" fill="#ec4899" font-family="monospace">let balance = initial;  // 私有变量！外部无法直接访问</text>
<text x="70" y="136" font-size="10" fill="#94a3b8" font-family="monospace">return {</text>
<text x="90" y="156" font-size="10" fill="#22c55e" font-family="monospace">deposit(amount) { balance += amount; return balance; },</text>
<text x="90" y="176" font-size="10" fill="#22c55e" font-family="monospace">withdraw(amount) {</text>
<text x="110" y="196" font-size="10" fill="#f97316" font-family="monospace">if (amount > balance) throw new Error("余额不足");</text>
<text x="110" y="216" font-size="10" fill="#22c55e" font-family="monospace">balance -= amount; return balance;</text>
<text x="90" y="236" font-size="10" fill="#22c55e" font-family="monospace">},</text>
<text x="90" y="256" font-size="10" fill="#22c55e" font-family="monospace">getBalance() { return balance; }</text>
<text x="70" y="276" font-size="10" fill="#94a3b8" font-family="monospace">};</text>
<text x="50" y="296" font-size="10" fill="#3b82f6" font-family="monospace">}</text>
<text x="40" y="316" font-size="13" font-weight="600" fill="#22c55e">✅ 使用效果</text>
<rect x="30" y="328" width="350" height="110" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.15"/>
<text x="50" y="352" font-size="10" fill="#94a3b8" font-family="monospace">const w = createWallet(100);</text>
<text x="50" y="372" font-size="10" fill="#22c55e" font-family="monospace">w.deposit(50);      // 150</text>
<text x="50" y="392" font-size="10" fill="#22c55e" font-family="monospace">w.withdraw(30);     // 120</text>
<text x="50" y="412" font-size="10" fill="#22c55e" font-family="monospace">w.getBalance();     // 120</text>
<text x="50" y="432" font-size="10" fill="#22c55e" font-family="monospace">w.withdraw(200);    // ❌ Error!</text>
<rect x="400" y="328" width="350" height="110" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.15"/>
<text x="420" y="352" font-size="10" font-weight="600" fill="#ef4444">❌ 无法直接修改</text>
<text x="420" y="376" font-size="10" fill="#ef4444" font-family="monospace">w.balance = 0;  // 无效！</text>
<text x="420" y="396" font-size="10" fill="#94a3b8">balance 不是属性，是闭包变量</text>
<text x="420" y="416" font-size="10" fill="#94a3b8">只能通过暴露的方法操作</text>
<text x="420" y="436" font-size="10" fill="#ec4899">这就是数据私有化的威力</text>
<rect x="30" y="456" width="720" height="100" rx="8" fill="#0f172a" stroke="#1e293b"/>
<text x="50" y="480" font-size="11" font-weight="600" fill="#ec4899">💡 核心价值</text>
<text x="50" y="504" font-size="10" fill="#94a3b8">• 外部只能通过暴露的方法操作数据，不能直接修改</text>
<text x="50" y="524" font-size="10" fill="#94a3b8">• 比class的#私有字段更灵活，是模块模式的基石</text>
<text x="50" y="544" font-size="10" fill="#22c55e">• React的useState就是用闭包实现数据私有化</text>
</svg>