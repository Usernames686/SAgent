<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
<rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">作用域链 · 总结速查表</text>
<rect x="30" y="56" width="720" height="200" rx="8" fill="#0f172a" stroke="#1e293b"/>
<text x="50" y="80" font-size="12" font-weight="600" fill="#3b82f6">三种作用域对比</text>
<rect x="40" y="90" width="230" height="28" fill="#ef4444" fill-opacity="0.1"/><text x="155" y="108" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">全局作用域</text>
<rect x="275" y="90" width="230" height="28" fill="#3b82f6" fill-opacity="0.1"/><text x="390" y="108" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">函数作用域</text>
<rect x="510" y="90" width="230" height="28" fill="#22c55e" fill-opacity="0.1"/><text x="625" y="108" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">块级作用域</text>
<text x="50" y="134" font-size="9" fill="#94a3b8">声明位置：最外层</text>
<text x="285" y="134" font-size="9" fill="#94a3b8">声明位置：function内</text>
<text x="520" y="134" font-size="9" fill="#94a3b8">声明位置：{}内</text>
<text x="50" y="154" font-size="9" fill="#94a3b8">var/let/const均可</text>
<text x="285" y="154" font-size="9" fill="#94a3b8">var/let/const均可</text>
<text x="520" y="154" font-size="9" fill="#94a3b8">仅let/const有效</text>
<text x="50" y="174" font-size="9" fill="#ef4444">⚠️ 尽量少用</text>
<text x="285" y="174" font-size="9" fill="#3b82f6">var的范围</text>
<text x="520" y="174" font-size="9" fill="#22c55e">✅ ES6推荐</text>
<text x="50" y="194" font-size="9" fill="#94a3b8">到处可访问</text>
<text x="285" y="194" font-size="9" fill="#94a3b8">函数内可访问</text>
<text x="520" y="194" font-size="9" fill="#94a3b8">块内可访问</text>
<text x="40" y="230" font-size="9" fill="#ef4444">var挂到window</text>
<text x="285" y="230" font-size="9" fill="#ef4444">var泄漏到整个函数</text>
<text x="520" y="230" font-size="9" fill="#22c55e">用完即销毁</text>
<text x="40" y="268" font-size="12" font-weight="600" fill="#a855f7">作用域链查找规则</text>
<rect x="30" y="280" width="720" height="60" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.15"/>
<text x="50" y="304" font-size="10" fill="#a855f7">当前作用域 → 外层作用域 → ... → 全局作用域 → ReferenceError</text>
<text x="50" y="324" font-size="9" fill="#94a3b8">内层可访问外层，外层不能访问内层。找到就停，继续往外找。</text>
<text x="40" y="364" font-size="12" font-weight="600" fill="#f97316">6条核心要点</text>
<rect x="30" y="376" width="720" height="180" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
<text x="50" y="400" font-size="10" fill="#3b82f6" font-weight="600">1.</text><text x="70" y="400" font-size="10" fill="#94a3b8">三种作用域：全局 / 函数 / 块级（let/const）</text>
<text x="50" y="422" font-size="10" fill="#3b82f6" font-weight="600">2.</text><text x="70" y="422" font-size="10" fill="#94a3b8">作用域链：内层可访问外层，外层不能访问内层</text>
<text x="50" y="444" font-size="10" fill="#3b82f6" font-weight="600">3.</text><text x="70" y="444" font-size="10" fill="#94a3b8">查找规则：当前 → 外层 → ... → 全局 → ReferenceError</text>
<text x="50" y="466" font-size="10" fill="#3b82f6" font-weight="600">4.</text><text x="70" y="466" font-size="10" fill="#94a3b8">词法作用域：编写时确定，非运行时</text>
<text x="50" y="488" font-size="10" fill="#3b82f6" font-weight="600">5.</text><text x="70" y="488" font-size="10" fill="#ef4444">var 只有函数作用域，let/const 有块级作用域</text>
<text x="50" y="510" font-size="10" fill="#3b82f6" font-weight="600">6.</text><text x="70" y="510" font-size="10" fill="#22c55e">块级作用域是 ES6 最重要的安全改进</text>
<text x="50" y="540" font-size="10" fill="#f97316" font-weight="600">口诀：const优先/let次之/永不用var</text>
</svg>