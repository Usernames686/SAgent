<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">查找判断 · find / some / every / sort 陷阱</text>

  <!-- find vs filter -->
  <text x="40" y="64" font-size="13" font-weight="600" fill="#06b6d4">① find vs filter[0] — 找第一个</text>
  <rect x="30" y="74" width="350" height="130" rx="8" fill="#06b6d4" fill-opacity="0.04" stroke="#06b6d4" stroke-opacity="0.25"/>
  <text x="50" y="96" font-size="10" font-weight="600" fill="#ef4444">❌ filter[0] — 遍历全部再取第一个</text>
  <text x="50" y="116" font-size="9" fill="#94a3b8" font-family="monospace">arr.filter(x =&gt; x.id === 3)[0]</text>
  <text x="50" y="136" font-size="9" fill="#ef4444">即使第1个就匹配，也遍历完整个数组</text>
  <text x="50" y="160" font-size="10" font-weight="600" fill="#22c55e">✅ find — 找到就停</text>
  <text x="50" y="180" font-size="9" fill="#94a3b8" font-family="monospace">arr.find(x =&gt; x.id === 3)</text>
  <text x="50" y="196" font-size="9" fill="#22c55e">找到立即返回，不继续遍历 — 更高效</text>

  <!-- some vs every -->
  <text x="400" y="64" font-size="13" font-weight="600" fill="#a855f7">② some vs every — 存在 vs 全部</text>
  <rect x="400" y="74" width="350" height="130" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="420" y="96" font-size="11" font-weight="600" fill="#a855f7">some — 至少一个满足</text>
  <text x="420" y="116" font-size="9" fill="#94a3b8" font-family="monospace">[1,2,3].some(n =&gt; n &gt; 2)  // true</text>
  <text x="420" y="136" font-size="9" fill="#94a3b8" font-family="monospace">[1,2,3].some(n =&gt; n &gt; 5)  // false</text>
  <text x="420" y="160" font-size="11" font-weight="600" fill="#a855f7">every — 全部满足</text>
  <text x="420" y="180" font-size="9" fill="#94a3b8" font-family="monospace">[1,2,3].every(n =&gt; n &gt; 0)  // true</text>
  <text x="420" y="196" font-size="9" fill="#94a3b8" font-family="monospace">[1,2,3].every(n =&gt; n &gt; 1)  // false</text>

  <!-- sort 陷阱（重点！） -->
  <text x="40" y="228" font-size="13" font-weight="600" fill="#ef4444">③ sort() 默认字符串排序 — 面试必考陷阱！</text>

  <rect x="30" y="240" width="350" height="180" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.3"/>
  <text x="50" y="262" font-size="11" font-weight="600" fill="#ef4444">❌ 不传比较函数 — 按字符串排序</text>
  <rect x="50" y="274" width="310" height="70" rx="4" fill="#0f172a"/>
  <text x="62" y="292" font-size="9" fill="#94a3b8" font-family="monospace">[10, 1, 21, 2].sort()</text>
  <text x="62" y="310" font-size="9" fill="#ef4444" font-family="monospace">// [1, 10, 2, 21]  ← 错了！</text>
  <text x="62" y="328" font-size="9" fill="#94a3b8">"10" &lt; "2" 因为 "1" &lt; "2"（按字符比较）</text>
  <text x="62" y="346" font-size="9" fill="#ef4444">⚠️ 修改原数组！sort 是可变操作</text>

  <rect x="400" y="240" width="350" height="180" rx="8" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="420" y="262" font-size="11" font-weight="600" fill="#22c55e">✅ 传比较函数 — 正确排序</text>
  <rect x="420" y="274" width="310" height="70" rx="4" fill="#0f172a"/>
  <text x="432" y="292" font-size="9" fill="#94a3b8" font-family="monospace">[10, 1, 21, 2].sort((a, b) =&gt; a - b)</text>
  <text x="432" y="310" font-size="9" fill="#22c55e" font-family="monospace">// [1, 2, 10, 21]  ← 正确！</text>
  <text x="432" y="328" font-size="9" fill="#94a3b8">a - b &lt; 0 → a 排前面（升序）</text>
  <text x="432" y="346" font-size="9" fill="#94a3b8">b - a &lt; 0 → b 排前面（降序）</text>

  <!-- sort 更多 -->
  <text x="40" y="440" font-size="13" font-weight="600" fill="#eab308">④ sort 比较函数速查</text>
  <rect x="30" y="452" width="720" height="108" rx="8" fill="#0f172a" stroke="#1e293b"/>
  <text x="50" y="474" font-size="10" fill="#22c55e" font-family="monospace">arr.sort((a, b) =&gt; a - b)         // 升序 ✅</text>
  <text x="50" y="494" font-size="10" fill="#22c55e" font-family="monospace">arr.sort((a, b) =&gt; b - a)         // 降序 ✅</text>
  <text x="50" y="514" font-size="10" fill="#22c55e" font-family="monospace">arr.sort((a, b) =&gt; a.localeCompare(b))  // 字符串升序 ✅</text>
  <text x="50" y="534" font-size="10" fill="#eab308">⚠️ sort 修改原数组！要不可变排序：[...arr].sort(compareFn)</text>
  <text x="50" y="550" font-size="10" fill="#94a3b8">💡 toSorted()（ES2023）返回新数组，不改原数组</text>
</svg>
