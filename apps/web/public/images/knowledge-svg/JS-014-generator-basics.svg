<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient></defs>
  <rect width="760" height="420" fill="url(#bg)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">Generator — 暂停与恢复的魔法</text>
  <rect x="30" y="60" width="700" height="280" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="50" y="85" font-size="11" font-family="monospace" fill="#fbbf24">function* counter() {</text>
  <text x="70" y="105" font-size="10" font-family="monospace" fill="#6ee7b7">let i = 0;</text>
  <text x="70" y="123" font-size="10" font-family="monospace" fill="#fbbf24">while (true) {</text>
  <text x="90" y="143" font-size="10" font-family="monospace" fill="#f87171">yield i;  // 暂停并返回 i</text>
  <text x="90" y="161" font-size="10" font-family="monospace" fill="#6ee7b7">i++;</text>
  <text x="70" y="181" font-size="10" font-family="monospace" fill="#fbbf24">}</text>
  <text x="50" y="201" font-size="10" font-family="monospace" fill="#fbbf24">}</text>
  <text x="50" y="240" font-size="10" font-family="monospace" fill="#fbbf24">const gen = counter();</text>
  <text x="50" y="258" font-size="10" font-family="monospace" fill="#fbbf24">gen.next(); // { value: 0, done: false }</text>
  <text x="50" y="276" font-size="10" font-family="monospace" fill="#fbbf24">gen.next(); // { value: 1, done: false }</text>
  <text x="50" y="294" font-size="10" font-family="monospace" fill="#fbbf24">gen.next(); // { value: 2, done: false }</text>
  <text x="50" y="325" font-size="10" font-family="monospace" fill="#6ee7b7">// 无限序列 — 永不停止</text>
  <text x="40" y="365" font-size="10" fill="#a78bfa">💡 function* 声明生成器；yield 暂停并产出值；.next() 恢复执行。</text>
  <text x="40" y="385" font-size="10" fill="#f87171">⚠️ 生成器是惰性的 — 不调用 .next() 就不会执行。</text>
</svg>
