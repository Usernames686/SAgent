<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="760" height="420" fill="url(#bg5)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#f87171" text-anchor="middle">async/await 错误处理模式</text>

  <!-- try/catch -->
  <rect x="40" y="60" width="350" height="170" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="60" y="85" font-size="12" font-weight="700" fill="#6ee7b7">① try/catch — 推荐方式</text>
  <text x="60" y="110" font-size="9.5" fill="#94a3b8" font-family="monospace">try {</text>
  <text x="75" y="125" font-size="9.5" fill="#94a3b8" font-family="monospace">const r = await api();</text>
  <text x="60" y="140" font-size="9.5" fill="#94a3b8" font-family="monospace">} catch (e) {</text>
  <text x="75" y="155" font-size="9.5" fill="#94a3b8" font-family="monospace">console.error(e);</text>
  <text x="60" y="170" font-size="9.5" fill="#94a3b8" font-family="monospace">}</text>
  <text x="60" y="195" font-size="9.5" fill="#6ee7b7">✅ 同步代码的错误处理风格</text>
  <text x="60" y="212" font-size="9.5" fill="#6ee7b7">✅ 可以捕获 await 抛出的异常</text>

  <!-- .catch -->
  <rect x="410" y="60" width="310" height="170" rx="10" fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="430" y="85" font-size="12" font-weight="700" fill="#fcd34d">② .catch() — Promise 风格</text>
  <text x="430" y="110" font-size="9.5" fill="#94a3b8" font-family="monospace">await api()</text>
  <text x="445" y="125" font-size="9.5" fill="#94a3b8" font-family="monospace">.catch(e =&gt; null);</text>
  <text x="430" y="150" font-size="9.5" fill="#94a3b8" font-family="monospace">// 给默认值</text>
  <text x="430" y="170" font-size="9.5" fill="#94a3b8" font-family="monospace">const r = await api()</text>
  <text x="445" y="185" font-size="9.5" fill="#94a3b8" font-family="monospace">.catch(() =&gt; []);</text>
  <text x="430" y="210" font-size="9.5" fill="#fcd34d">✅ 简洁，适合"失败给默认值"</text>

  <!-- pattern -->
  <rect x="40" y="250" width="680" height="150" rx="10" fill="#60a5fa" fill-opacity="0.06" stroke="#60a5fa" stroke-opacity="0.3"/>
  <text x="60" y="275" font-size="12" font-weight="700" fill="#93c5fd">③ 实战：重试 + 兜底</text>
  <text x="60" y="300" font-size="9.5" fill="#94a3b8" font-family="monospace">async function fetchSafe(url, retries = 3) {</text>
  <text x="75" y="315" font-size="9.5" fill="#94a3b8" font-family="monospace">for (let i = 0; i &lt; retries; i++) {</text>
  <text x="90" y="330" font-size="9.5" fill="#94a3b8" font-family="monospace">try { return await fetch(url); }</text>
  <text x="90" y="345" font-size="9.5" fill="#94a3b8" font-family="monospace">catch (e) { if (i === retries - 1) throw e; }</text>
  <text x="75" y="360" font-size="9.5" fill="#94a3b8" font-family="monospace">}</text>
  <text x="60" y="385" font-size="9.5" fill="#6ee7b7">✅ 自动重试 3 次，仍失败则抛出</text>
</svg>
