<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="780" height="360" fill="url(#bg)" rx="12"/>

  <!-- 标题 -->
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">var / let / const 三种变量声明对比</text>

  <!-- 表头 -->
  <rect x="40" y="52" width="130" height="34" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="105" y="74" font-size="12" font-weight="600" fill="#94a3b8" text-anchor="middle">特性</text>

  <rect x="180" y="52" width="170" height="34" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="265" y="74" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">❌ var</text>

  <rect x="360" y="52" width="170" height="34" rx="6" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="445" y="74" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">✅ let</text>

  <rect x="540" y="52" width="200" height="34" rx="6" fill="#a855f7" fill-opacity="0.08" stroke="#a855f7" stroke-opacity="0.25" stroke-width="0.8"/>
  <text x="640" y="74" font-size="12" font-weight="600" fill="#a855f7" text-anchor="middle">🏆 const</text>

  <!-- 行1: 作用域 -->
  <rect x="40" y="94" width="130" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="105" y="116" font-size="11" fill="#94a3b8" text-anchor="middle">作用域</text>
  <rect x="180" y="94" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="265" y="116" font-size="11" fill="#ef4444" text-anchor="middle">函数级</text>
  <rect x="360" y="94" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="445" y="116" font-size="11" fill="#3b82f6" text-anchor="middle">块级 { }</text>
  <rect x="540" y="94" width="200" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="640" y="116" font-size="11" fill="#a855f7" text-anchor="middle">块级 { }</text>

  <!-- 行2: 变量提升 -->
  <rect x="40" y="136" width="130" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="105" y="158" font-size="11" fill="#94a3b8" text-anchor="middle">变量提升</text>
  <rect x="180" y="136" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="265" y="158" font-size="11" fill="#22c55e" text-anchor="middle">✅ 是（有坑！）</text>
  <rect x="360" y="136" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="445" y="158" font-size="11" fill="#ef4444" text-anchor="middle">❌ 否（TDZ保护）</text>
  <rect x="540" y="136" width="200" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="640" y="158" font-size="11" fill="#ef4444" text-anchor="middle">❌ 否（TDZ保护）</text>

  <!-- 行3: 重复声明 -->
  <rect x="40" y="178" width="130" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="105" y="200" font-size="11" fill="#94a3b8" text-anchor="middle">重复声明</text>
  <rect x="180" y="178" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="265" y="200" font-size="11" fill="#22c55e" text-anchor="middle">✅ 允许（隐患！）</text>
  <rect x="360" y="178" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="445" y="200" font-size="11" fill="#ef4444" text-anchor="middle">❌ 报错</text>
  <rect x="540" y="178" width="200" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="640" y="200" font-size="11" fill="#ef4444" text-anchor="middle">❌ 报错</text>

  <!-- 行4: 重新赋值 -->
  <rect x="40" y="220" width="130" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="105" y="242" font-size="11" fill="#94a3b8" text-anchor="middle">重新赋值</text>
  <rect x="180" y="220" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="265" y="242" font-size="11" fill="#22c55e" text-anchor="middle">✅ 可以</text>
  <rect x="360" y="220" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="445" y="242" font-size="11" fill="#22c55e" text-anchor="middle">✅ 可以</text>
  <rect x="540" y="220" width="200" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="640" y="242" font-size="11" fill="#ef4444" text-anchor="middle">❌ 不可以</text>

  <!-- 行5: 推荐度 -->
  <rect x="40" y="262" width="130" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="105" y="284" font-size="11" fill="#94a3b8" text-anchor="middle">推荐度</text>
  <rect x="180" y="262" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="265" y="284" font-size="11" fill="#ef4444" text-anchor="middle">🚫 禁用</text>
  <rect x="360" y="262" width="170" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="445" y="284" font-size="11" fill="#3b82f6" text-anchor="middle">👍 需要变时用</text>
  <rect x="540" y="262" width="200" height="36" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
  <text x="640" y="284" font-size="11" fill="#a855f7" text-anchor="middle">🏆 默认首选</text>

  <!-- 底部总结 -->
  <rect x="40" y="310" width="700" height="36" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="390" y="332" font-size="12" font-weight="600" fill="#f97316" text-anchor="middle">💡 记忆口诀：const 优先，let 备选，var 不见</text>
</svg>