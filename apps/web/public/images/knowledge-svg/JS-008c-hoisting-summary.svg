<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">变量提升与TDZ · 总结速查表</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#f97316">📋 提升行为速查</text>
<rect x="30" y="76" width="720" height="180" rx="8" fill="#0f172a" stroke="#1e293b"/>
<rect x="40" y="86" width="180" height="28" fill="#f97316" fill-opacity="0.12"/>
<text x="130" y="104" font-size="10" font-weight="600" fill="#f97316" text-anchor="middle">声明方式</text>
<rect x="220" y="86" width="160" height="28" fill="#ef4444" fill-opacity="0.1"/>
<text x="300" y="104" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">var</text>
<rect x="380" y="86" width="160" height="28" fill="#3b82f6" fill-opacity="0.1"/>
<text x="460" y="104" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">let</text>
<rect x="540" y="86" width="200" height="28" fill="#a855f7" fill-opacity="0.1"/>
<text x="640" y="104" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">const</text>
<text x="50" y="132" font-size="9" fill="#94a3b8">提升行为</text>
<text x="300" y="132" font-size="9" fill="#ef4444" text-anchor="middle">提升+初始化undefined</text>
<text x="460" y="132" font-size="9" fill="#3b82f6" text-anchor="middle">提升+TDZ</text>
<text x="640" y="132" font-size="9" fill="#a855f7" text-anchor="middle">提升+TDZ</text>
<text x="50" y="154" font-size="9" fill="#94a3b8">声明前访问</text>
<text x="300" y="154" font-size="9" fill="#ef4444" text-anchor="middle">undefined(不报错)</text>
<text x="460" y="154" font-size="9" fill="#ef4444" text-anchor="middle">ReferenceError</text>
<text x="640" y="154" font-size="9" fill="#ef4444" text-anchor="middle">ReferenceError</text>
<text x="50" y="176" font-size="9" fill="#94a3b8">安全性</text>
<text x="300" y="176" font-size="9" fill="#ef4444" text-anchor="middle">🚫 不安全</text>
<text x="460" y="176" font-size="9" fill="#22c55e" text-anchor="middle">✅ TDZ保护</text>
<text x="640" y="176" font-size="9" fill="#22c55e" text-anchor="middle">✅ TDZ保护</text>
<text x="50" y="198" font-size="9" fill="#94a3b8">推荐</text>
<text x="300" y="198" font-size="9" fill="#ef4444" text-anchor="middle">🚫 永远不用</text>
<text x="460" y="198" font-size="9" fill="#22c55e" text-anchor="middle">✅ 需要时用</text>
<text x="640" y="198" font-size="9" fill="#22c55e" text-anchor="middle">🏆 默认首选</text>
<text x="40" y="280" font-size="13" font-weight="600" fill="#ec4899">7条核心要点</text>
<rect x="30" y="292" width="720" height="260" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
<text x="50" y="316" font-size="10" fill="#f97316" font-weight="600">1.</text><text x="70" y="316" font-size="10" fill="#94a3b8">var提升：声明提前，值为undefined</text>
<text x="50" y="340" font-size="10" fill="#f97316" font-weight="600">2.</text><text x="70" y="340" font-size="10" fill="#94a3b8">function提升：整个函数定义提前</text>
<text x="50" y="364" font-size="10" fill="#f97316" font-weight="600">3.</text><text x="70" y="364" font-size="10" fill="#94a3b8">let/const也会提升，但有TDZ保护</text>
<text x="50" y="388" font-size="10" fill="#f97316" font-weight="600">4.</text><text x="70" y="388" font-size="10" fill="#94a3b8">TDZ：声明前访问报ReferenceError</text>
<text x="50" y="412" font-size="10" fill="#f97316" font-weight="600">5.</text><text x="70" y="412" font-size="10" fill="#94a3b8">函数表达式只提升var，不提升函数体</text>
<text x="50" y="436" font-size="10" fill="#f97316" font-weight="600">6.</text><text x="70" y="436" font-size="10" fill="#ef4444">永远用let/const代替var，避免提升陷阱</text>
<text x="50" y="460" font-size="10" fill="#f97316" font-weight="600">7.</text><text x="70" y="460" font-size="10" fill="#22c55e">先声明再使用，代码更安全</text>
<rect x="50" y="488" width="680" height="44" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.2"/>
<text x="390" y="514" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">💡 口诀：都提升，var给undefined，let/const给TDZ，先声明再使用</text>
</svg>