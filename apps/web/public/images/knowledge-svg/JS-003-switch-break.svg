<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">switch · break 穿透陷阱图解</text>

  <!-- 左侧：忘记 break (穿透) -->
  <text x="40" y="62" font-size="12" font-weight="600" fill="#ef4444">❌ 忘记 break — case "穿透"执行</text>
  <rect x="30" y="72" width="350" height="380" rx="10" fill="#ef4444" fill-opacity="0.03" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.8"/>

  <!-- switch 输入 -->
  <rect x="130" y="88" width="150" height="28" rx="14" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4"/>
  <text x="205" y="106" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">switch (day = "Monday")</text>

  <!-- case Saturday -->
  <line x1="205" y1="116" x2="205" y2="134" stroke="#475569" stroke-width="1"/>
  <rect x="50" y="134" width="280" height="30" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="65" y="153" font-size="10" fill="#94a3b8" font-family="monospace">case "Saturday":</text>
  <text x="305" y="153" font-size="9" fill="#64748b" text-anchor="end">day ≠ "Saturday"</text>

  <!-- case Sunday (匹配) -->
  <rect x="50" y="170" width="280" height="30" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="65" y="189" font-size="10" fill="#94a3b8" font-family="monospace">case "Sunday":</text>
  <text x="305" y="189" font-size="9" fill="#64748b" text-anchor="end">day ≠ "Sunday"</text>

  <!-- case Monday (匹配) -->
  <rect x="50" y="206" width="280" height="40" rx="4" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="65" y="222" font-size="10" fill="#22c55e" font-weight="600" font-family="monospace">case "Monday":</text>
  <text x="65" y="238" font-size="9" fill="#22c55e" font-family="monospace">  return "工作日 💼";  ← ✅ 命中</text>

  <!-- 穿透箭头 -->
  <line x1="205" y1="246" x2="205" y2="262" stroke="#ef4444" stroke-width="2"/>
  <polygon points="205,262 200,254 210,254" fill="#ef4444"/>
  <text x="215" y="258" font-size="9" fill="#ef4444" font-weight="600">⚠️ 没有 break，继续穿透！</text>

  <!-- case Tuesday (穿透) -->
  <rect x="50" y="266" width="280" height="40" rx="4" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <text x="65" y="282" font-size="10" fill="#ef4444" font-family="monospace">case "Tuesday":</text>
  <text x="65" y="298" font-size="9" fill="#ef4444" font-family="monospace">  return "工作日 💼";  ← ⚠️ 也执行了！</text>

  <line x1="205" y1="306" x2="205" y2="318" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="205,318 200,310 210,310" fill="#ef4444"/>

  <!-- case Wednesday (穿透) -->
  <rect x="50" y="322" width="280" height="40" rx="4" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <text x="65" y="338" font-size="10" fill="#ef4444" font-family="monospace">case "Wednesday":</text>
  <text x="65" y="354" font-size="9" fill="#ef4444" font-family="monospace">  return "工作日 💼";  ← ⚠️ 也执行了！</text>

  <text x="205" y="385" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="600">💥 结果：从 "Monday" 一路穿透执行</text>
  <text x="205" y="402" font-size="9" fill="#94a3b8" text-anchor="middle">虽然最终 return 一样，但执行了多余的代码</text>
  <text x="205" y="420" font-size="9" fill="#94a3b8" text-anchor="middle">如果 case 之间逻辑不同，会产生严重 bug！</text>

  <!-- 右侧：正确使用 break -->
  <text x="400" y="62" font-size="12" font-weight="600" fill="#22c55e">✅ 正确写法 — 每个 case 都用 break</text>
  <rect x="400" y="72" width="350" height="380" rx="10" fill="#22c55e" fill-opacity="0.03" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="500" y="88" width="150" height="28" rx="14" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4"/>
  <text x="575" y="106" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">switch (fruit = "banana")</text>

  <line x1="575" y1="116" x2="575" y2="134" stroke="#475569" stroke-width="1"/>

  <!-- case apple -->
  <rect x="420" y="134" width="310" height="40" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="435" y="150" font-size="10" fill="#94a3b8" font-family="monospace">case "apple":</text>
  <text x="435" y="166" font-size="9" fill="#94a3b8" font-family="monospace">  console.log("🍎"); break;  ← ✅</text>

  <!-- case banana (命中) -->
  <rect x="420" y="180" width="310" height="40" rx="4" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="435" y="196" font-size="10" fill="#22c55e" font-weight="600" font-family="monospace">case "banana":</text>
  <text x="435" y="212" font-size="9" fill="#22c55e" font-family="monospace">  console.log("🍌"); break;  ← ✅ 命中后跳出</text>

  <!-- break 箭头跳出 -->
  <line x1="575" y1="220" x2="575" y2="240" stroke="#22c55e" stroke-width="2"/>
  <polygon points="575,240 570,232 580,232" fill="#22c55e"/>
  <text x="585" y="236" font-size="9" fill="#22c55e" font-weight="600">⏏ break 跳出 switch</text>

  <!-- case cherry (跳过) -->
  <rect x="420" y="246" width="310" height="40" rx="4" fill="#0f172a" stroke="#1e293b" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <text x="435" y="262" font-size="10" fill="#64748b" font-family="monospace">case "cherry":</text>
  <text x="435" y="278" font-size="9" fill="#64748b" font-family="monospace">  console.log("🍒"); break;  ← 跳过</text>

  <!-- default -->
  <rect x="420" y="292" width="310" height="40" rx="4" fill="#0f172a" stroke="#1e293b" stroke-dasharray="4,3" stroke-opacity="0.5"/>
  <text x="435" y="308" font-size="10" fill="#64748b" font-family="monospace">default:</text>
  <text x="435" y="324" font-size="9" fill="#64748b" font-family="monospace">  console.log("未知水果");</text>

  <text x="575" y="365" font-size="10" fill="#22c55e" text-anchor="middle" font-weight="600">✅ 结果：精确执行 "banana" 分支，立即跳出</text>
  <text x="575" y="385" font-size="9" fill="#94a3b8" text-anchor="middle">每个 case 末尾写 break，是 switch 的"安全带"</text>
  <text x="575" y="405" font-size="9" fill="#eab308" text-anchor="middle">💡 例外：多个 case 共享同一段代码时可省略 break</text>
  <text x="575" y="423" font-size="9" fill="#94a3b8" text-anchor="middle">  case "Sat": case "Sun": return "周末";</text>

  <!-- 底部口诀 -->
  <rect x="30" y="476" width="720" height="64" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="0.8"/>
  <text x="390" y="500" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">💡 switch 使用口诀</text>
  <text x="390" y="520" font-size="10" fill="#cbd5e1" text-anchor="middle">值匹配用 switch · 每 case 必 break · default 兜底 · 共享代码可省 break</text>
</svg>
