<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">条件与循环 · 决策速查表</text>

  <!-- 决策树 -->
  <text x="40" y="62" font-size="12" font-weight="600" fill="#f97316">① 决策树：什么时候用什么？</text>

  <rect x="290" y="78" width="200" height="32" rx="16" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="390" y="98" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">需要做条件判断？</text>

  <!-- if/else -->
  <line x1="320" y1="110" x2="160" y2="135" stroke="#475569" stroke-width="1"/>
  <text x="220" y="125" font-size="9" fill="#94a3b8">是 · 范围判断</text>
  <rect x="80" y="135" width="180" height="40" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="170" y="152" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">if / else if / else</text>
  <text x="170" y="168" font-size="8" fill="#94a3b8" text-anchor="middle">score &gt;= 90 ? "A" : ...</text>

  <!-- switch -->
  <line x1="460" y1="110" x2="620" y2="135" stroke="#475569" stroke-width="1"/>
  <text x="510" y="125" font-size="9" fill="#94a3b8">是 · 值匹配</text>
  <rect x="540" y="135" width="180" height="40" rx="6" fill="#a855f7" fill-opacity="0.10" stroke="#a855f7" stroke-opacity="0.4"/>
  <text x="630" y="152" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">switch + break</text>
  <text x="630" y="168" font-size="8" fill="#94a3b8" text-anchor="middle">case "Monday": ... break;</text>

  <!-- 三元 -->
  <line x1="390" y1="110" x2="390" y2="195" stroke="#475569" stroke-width="1"/>
  <text x="400" y="180" font-size="9" fill="#94a3b8">是 · 二选一赋值</text>
  <rect x="280" y="195" width="220" height="36" rx="6" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.4"/>
  <text x="390" y="218" font-size="10" font-weight="600" fill="#eab308" text-anchor="middle">三元运算符 ? :</text>

  <!-- 循环选择 -->
  <text x="40" y="270" font-size="12" font-weight="600" fill="#3b82f6">② 循环选择决策</text>

  <rect x="290" y="286" width="200" height="32" rx="16" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="390" y="306" font-size="11" font-weight="600" fill="#3b82f6" text-anchor="middle">需要重复执行？</text>

  <!-- for -->
  <line x1="320" y1="318" x2="160" y2="345" stroke="#475569" stroke-width="1"/>
  <text x="220" y="335" font-size="9" fill="#94a3b8">次数已知</text>
  <rect x="80" y="345" width="180" height="40" rx="6" fill="#f97316" fill-opacity="0.10" stroke="#f97316" stroke-opacity="0.4"/>
  <text x="170" y="362" font-size="10" font-weight="600" fill="#f97316" text-anchor="middle">for (let i=0; i&lt;n; i++)</text>
  <text x="170" y="378" font-size="8" fill="#94a3b8" text-anchor="middle">最常用，已知循环次数</text>

  <!-- while -->
  <line x1="390" y1="318" x2="390" y2="345" stroke="#475569" stroke-width="1"/>
  <text x="400" y="335" font-size="9" fill="#94a3b8">次数未知 · 先判断</text>
  <rect x="280" y="345" width="220" height="40" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="390" y="362" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">while (条件)</text>
  <text x="390" y="378" font-size="8" fill="#94a3b8" text-anchor="middle">读取流、轮询条件</text>

  <!-- do...while -->
  <line x1="460" y1="318" x2="620" y2="345" stroke="#475569" stroke-width="1"/>
  <text x="510" y="335" font-size="9" fill="#94a3b8">至少执行一次</text>
  <rect x="540" y="345" width="180" height="40" rx="6" fill="#a855f7" fill-opacity="0.10" stroke="#a855f7" stroke-opacity="0.4"/>
  <text x="630" y="362" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">do { } while (条件)</text>
  <text x="630" y="378" font-size="8" fill="#94a3b8" text-anchor="middle">菜单、输入校验</text>

  <!-- 遍历选择 -->
  <text x="40" y="420" font-size="12" font-weight="600" fill="#22c55e">③ 遍历决策</text>

  <rect x="80" y="438" width="200" height="34" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="180" y="459" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">数组 → for...of</text>

  <rect x="290" y="438" width="200" height="34" rx="6" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.4"/>
  <text x="390" y="459" font-size="10" font-weight="600" fill="#eab308" text-anchor="middle">对象 → for...in</text>

  <rect x="500" y="438" width="200" height="34" rx="6" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.4"/>
  <text x="600" y="459" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">需索引 → for (i=0; ...)</text>

  <!-- 口诀 -->
  <rect x="30" y="500" width="720" height="60" rx="10" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.2"/>
  <text x="390" y="525" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">🏆 总口诀</text>
  <text x="390" y="545" font-size="10" fill="#cbd5e1" text-anchor="middle">范围判断用 if · 值匹配用 switch · 数组用 for...of · 对象用 for...in</text>
</svg>
