<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">if / else if / else · 条件分支流程</text>

  <!-- 起点 -->
  <rect x="330" y="58" width="120" height="28" rx="14" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="390" y="76" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">开始：读入 score</text>

  <!-- 判断 1: score >= 90 -->
  <line x1="390" y1="86" x2="390" y2="106" stroke="#475569" stroke-width="1"/>
  <polygon points="390,106 480,140 390,174 300,140" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="390" y="138" font-size="10" fill="#3b82f6" text-anchor="middle">score &gt;= 90 ?</text>
  <text x="390" y="152" font-size="9" fill="#94a3b8" text-anchor="middle">（条件 1）</text>

  <!-- 是 → A -->
  <line x1="300" y1="140" x2="180" y2="140" stroke="#22c55e" stroke-opacity="0.6" stroke-width="1.4"/>
  <text x="240" y="132" font-size="10" fill="#22c55e">是 ✅</text>
  <rect x="100" y="126" width="80" height="28" rx="6" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="140" y="144" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">grade = "A"</text>

  <!-- 否 → 判断 2 -->
  <line x1="390" y1="174" x2="390" y2="200" stroke="#ef4444" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="400" y="190" font-size="10" fill="#ef4444">否</text>
  <polygon points="390,200 480,234 390,268 300,234" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="390" y="232" font-size="10" fill="#3b82f6" text-anchor="middle">score &gt;= 80 ?</text>
  <text x="390" y="246" font-size="9" fill="#94a3b8" text-anchor="middle">（else if 条件 2）</text>

  <!-- 是 → B -->
  <line x1="300" y1="234" x2="180" y2="234" stroke="#22c55e" stroke-opacity="0.6" stroke-width="1.4"/>
  <text x="240" y="226" font-size="10" fill="#22c55e">是 ✅</text>
  <rect x="100" y="220" width="80" height="28" rx="6" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="140" y="238" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">grade = "B"</text>

  <!-- 否 → 判断 3 -->
  <line x1="390" y1="268" x2="390" y2="294" stroke="#ef4444" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="400" y="284" font-size="10" fill="#ef4444">否</text>
  <polygon points="390,294 480,328 390,362 300,328" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="390" y="326" font-size="10" fill="#3b82f6" text-anchor="middle">score &gt;= 60 ?</text>
  <text x="390" y="340" font-size="9" fill="#94a3b8" text-anchor="middle">（else if 条件 3）</text>

  <!-- 是 → D -->
  <line x1="300" y1="328" x2="180" y2="328" stroke="#22c55e" stroke-opacity="0.6" stroke-width="1.4"/>
  <text x="240" y="320" font-size="10" fill="#22c55e">是 ✅</text>
  <rect x="100" y="314" width="80" height="28" rx="6" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="140" y="332" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">grade = "D"</text>

  <!-- 否 → else F -->
  <line x1="390" y1="362" x2="390" y2="388" stroke="#ef4444" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="400" y="378" font-size="10" fill="#ef4444">否</text>
  <rect x="320" y="388" width="140" height="28" rx="6" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <text x="390" y="406" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">else → grade = "F"</text>

  <!-- 终点 -->
  <line x1="140" y1="154" x2="140" y2="440" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="248" x2="140" y2="440" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="342" x2="140" y2="440" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="390" y1="416" x2="390" y2="440" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="290" y="440" width="200" height="28" rx="14" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="390" y="458" font-size="11" font-weight="600" fill="#a855f7" text-anchor="middle">返回 grade · 只走一条分支</text>

  <!-- 三元运算符注释 -->
  <rect x="520" y="58" width="230" height="100" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.6"/>
  <text x="535" y="78" font-size="10" font-weight="600" fill="#eab308">💡 三元运算符 ? :</text>
  <text x="535" y="96" font-size="9" fill="#94a3b8" font-family="monospace">const status =</text>
  <text x="535" y="110" font-size="9" fill="#94a3b8" font-family="monospace">  age &gt;= 18 ? "成年" : "未成年";</text>
  <text x="535" y="132" font-size="8.5" fill="#cbd5e1">条件 ? 真值 : 假值</text>
  <text x="535" y="146" font-size="8.5" fill="#cbd5e1">→ if/else 的简洁简写</text>

  <!-- 关键提示 -->
  <rect x="520" y="174" width="230" height="78" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="535" y="194" font-size="10" font-weight="600" fill="#ef4444">⚠️ 嵌套陷阱</text>
  <text x="535" y="212" font-size="9" fill="#94a3b8" font-family="monospace">a ? b : c ? d : e</text>
  <text x="535" y="228" font-size="8.5" fill="#cbd5e1">嵌套三元可读性差，</text>
  <text x="535" y="242" font-size="8.5" fill="#cbd5e1">超过两层就改用 if/else</text>

  <!-- 决策点 -->
  <rect x="520" y="266" width="230" height="78" rx="8" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="535" y="286" font-size="10" font-weight="600" fill="#22c55e">✅ 何时用三元</text>
  <text x="535" y="304" font-size="9" fill="#94a3b8">• 赋值场景：const x = a ? b : c</text>
  <text x="535" y="320" font-size="9" fill="#94a3b8">• 简单二选一</text>
  <text x="535" y="336" font-size="9" fill="#94a3b8">• JSX 条件渲染首选</text>

  <text x="390" y="500" font-size="11" font-weight="600" fill="#3b82f6" text-anchor="middle">🔑 核心规律：条件从上到下依次判断，命中一个就跳出，不再往下检查</text>
  <text x="390" y="524" font-size="10" fill="#94a3b8" text-anchor="middle">→ 这就是为什么要把"最可能成立"或"最严格"的条件写在最前面</text>
</svg>
