<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">作用域与闭包 · JS 最核心概念</text>
<text x="40" y="66" font-size="13" font-weight="600" fill="#ec4899">① 三种作用域</text>
<rect x="30" y="76" width="230" height="90" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.25"/><text x="50" y="96" font-size="11" font-weight="600" fill="#ef4444">全局作用域</text><text x="50" y="114" font-size="9" fill="#94a3b8">最外层，到处可访问</text><text x="50" y="132" font-size="9" fill="#ef4444">var 泄漏到这里！</text>
<rect x="275" y="76" width="230" height="90" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25"/><text x="295" y="96" font-size="11" font-weight="600" fill="#3b82f6">函数作用域</text><text x="295" y="114" font-size="9" fill="#94a3b8">function 内部</text><text x="295" y="132" font-size="9" fill="#3b82f6">var 声明的变量范围</text>
<rect x="520" y="76" width="230" height="90" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/><text x="540" y="96" font-size="11" font-weight="600" fill="#22c55e">块级作用域</text><text x="540" y="114" font-size="9" fill="#94a3b8">{ } 内部</text><text x="540" y="132" font-size="9" fill="#22c55e">let/const 才有！</text>
<text x="40" y="192" font-size="13" font-weight="600" fill="#a855f7">② 作用域链：内层可访问外层</text>
<rect x="30" y="202" width="720" height="100" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/>
<rect x="50" y="214" width="680" height="28" rx="4" fill="#ef4444" fill-opacity="0.08"/><text x="62" y="232" font-size="9" fill="#ef4444">全局：const global = 1</text>
<rect x="80" y="246" width="620" height="28" rx="4" fill="#3b82f6" fill-opacity="0.08"/><text x="92" y="264" font-size="9" fill="#3b82f6">函数：const local = 2</text>
<rect x="110" y="278" width="560" height="16" rx="4" fill="#22c55e" fill-opacity="0.08"/><text x="122" y="290" font-size="8" fill="#22c55e">块：const block = 3</text>
<text x="40" y="320" font-size="13" font-weight="600" fill="#ec4899">③ 闭包 = 函数 + 它记住的外部变量</text>
<rect x="30" y="330" width="720" height="80" rx="8" fill="#ec4899" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.25"/>
<text x="50" y="352" font-size="10" fill="#ec4899" font-family="monospace">function outer() { let x = 1; return () => x++; }</text>
<text x="50" y="370" font-size="10" fill="#22c55e" font-family="monospace">const fn = outer(); // outer执行完了，但 x 还活着！</text>
<text x="50" y="388" font-size="9" fill="#eab308">返回的函数"记住"了 x — 这就是闭包</text>
<text x="40" y="428" font-size="13" font-weight="600" fill="#22c55e">④ 7步学习路径</text>
<g font-size="10"><rect x="30" y="442" width="100" height="50" rx="8" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-opacity="0.3"/><text x="80" y="464" text-anchor="middle" font-weight="700" fill="#f97316">① 概览</text><rect x="135" y="442" width="100" height="50" rx="8" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-opacity="0.3"/><text x="185" y="464" text-anchor="middle" font-weight="700" fill="#ec4899">② 作用域</text><rect x="240" y="442" width="100" height="50" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.3"/><text x="290" y="464" text-anchor="middle" font-weight="700" fill="#3b82f6">③ 作用域链</text><rect x="345" y="442" width="100" height="50" rx="8" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.3"/><text x="395" y="464" text-anchor="middle" font-weight="700" fill="#a855f7">④ 闭包本质</text><rect x="450" y="442" width="100" height="50" rx="8" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3"/><text x="500" y="464" text-anchor="middle" font-weight="700" fill="#22c55e">⑤ 私有化</text><rect x="555" y="442" width="100" height="50" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3"/><text x="605" y="464" text-anchor="middle" font-weight="700" fill="#ef4444">⑥ 循环陷阱</text><rect x="660" y="442" width="90" height="50" rx="8" fill="#eab308" fill-opacity="0.1" stroke="#eab308" stroke-opacity="0.3"/><text x="705" y="464" text-anchor="middle" font-weight="700" fill="#eab308">⑦ 口诀</text></g>
<text x="390" y="516" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">🎯 学完7步，闭包不再神秘</text></svg>
