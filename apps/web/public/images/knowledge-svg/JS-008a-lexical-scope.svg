<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
<rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">词法作用域 · 编写时确定</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#a855f7">📝 词法作用域 = 编写时确定，不是运行时</text>
<rect x="30" y="76" width="720" height="180" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.2"/>
<text x="50" y="100" font-size="10" fill="#94a3b8" font-family="monospace">const x = "global";</text>
<text x="50" y="120" font-size="10" fill="#94a3b8" font-family="monospace"></text>
<text x="50" y="136" font-size="10" fill="#3b82f6" font-family="monospace">function foo() {</text>
<text x="70" y="156" font-size="10" fill="#22c55e" font-family="monospace">console.log(x);  // "global" — 由编写位置决定</text>
<text x="50" y="176" font-size="10" fill="#3b82f6" font-family="monospace">}</text>
<text x="50" y="196" font-size="10" fill="#94a3b8" font-family="monospace"></text>
<text x="50" y="212" font-size="10" fill="#3b82f6" font-family="monospace">function bar() {</text>
<text x="70" y="232" font-size="10" fill="#ef4444" font-family="monospace">const x = "bar";</text>
<text x="70" y="252" font-size="10" fill="#22c55e" font-family="monospace">foo();  // foo内的x仍然是"global"!</text>
<text x="50" y="248" font-size="10" fill="#3b82f6" font-family="monospace">}</text>
<text x="40" y="280" font-size="13" font-weight="600" fill="#f97316">⚖️ 词法作用域 vs 动态作用域</text>
<rect x="30" y="292" width="350" height="160" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.15"/>
<text x="50" y="316" font-size="11" font-weight="600" fill="#a855f7">✅ 词法作用域 (JS采用)</text>
<text x="50" y="340" font-size="9" fill="#94a3b8">变量作用域在代码编写时确定</text>
<text x="50" y="360" font-size="9" fill="#94a3b8">由变量声明的位置决定</text>
<text x="50" y="380" font-size="9" fill="#22c55e">也叫静态作用域</text>
<text x="50" y="404" font-size="9" fill="#94a3b8">foo() 定义在全局 → x = "global"</text>
<text x="50" y="424" font-size="9" fill="#a855f7">结果：可预测、易理解</text>
<rect x="400" y="292" width="350" height="160" rx="8" fill="#64748b" fill-opacity="0.04" stroke="#64748b" stroke-opacity="0.15"/>
<text x="420" y="316" font-size="11" font-weight="600" fill="#94a3b8">❌ 动态作用域 (bash等)</text>
<text x="420" y="340" font-size="9" fill="#94a3b8">变量作用域在运行时确定</text>
<text x="420" y="360" font-size="9" fill="#94a3b8">由调用栈决定</text>
<text x="420" y="380" font-size="9" fill="#ef4444">JS不采用这种方式</text>
<text x="420" y="404" font-size="9" fill="#94a3b8">foo() 在bar()中调用 → x = "bar"</text>
<text x="420" y="424" font-size="9" fill="#94a3b8">结果：不可预测、难调试</text>
<rect x="30" y="470" width="720" height="90" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
<text x="50" y="496" font-size="11" font-weight="600" fill="#a855f7">💡 为什么词法作用域重要？</text>
<text x="50" y="520" font-size="10" fill="#94a3b8">• 代码行为可预测 — 看定义位置就知道访问哪个变量</text>
<text x="50" y="540" font-size="10" fill="#22c55e">• 闭包之所以能工作 — 函数记住定义时的作用域，不是调用时的作用域</text>
</svg>