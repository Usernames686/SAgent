<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">对象解构 · 重命名 + 默认值 + 嵌套</text>
  <text x="40" y="64" font-size="13" font-weight="600" fill="#a855f7">① 基本用法</text>
  <rect x="30" y="74" width="720" height="50" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="50" y="96" font-size="10" fill="#a855f7" font-family="monospace">const { name, age } = { name:"小明", age:20 };  // name="小明", age=20</text>
  <text x="40" y="146" font-size="13" font-weight="600" fill="#3b82f6">② 重命名 + 默认值</text>
  <rect x="30" y="156" width="350" height="80" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25"/>
  <text x="50" y="178" font-size="10" font-weight="600" fill="#3b82f6">重命名</text>
  <text x="50" y="196" font-size="9" fill="#94a3b8" font-family="monospace">const { name: userName } = user;</text>
  <text x="50" y="214" font-size="9" fill="#22c55e" font-family="monospace">// userName="小明"</text>
  <rect x="400" y="156" width="350" height="80" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/>
  <text x="420" y="178" font-size="10" font-weight="600" fill="#22c55e">默认值</text>
  <text x="420" y="196" font-size="9" fill="#94a3b8" font-family="monospace">const { role = "user" } = user;</text>
  <text x="420" y="214" font-size="9" fill="#22c55e" font-family="monospace">// role="dev"（有值用原值）</text>
  <text x="40" y="256" font-size="13" font-weight="600" fill="#eab308">③ 嵌套解构</text>
  <rect x="30" y="266" width="720" height="60" rx="8" fill="#eab308" fill-opacity="0.04" stroke="#eab308" stroke-opacity="0.25"/>
  <text x="50" y="288" font-size="10" fill="#eab308" font-family="monospace">const { address: { city } } = { name:"小明", address:{ city:"北京" } };  // city="北京"</text>
  <text x="50" y="306" font-size="9" fill="#ef4444">嵌套太深可读性差，优先用扁平解构</text>
  <text x="40" y="338" font-size="13" font-weight="600" fill="#06b6d4">④ 函数参数解构（最常用！）</text>
  <rect x="30" y="348" width="720" height="100" rx="8" fill="#06b6d4" fill-opacity="0.04" stroke="#06b6d4" stroke-opacity="0.25"/>
  <text x="50" y="370" font-size="10" fill="#06b6d4" font-family="monospace">function greet({ name, age, role = "user" }) {</text>
  <text x="50" y="388" font-size="10" fill="#06b6d4" font-family="monospace">  return `${name}, ${age}岁, ${role}`;</text>
  <text x="50" y="406" font-size="10" fill="#06b6d4" font-family="monospace">}</text>
  <text x="50" y="424" font-size="9" fill="#22c55e">参数解构 + 默认值 = 配置对象的最佳实践</text>
  <text x="40" y="468" font-size="13" font-weight="600" fill="#ef4444">⑤ 陷阱</text>
  <rect x="30" y="478" width="350" height="80" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2"/>
  <text x="50" y="498" font-size="10" fill="#ef4444" font-weight="600">已声明变量解构要加括号</text>
  <text x="50" y="516" font-size="9" fill="#94a3b8" font-family="monospace">let a, b;</text>
  <text x="50" y="532" font-size="9" fill="#ef4444" font-family="monospace">{ a, b } = obj;  // ❌ 语法错误</text>
  <text x="50" y="548" font-size="9" fill="#22c55e" font-family="monospace">({ a, b } = obj); // ✅ 加括号</text>
  <rect x="400" y="478" width="350" height="80" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2"/>
  <text x="420" y="498" font-size="10" fill="#ef4444" font-weight="600">解构不匹配返回 undefined</text>
  <text x="420" y="516" font-size="9" fill="#94a3b8" font-family="monospace">const { foo } = { bar: 1 };</text>
  <text x="420" y="532" font-size="9" fill="#ef4444" font-family="monospace">// foo = undefined</text>
  <text x="420" y="548" font-size="9" fill="#eab308">用默认值兜底: { foo = "default" }</text>
</svg>
