<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="system-ui,sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="360" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">逻辑运算符：&& || !</text>
  <rect x="30" y="52" width="230" height="100" rx="10" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="145" y="76" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">&amp;&amp; 与</text>
  <text x="55" y="98" font-size="11" fill="#94a3b8">两边都真才真</text>
  <text x="55" y="118" font-size="11" fill="#22c55e">true &amp;&amp; true → true</text>
  <text x="55" y="138" font-size="11" fill="#ef4444">true &amp;&amp; false → false</text>
  <rect x="275" y="52" width="230" height="100" rx="10" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="390" y="76" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">|| 或</text>
  <text x="300" y="98" font-size="11" fill="#94a3b8">一边真就真</text>
  <text x="300" y="118" font-size="11" fill="#3b82f6">true || false → true</text>
  <text x="300" y="138" font-size="11" fill="#ef4444">false || false → false</text>
  <rect x="520" y="52" width="230" height="100" rx="10" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="635" y="76" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">! 非</text>
  <text x="545" y="98" font-size="11" fill="#94a3b8">取反</text>
  <text x="545" y="118" font-size="11" fill="#f59e0b">!true → false</text>
  <text x="545" y="138" font-size="11" fill="#f59e0b">!!x → 转布尔值</text>
  <text x="390" y="190" font-size="13" font-weight="600" fill="white" text-anchor="middle">短路求值流程</text>
  <rect x="40" y="210" width="340" height="60" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="210" y="234" font-size="11" fill="#22c55e" text-anchor="middle">&amp;&amp;：左边为假 → 直接返回左边，右边不执行</text>
  <text x="210" y="254" font-size="11" fill="#94a3b8" text-anchor="middle">user &amp;&amp; user.name — 安全访问</text>
  <rect x="400" y="210" width="340" height="60" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="570" y="234" font-size="11" fill="#3b82f6" text-anchor="middle">||：左边为真 → 直接返回左边，右边不执行</text>
  <text x="570" y="254" font-size="11" fill="#94a3b8" text-anchor="middle">name || "匿名" — 默认值</text>
  <rect x="40" y="290" width="700" height="50" rx="8" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="390" y="312" font-size="11" fill="#f59e0b" text-anchor="middle">?? 空值合并（ES2020）：只对 null/undefined 生效，0 和 "" 不受影响</text>
  <text x="390" y="330" font-size="11" fill="#94a3b8" text-anchor="middle">count ?? 10 — count 为 0 时保留 0，只有 null/undefined 才用 10</text>
</svg>
