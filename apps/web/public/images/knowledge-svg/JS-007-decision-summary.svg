<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">解构与展开 · 决策速查表</text>
  <text x="40" y="64" font-size="13" font-weight="600" fill="#eab308">① 按需求选语法</text>
  <rect x="30" y="76" width="720" height="480" rx="8" fill="#0f172a" stroke="#1e293b"/>
  <rect x="30" y="76" width="180" height="32" fill="#f97316" fill-opacity="0.12"/>
  <text x="120" y="97" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">需求</text>
  <rect x="210" y="76" width="270" height="32" fill="#eab308" fill-opacity="0.10"/>
  <text x="345" y="97" font-size="11" font-weight="600" fill="#eab308" text-anchor="middle">推荐语法</text>
  <rect x="480" y="76" width="270" height="32" fill="#22c55e" fill-opacity="0.10"/>
  <text x="615" y="97" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">示例</text>
  <text x="120" y="128" font-size="10" fill="#cbd5e1" text-anchor="middle">从数组取值</text>
  <text x="345" y="128" font-size="10" fill="#eab308" text-anchor="middle">数组解构 [a,b]=arr</text>
  <text x="615" y="128" font-size="9" fill="#94a3b8" text-anchor="middle">const [a,b]=arr</text>
  <text x="120" y="156" font-size="10" fill="#cbd5e1" text-anchor="middle">从对象取值</text>
  <text x="345" y="156" font-size="10" fill="#eab308" text-anchor="middle">对象解构 {a,b}=obj</text>
  <text x="615" y="156" font-size="9" fill="#94a3b8" text-anchor="middle">const {a,b}=obj</text>
  <text x="120" y="184" font-size="10" fill="#cbd5e1" text-anchor="middle">React useState</text>
  <text x="345" y="184" font-size="10" fill="#eab308" text-anchor="middle">数组解构</text>
  <text x="615" y="184" font-size="9" fill="#94a3b8" text-anchor="middle">const [v,fn]=useState()</text>
  <text x="120" y="212" font-size="10" fill="#cbd5e1" text-anchor="middle">Props 取值</text>
  <text x="345" y="212" font-size="10" fill="#eab308" text-anchor="middle">对象解构</text>
  <text x="615" y="212" font-size="9" fill="#94a3b8" text-anchor="middle">const {a,b}=props</text>
  <text x="120" y="240" font-size="10" fill="#cbd5e1" text-anchor="middle">合并数组</text>
  <text x="345" y="240" font-size="10" fill="#eab308" text-anchor="middle">数组展开</text>
  <text x="615" y="240" font-size="9" fill="#94a3b8" text-anchor="middle">[...a,...b]</text>
  <text x="120" y="268" font-size="10" fill="#cbd5e1" text-anchor="middle">合并对象</text>
  <text x="345" y="268" font-size="10" fill="#eab308" text-anchor="middle">对象展开</text>
  <text x="615" y="268" font-size="9" fill="#94a3b8" text-anchor="middle">{...a,...b}</text>
  <text x="120" y="296" font-size="10" fill="#cbd5e1" text-anchor="middle">React更新状态</text>
  <text x="345" y="296" font-size="10" fill="#eab308" text-anchor="middle">对象展开</text>
  <text x="615" y="296" font-size="9" fill="#94a3b8" text-anchor="middle">{...state,k:v}</text>
  <text x="120" y="324" font-size="10" fill="#cbd5e1" text-anchor="middle">交换变量</text>
  <text x="345" y="324" font-size="10" fill="#eab308" text-anchor="middle">数组解构</text>
  <text x="615" y="324" font-size="9" fill="#94a3b8" text-anchor="middle">[a,b]=[b,a]</text>
  <text x="120" y="352" font-size="10" fill="#cbd5e1" text-anchor="middle">剩余参数</text>
  <text x="345" y="352" font-size="10" fill="#eab308" text-anchor="middle">...rest</text>
  <text x="615" y="352" font-size="9" fill="#94a3b8" text-anchor="middle">fn(...args)</text>
  <text x="120" y="380" font-size="10" fill="#cbd5e1" text-anchor="middle">浅拷贝</text>
  <text x="345" y="380" font-size="10" fill="#eab308" text-anchor="middle">展开</text>
  <text x="615" y="380" font-size="9" fill="#94a3b8" text-anchor="middle">{...obj} / [...arr]</text>
  <text x="120" y="408" font-size="10" fill="#cbd5e1" text-anchor="middle">深拷贝</text>
  <text x="345" y="408" font-size="10" fill="#eab308" text-anchor="middle">structuredClone</text>
  <text x="615" y="408" font-size="9" fill="#94a3b8" text-anchor="middle">structuredClone(obj)</text>
  <rect x="50" y="440" width="680" height="100" rx="6" fill="#eab308" fill-opacity="0.06" stroke="#eab308" stroke-opacity="0.2"/>
  <text x="70" y="462" font-size="12" font-weight="700" fill="#eab308">总口诀</text>
  <text x="70" y="484" font-size="10" fill="#cbd5e1">数组解构按位置，对象解构按名称，展开合并浅拷贝</text>
  <text x="70" y="504" font-size="10" fill="#cbd5e1">React状态必须展开更新，嵌套每层展开一次</text>
  <text x="70" y="524" font-size="10" fill="#ef4444" font-weight="600">展开是浅拷贝！嵌套对象修改会影响原对象</text>
</svg>
