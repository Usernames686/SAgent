<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="760" height="420" fill="url(#bg3)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">Promise 组合方法对比</text>

  <!-- Promise.all -->
  <rect x="40" y="60" width="330" height="160" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="60" y="85" font-size="12" font-weight="700" fill="#6ee7b7">Promise.all([p1, p2, p3])</text>
  <text x="60" y="105" font-size="10" fill="#94a3b8">🏁 全部成功 → 才成功</text>
  <text x="60" y="125" font-size="10" fill="#94a3b8">⚡ 一个失败 → 立即失败</text>
  <text x="60" y="145" font-size="10" fill="#94a3b8">📦 结果顺序 = 输入顺序</text>
  <text x="60" y="170" font-size="9.5" fill="#64748b" font-family="monospace">// 并行加载所有图片</text>
  <text x="60" y="185" font-size="9.5" fill="#64748b" font-family="monospace">await Promise.all(urls.map(fetch));</text>
  <text x="60" y="205" font-size="9" fill="#fbbf24">⚠️ 一个失败，其他结果丢弃</text>

  <!-- Promise.race -->
  <rect x="390" y="60" width="330" height="160" rx="10" fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="410" y="85" font-size="12" font-weight="700" fill="#fcd34d">Promise.race([p1, p2, p3])</text>
  <text x="410" y="105" font-size="10" fill="#94a3b8">🏃 第一个完成 → 就是他</text>
  <text x="410" y="125" font-size="10" fill="#94a3b8">✅/❌ 看第一个的结果</text>
  <text x="410" y="145" font-size="10" fill="#94a3b8">⏱️ 适合实现超时控制</text>
  <text x="410" y="170" font-size="9.5" fill="#64748b" font-family="monospace">// 5 秒内必须返回，否则超时</text>
  <text x="410" y="185" font-size="9.5" fill="#64748b" font-family="monospace">Promise.race([fetch(url), timeout(5000)]);</text>
  <text x="410" y="205" font-size="9" fill="#fca5a5">⚠️ 其他 Promise 仍在跑（无法取消）</text>

  <!-- Promise.allSettled -->
  <rect x="40" y="240" width="330" height="160" rx="10" fill="#60a5fa" fill-opacity="0.06" stroke="#60a5fa" stroke-opacity="0.3"/>
  <text x="60" y="265" font-size="12" font-weight="700" fill="#93c5fd">Promise.allSettled([p1, p2, p3])</text>
  <text x="60" y="285" font-size="10" fill="#94a3b8">📋 全部完成 → 不管成败</text>
  <text x="60" y="305" font-size="10" fill="#94a3b8">📊 返回 [{status, value/reason}]</text>
  <text x="60" y="325" font-size="10" fill="#94a3b8">🎯 适合"尽力而为"批量任务</text>
  <text x="60" y="350" font-size="9.5" fill="#64748b" font-family="monospace">// 批量请求，部分失败也不影响</text>
  <text x="60" y="365" font-size="9.5" fill="#64748b" font-family="monospace">const results = await Promise.allSettled(urls.map(fetch));</text>
  <text x="60" y="385" font-size="9" fill="#34d399">✅ 永远 fulfilled，不会 reject</text>

  <!-- Promise.any -->
  <rect x="390" y="240" width="330" height="160" rx="10" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="410" y="265" font-size="12" font-weight="700" fill="#c4b5fd">Promise.any([p1, p2, p3])</text>
  <text x="410" y="285" font-size="10" fill="#94a3b8">🥇 第一个成功 → 就是他</text>
  <text x="410" y="305" font-size="10" fill="#94a3b8">💀 全部失败 → AggregateError</text>
  <text x="410" y="325" font-size="10" fill="#94a3b8">🌐 适合多源容灾请求</text>
  <text x="410" y="350" font-size="9.5" fill="#64748b" font-family="monospace">// 多个 CDN，谁先返回用谁</text>
  <text x="410" y="365" font-size="9.5" fill="#64748b" font-family="monospace">const fastest = await Promise.any(cdns.map(fetch));</text>
  <text x="410" y="385" font-size="9" fill="#fca5a5">⚠️ ES2021，旧浏览器不支持</text>
</svg>
