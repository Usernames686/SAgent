<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">break · continue · 标签语句 · 循环控制流</text>

  <!-- break -->
  <text x="40" y="62" font-size="12" font-weight="600" fill="#ef4444">① break — 立即跳出整个循环</text>
  <rect x="30" y="72" width="350" height="200" rx="10" fill="#ef4444" fill-opacity="0.03" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="80" y="92" width="120" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="140" y="109" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">i = 0</text>

  <line x1="140" y1="118" x2="140" y2="132" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="140,132 135,124 145,124" fill="#22c55e"/>

  <rect x="80" y="138" width="120" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="140" y="155" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">i = 1</text>

  <line x1="140" y1="164" x2="140" y2="178" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="140,178 135,170 145,170" fill="#22c55e"/>

  <rect x="80" y="184" width="120" height="26" rx="13" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="140" y="201" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">i = 2 → break!</text>

  <!-- 跳出箭头 -->
  <path d="M 200 197 Q 280 197 280 130" stroke="#ef4444" stroke-width="2" fill="none"/>
  <polygon points="280,130 275,138 285,138" fill="#ef4444"/>
  <text x="290" y="160" font-size="10" fill="#ef4444" font-weight="600">⏏ 跳出循环</text>
  <text x="290" y="178" font-size="9" fill="#94a3b8">不再执行 i=3,4</text>

  <rect x="60" y="232" width="290" height="32" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="70" y="252" font-size="9" fill="#94a3b8" font-family="monospace">for (let i=0; i&lt;5; i++) { if (i===2) break; }</text>

  <!-- continue -->
  <text x="400" y="62" font-size="12" font-weight="600" fill="#eab308">② continue — 跳过本次，进入下一次</text>
  <rect x="400" y="72" width="350" height="200" rx="10" fill="#eab308" fill-opacity="0.03" stroke="#eab308" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="450" y="92" width="120" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="510" y="109" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">i = 0 → 执行</text>

  <line x1="510" y1="118" x2="510" y2="132" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="510,132 505,124 515,124" fill="#22c55e"/>

  <rect x="450" y="138" width="120" height="26" rx="13" fill="#eab308" fill-opacity="0.20" stroke="#eab308" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="510" y="155" font-size="10" font-weight="600" fill="#eab308" text-anchor="middle">i = 1 → continue</text>

  <!-- 跳过箭头 -->
  <path d="M 510 138 Q 510 170 570 170 Q 620 170 620 138" stroke="#eab308" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
  <text x="630" y="160" font-size="10" fill="#eab308" font-weight="600">⏭ 跳过本次</text>
  <text x="630" y="178" font-size="9" fill="#94a3b8">i=1 的循环体不执行</text>

  <line x1="510" y1="164" x2="510" y2="184" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="510,184 505,176 515,176" fill="#22c55e"/>

  <rect x="450" y="190" width="120" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="510" y="207" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">i = 2 → 执行</text>

  <rect x="430" y="232" width="290" height="32" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="440" y="252" font-size="9" fill="#94a3b8" font-family="monospace">for (let i=0; i&lt;5; i++) { if (i===1) continue; }</text>

  <!-- 标签语句 -->
  <text x="40" y="298" font-size="12" font-weight="600" fill="#a855f7">③ 标签语句 — 跳出多层嵌套循环</text>
  <rect x="30" y="308" width="720" height="180" rx="10" fill="#a855f7" fill-opacity="0.03" stroke="#a855f7" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="60" y="328" width="350" height="142" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="72" y="346" font-size="9" fill="#a855f7" font-family="monospace" font-weight="600">outer:</text>
  <text x="72" y="360" font-size="9" fill="#94a3b8" font-family="monospace">for (let i = 0; i &lt; 3; i++) {</text>
  <text x="72" y="374" font-size="9" fill="#94a3b8" font-family="monospace">  inner:</text>
  <text x="72" y="388" font-size="9" fill="#94a3b8" font-family="monospace">  for (let j = 0; j &lt; 3; j++) {</text>
  <text x="72" y="402" font-size="9" fill="#94a3b8" font-family="monospace">    if (i === 1 &amp;&amp; j === 1) {</text>
  <text x="72" y="416" font-size="9" fill="#eab308" font-family="monospace">      break outer;  ← 跳出两层循环</text>
  <text x="72" y="430" font-size="9" fill="#94a3b8" font-family="monospace">    }</text>
  <text x="72" y="444" font-size="9" fill="#94a3b8" font-family="monospace">  }</text>
  <text x="72" y="458" font-size="9" fill="#94a3b8" font-family="monospace">}</text>

  <rect x="430" y="328" width="300" height="80" rx="6" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-opacity="0.2"/>
  <text x="445" y="348" font-size="10" font-weight="600" fill="#22c55e">✅ 标签 + break</text>
  <text x="445" y="366" font-size="9" fill="#94a3b8">嵌套循环里需要"一次跳多层"</text>
  <text x="445" y="382" font-size="9" fill="#94a3b8">用 label: 标记外层，break label 跳出</text>
  <text x="445" y="398" font-size="9" fill="#eab308">⚠️ 但可读性差，优先用 return 或函数封装</text>

  <rect x="430" y="420" width="300" height="50" rx="6" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2"/>
  <text x="445" y="440" font-size="10" font-weight="600" fill="#ef4444">⚠️ 死循环警告</text>
  <text x="445" y="458" font-size="9" fill="#94a3b8">while (true) { ... } 必须有 break 出口</text>

  <!-- 底部口诀 -->
  <rect x="30" y="500" width="720" height="60" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="0.8"/>
  <text x="390" y="525" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">💡 循环控制口诀</text>
  <text x="390" y="545" font-size="10" fill="#cbd5e1" text-anchor="middle">break 整个跳 · continue 这次跳 · 标签语句跳多层 · while(true) 要带 break</text>
</svg>
