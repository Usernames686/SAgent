<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="url(#bg4)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#2dd4bf" text-anchor="middle">async/await — 同步写法，异步执行</text>

  <!-- async function -->
  <rect x="40" y="60" width="680" height="80" rx="10" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.4"/>
  <text x="60" y="85" font-size="12" font-weight="700" fill="#5eead4" font-family="monospace">async function fetchUser(id) {</text>
  <text x="80" y="105" font-size="10.5" fill="#94a3b8" font-family="monospace">const res  = await fetch(\`/api/users/\${id}\`);  // 等待请求完成</text>
  <text x="80" y="125" font-size="10.5" fill="#94a3b8" font-family="monospace">const data = await res.json();                  // 等待解析完成</text>

  <!-- magic -->
  <rect x="40" y="155" width="680" height="110" rx="10" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="60" y="180" font-size="12" font-weight="700" fill="#c4b5fd">🎯 async/await 的"魔法"本质</text>
  <text x="60" y="205" font-size="10" fill="#94a3b8">async function 永远返回 Promise（自动包装）</text>
  <text x="60" y="225" font-size="10" fill="#94a3b8">await = 暂停函数 + 等待 Promise resolve + 取出 value</text>
  <text x="60" y="245" font-size="10" fill="#94a3b8">抛出异常 = 返回 rejected Promise</text>

  <!-- return -->
  <rect x="40" y="280" width="680" height="100" rx="10" fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="60" y="305" font-size="12" font-weight="700" fill="#fcd34d">return data;  →  自动包装成 Promise.resolve(data)</text>
  <text x="60" y="330" font-size="10" fill="#94a3b8">调用者：const user = await fetchUser(123);</text>
  <text x="60" y="350" font-size="10" fill="#94a3b8">↑ await 解开 Promise，拿到 data</text>
</svg>
