<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
<rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">闭包 · 函数"记住"外部变量</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#ec4899">🧠 闭包 = 函数 + 记住的外部变量</text>
<rect x="30" y="76" width="720" height="160" rx="8" fill="#ec4899" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.2"/>
<text x="50" y="96" font-size="11" fill="#94a3b8">想象你在餐厅点餐：</text>
<rect x="50" y="108" width="220" height="50" rx="6" fill="#ec4899" fill-opacity="0.08"/>
<text x="60" y="128" font-size="10" fill="#ec4899">🍽️ 你点餐 → 服务员记住了</text>
<text x="60" y="148" font-size="10" fill="#ec4899">桌号 + 菜品</text>
<rect x="290" y="108" width="220" height="50" rx="6" fill="#3b82f6" fill-opacity="0.08"/>
<text x="300" y="128" font-size="10" fill="#3b82f6">🚶 你走开 → 服务员</text>
<text x="300" y="148" font-size="10" fill="#3b82f6">仍然能找到你</text>
<rect x="530" y="108" width="200" height="50" rx="6" fill="#22c55e" fill-opacity="0.08"/>
<text x="540" y="128" font-size="10" fill="#22c55e">✅ 菜做好了 → 送到</text>
<text x="540" y="148" font-size="10" fill="#22c55e">你桌上</text>
<text x="50" y="186" font-size="9" fill="#ec4899">服务员 = 闭包函数 | 桌号+菜品 = 被记住的外部变量 | 你走开 = 外层函数执行完</text>
<text x="40" y="256" font-size="13" font-weight="600" fill="#ec4899">闭包的四大用途</text>
<rect x="30" y="268" width="165" height="80" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2"/>
<text x="112" y="292" font-size="20" text-anchor="middle">🔒</text>
<text x="112" y="312" font-size="10" font-weight="600" fill="#ef4444" text-anchor="middle">数据私有化</text>
<text x="112" y="330" font-size="8" fill="#94a3b8" text-anchor="middle">外部无法直接访问</text>
<rect x="210" y="268" width="165" height="80" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.2"/>
<text x="292" y="292" font-size="20" text-anchor="middle">🔄</text>
<text x="292" y="312" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">状态保持</text>
<text x="292" y="330" font-size="8" fill="#94a3b8" text-anchor="middle">函数记住之前的值</text>
<rect x="390" y="268" width="165" height="80" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.2"/>
<text x="472" y="292" font-size="20" text-anchor="middle">🏭</text>
<text x="472" y="312" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">工厂函数</text>
<text x="472" y="330" font-size="8" fill="#94a3b8" text-anchor="middle">生成定制化函数</text>
<rect x="570" y="268" width="165" height="80" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2"/>
<text x="652" y="292" font-size="20" text-anchor="middle">⏱️</text>
<text x="652" y="312" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">回调/防抖</text>
<text x="652" y="330" font-size="8" fill="#94a3b8" text-anchor="middle">异步操作的基础</text>
<rect x="30" y="368" width="720" height="190" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
<text x="50" y="394" font-size="11" font-weight="600" fill="#ec4899">💡 核心理解</text>
<text x="50" y="418" font-size="10" fill="#94a3b8">• 闭包让函数"记住"定义时的环境，即使环境已"离开"</text>
<text x="50" y="440" font-size="10" fill="#94a3b8">• React Hooks 的底层就是闭包 — useState/useEffect</text>
<text x="50" y="462" font-size="10" fill="#94a3b8">• 模块化也靠闭包 — 暴露接口，隐藏实现</text>
<text x="50" y="484" font-size="10" fill="#ef4444">• ⚠️ 闭包持有引用 → 可能内存泄漏，不用时置null</text>
<text x="50" y="510" font-size="10" fill="#ec4899" font-weight="600">口诀：闭包 = 函数 + 记忆，记住定义时，不是调用时</text>
</svg>