<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">三种作用域 · 全局/函数/块级</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#ef4444">① var — 函数作用域（泄漏！）text>
<rect x="30" y="74" width="720" height="120" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.25"/>
<rect x="50" y="90" width="680" height="44" rx="4" fill="#0f172a"/><text x="62" y="108" font-size="9" fill="#94a3b8" font-family="monospace">function fn() {</text><text x="62" y="124" font-size="9" fill="#ef4444" font-family="monospace">  if (true) { var x = 1; }  // x泄漏到整个函数</text><text x="62" y="140" font-size="9" fill="#94a3b8" font-family="monospace">  console.log(x); // 1 ✅ 居然能在if外访问</text><text x="62" y="156" font-size="9" fill="#ef4444">var 忽略块边界，变量泄漏到整个函数</text>
<text x="40" y="216" font-size="13" font-weight="600" fill="#22c55e">② let/const — 块级作用域（安全隔离）text>
<rect x="30" y="226" width="720" height="120" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/>
<rect x="50" y="242" width="680" height="44" rx="4" fill="#0f172a"/><text x="62" y="260" font-size="9" fill="#94a3b8" font-family="monospace">function fn() {</text><text x="62" y="276" font-size="9" fill="#22c55e" font-family="monospace">  if (true) { let x = 1; }  // x被限制在if块内</text><text x="62" y="292" font-size="9" fill="#ef4444" font-family="monospace">  console.log(x); // ❌ ReferenceError</text><text x="62" y="308" font-size="9" fill="#22c55e">let/const遵守块边界，用完即销毁</text>
<text x="40" y="370" font-size="13" font-weight="600" fill="#3b82f6">③ 对比表</text>
<rect x="30" y="380" width="720" height="180" rx="8" fill="#0f172a" stroke="#1e293b"/>
<rect x="30" y="380" width="180" height="28" fill="#f97316" fill-opacity="0.12"/><text x="120" y="399" font-size="11" font-weight="600" fill="#f97316" text-anchor="middle">特性</text><rect x="210" y="380" width="270" height="28" fill="#ef4444" fill-opacity="0.1"/><text x="345" y="399" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle">var</text><rect x="480" y="380" width="270" height="28" fill="#22c55e" fill-opacity="0.1"/><text x="615" y="399" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">let / const</text>
<text x="120" y="428" font-size="10" fill="#cbd5e1" text-anchor="middle">作用域</text><text x="345" y="428" font-size="10" fill="#ef4444" text-anchor="middle">函数</text><text x="615" y="428" font-size="10" fill="#22c55e" text-anchor="middle">块级</text>
<text x="120" y="456" font-size="10" fill="#cbd5e1" text-anchor="middle">提升</text><text x="345" y="456" font-size="10" fill="#ef4444" text-anchor="middle">整体提升</text><text x="615" y="456" font-size="10" fill="#22c55e" text-anchor="middle">TDZ保护</text>
<text x="120" y="484" font-size="10" fill="#cbd5e1" text-anchor="middle">重复声明</text><text x="345" y="484" font-size="10" fill="#ef4444" text-anchor="middle">允许</text><text x="615" y="484" font-size="10" fill="#22c55e" text-anchor="middle">禁止</text>
<text x="120" y="512" font-size="10" fill="#cbd5e1" text-anchor="middle">循环闭包</text><text x="345" y="512" font-size="10" fill="#ef4444" text-anchor="middle">3,3,3 ❌</text><text x="615" y="512" font-size="10" fill="#22c55e" text-anchor="middle">0,1,2 ✅</text>
<text x="120" y="540" font-size="10" fill="#cbd5e1" text-anchor="middle">推荐</text><text x="345" y="540" font-size="10" fill="#ef4444" text-anchor="middle">🚫 别用</text><text x="615" y="540" font-size="10" fill="#22c55e" text-anchor="middle">✅ 首选</text></svg>
