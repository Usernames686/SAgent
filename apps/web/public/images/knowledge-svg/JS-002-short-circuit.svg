<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="system-ui,sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="360" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">逻辑运算符与短路求值</text>
  <rect x="30" y="52" width="230" height="130" rx="10" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="145" y="76" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">&amp;&amp; 与（AND）</text>
  <text x="55" y="98" font-size="11" fill="#94a3b8">左边为真 → 返回右边</text>
  <text x="55" y="116" font-size="11" fill="#94a3b8">左边为假 → 返回左边（短路）</text>
  <text x="55" y="140" font-size="11" fill="#22c55e">1 &amp;&amp; "hi" → "hi"</text>
  <text x="55" y="158" font-size="11" fill="#22c55e">0 &amp;&amp; "hi" → 0</text>
  <rect x="275" y="52" width="230" height="130" rx="10" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="390" y="76" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">|| 或（OR）</text>
  <text x="300" y="98" font-size="11" fill="#94a3b8">左边为真 → 返回左边（短路）</text>
  <text x="300" y="116" font-size="11" fill="#94a3b8">左边为假 → 返回右边</text>
  <text x="300" y="140" font-size="11" fill="#3b82f6">1 || "hi" → 1</text>
  <text x="300" y="158" font-size="11" fill="#3b82f6">0 || "hi" → "hi"</text>
  <rect x="520" y="52" width="230" height="130" rx="10" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="635" y="76" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">?? 空值合并</text>
  <text x="545" y="98" font-size="11" fill="#94a3b8">null/undefined → 返回右边</text>
  <text x="545" y="116" font-size="11" fill="#94a3b8">其他值 → 返回左边</text>
  <text x="545" y="140" font-size="11" fill="#f59e0b">null ?? "默认" → "默认"</text>
  <text x="545" y="158" font-size="11" fill="#f59e0b">0 ?? "默认" → 0 ✅</text>
  <text x="390" y="212" font-size="13" font-weight="600" fill="white" text-anchor="middle">|| vs ?? 关键区别</text>
  <rect x="40" y="228" width="350" height="110" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="215" y="252" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">❌ || 的问题</text>
  <text x="60" y="274" font-size="11" fill="#94a3b8">0、""、false 都是 falsy</text>
  <text x="60" y="294" font-size="11" fill="#ef4444">0 || 10 → 10（0被误判为空）</text>
  <text x="60" y="314" font-size="11" fill="#ef4444">"" || "默认" → "默认"</text>
  <rect x="410" y="228" width="330" height="110" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.15" stroke-width="0.8"/>
  <text x="575" y="252" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">✅ ?? 更安全</text>
  <text x="430" y="274" font-size="11" fill="#94a3b8">只对 null/undefined 生效</text>
  <text x="430" y="294" font-size="11" fill="#22c55e">0 ?? 10 → 0（0是有效值）</text>
  <text x="430" y="314" font-size="11" fill="#22c55e">"" ?? "默认" → ""</text>
</svg>
