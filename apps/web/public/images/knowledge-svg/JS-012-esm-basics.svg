<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fb923c"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="url(#bg)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#fb923c" text-anchor="middle">ES Module — 静态 import/export</text>

  <!-- math.js -->
  <rect x="30" y="60" width="220" height="200" rx="10" fill="#fb923c" fill-opacity="0.08" stroke="#fb923c" stroke-opacity="0.4"/>
  <text x="140" y="85" font-size="13" font-weight="700" fill="#fdba74" text-anchor="middle">math.js</text>
  <line x1="50" y1="95" x2="230" y2="95" stroke="#fb923c" stroke-opacity="0.2"/>
  <text x="50" y="115" font-size="10" fill="#94a3b8" font-family="monospace">// 导出</text>
  <text x="50" y="133" font-size="10" fill="#fbbf24" font-family="monospace">export const PI = 3.14;</text>
  <text x="50" y="151" font-size="10" fill="#fbbf24" font-family="monospace">export function add(a,b){</text>
  <text x="65" y="169" font-size="10" fill="#94a3b8" font-family="monospace">return a + b;</text>
  <text x="50" y="187" font-size="10" fill="#fbbf24" font-family="monospace">}</text>
  <text x="50" y="210" font-size="9" fill="#64748b">🔒 导出绑定（live binding）</text>
  <text x="50" y="225" font-size="9" fill="#64748b">📦 编译时确定依赖</text>
  <text x="50" y="245" font-size="9" fill="#64748b">⚡ 支持 tree-shaking</text>

  <!-- app.js -->
  <rect x="510" y="60" width="220" height="200" rx="10" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.4"/>
  <text x="620" y="85" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">app.js</text>
  <line x1="530" y1="95" x2="710" y2="95" stroke="#34d399" stroke-opacity="0.2"/>
  <text x="530" y="115" font-size="10" fill="#94a3b8" font-family="monospace">// 导入</text>
  <text x="530" y="133" font-size="10" fill="#fbbf24" font-family="monospace">import { PI, add }</text>
  <text x="545" y="151" font-size="10" fill="#fbbf24" font-family="monospace">from './math.js';</text>
  <text x="530" y="175" font-size="10" fill="#94a3b8" font-family="monospace">console.log(PI);    // 3.14</text>
  <text x="530" y="193" font-size="10" fill="#94a3b8" font-family="monospace">console.log(add(1,2)); // 3</text>
  <text x="530" y="220" font-size="9" fill="#64748b">🎯 命名导入：名字必须匹配</text>
  <text x="530" y="245" font-size="9" fill="#64748b">⚡ 同步加载，编译时解析</text>

  <!-- arrow -->
  <path d="M 260 160 L 500 160" stroke="#fb923c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="380" y="155" font-size="10" fill="#fb923c" text-anchor="middle">import { PI, add }</text>

  <!-- key features -->
  <rect x="30" y="290" width="700" height="110" rx="10" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="50" y="315" font-size="12" font-weight="700" fill="#c4b5fd">🔑 ESM 核心特性</text>
  <text x="50" y="340" font-size="10" fill="#94a3b8">✅ 静态结构 — 编译时确定依赖，支持 tree-shaking</text>
  <text x="50" y="360" font-size="10" fill="#94a3b8">✅ Live Binding — 导出的值变化会反映到导入方</text>
  <text x="50" y="380" font-size="10" fill="#94a3b8">✅ 严格模式 — ESM 默认启用 'use strict'</text>
</svg>
