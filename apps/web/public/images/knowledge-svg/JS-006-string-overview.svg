<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">字符串与模板字面量 · 文本处理的瑞士军刀</text>
  <text x="390" y="54" font-size="11" fill="#22c55e" text-anchor="middle">✂️ 拼接 / 截取 / 查找 / 替换 / 格式化</text>

  <text x="40" y="86" font-size="13" font-weight="600" fill="#22c55e">① 模板字面量 = 字符串拼接的革命</text>
  <rect x="30" y="96" width="350" height="140" rx="10" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.25"/>
  <text x="50" y="118" font-size="10" font-weight="600" fill="#ef4444">❌ 传统 + 拼接</text>
  <rect x="50" y="128" width="310" height="44" rx="4" fill="#0f172a"/>
  <text x="62" y="146" font-size="9" fill="#ef4444" font-family="monospace">"姓名: " + name + ", 年龄: " + age</text>
  <text x="62" y="162" font-size="9" fill="#94a3b8">→ 难读、易漏引号、多行更痛苦</text>
  <text x="50" y="192" font-size="10" font-weight="600" fill="#22c55e">✅ 模板字面量 ``</text>
  <rect x="50" y="202" width="310" height="28" rx="4" fill="#22c55e" fill-opacity="0.08"/>
  <text x="62" y="220" font-size="9" fill="#22c55e" font-family="monospace">`姓名: ${name}, 年龄: ${age}`</text>

  <text x="400" y="86" font-size="13" font-weight="600" fill="#3b82f6">② 模板字面量三大能力</text>
  <rect x="400" y="96" width="350" height="140" rx="10" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25"/>
  <text x="420" y="120" font-size="11" font-weight="600" fill="#3b82f6">${} 插值</text>
  <text x="420" y="138" font-size="9" fill="#94a3b8">变量、表达式、函数调用都能放</text>
  <text x="420" y="160" font-size="11" font-weight="600" fill="#3b82f6">多行字符串</text>
  <text x="420" y="178" font-size="9" fill="#94a3b8">直接换行，不需要 \n</text>
  <text x="420" y="200" font-size="11" font-weight="600" fill="#3b82f6">标签模板</text>
  <text x="420" y="218" font-size="9" fill="#94a3b8">高级：自定义字符串处理逻辑</text>

  <text x="40" y="260" font-size="13" font-weight="600" fill="#a855f7">③ 常用字符串方法分类</text>
  <rect x="30" y="270" width="230" height="80" rx="8" fill="#06b6d4" fill-opacity="0.06" stroke="#06b6d4" stroke-opacity="0.25"/>
  <text x="50" y="290" font-size="10" font-weight="600" fill="#06b6d4">查找判断</text>
  <text x="50" y="308" font-size="9" fill="#94a3b8">includes / startsWith / endsWith</text>
  <text x="50" y="326" font-size="9" fill="#94a3b8">indexOf / lastIndexOf</text>
  <text x="50" y="344" font-size="9" fill="#94a3b8">charAt / at</text>

  <rect x="275" y="270" width="230" height="80" rx="8" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.25"/>
  <text x="295" y="290" font-size="10" font-weight="600" fill="#f97316">截取分割</text>
  <text x="295" y="308" font-size="9" fill="#94a3b8">slice / substring</text>
  <text x="295" y="326" font-size="9" fill="#94a3b8">split / trim</text>
  <text x="295" y="344" font-size="9" fill="#94a3b8">padStart / padEnd</text>

  <rect x="520" y="270" width="230" height="80" rx="8" fill="#a855f7" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="540" y="290" font-size="10" font-weight="600" fill="#a855f7">替换转换</text>
  <text x="540" y="308" font-size="9" fill="#94a3b8">replace / replaceAll</text>
  <text x="540" y="326" font-size="9" fill="#94a3b8">toUpperCase / toLowerCase</text>
  <text x="540" y="344" font-size="9" fill="#94a3b8">repeat / concat</text>

  <text x="40" y="380" font-size="13" font-weight="600" fill="#eab308">④ 7 步深度学习路径</text>
  <g font-size="10">
    <rect x="30"  y="396" width="100" height="56" rx="8" fill="#f97316" fill-opacity="0.10" stroke="#f97316" stroke-opacity="0.3"/>
    <text x="80"  y="418" text-anchor="middle" font-weight="700" fill="#f97316">① 概览</text>
    <text x="80"  y="436" text-anchor="middle" font-size="8" fill="#94a3b8">生活类比</text>
    <rect x="135" y="396" width="100" height="56" rx="8" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="185" y="418" text-anchor="middle" font-weight="700" fill="#22c55e">② 模板语法</text>
    <text x="185" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">插值/多行</text>
    <rect x="240" y="396" width="100" height="56" rx="8" fill="#06b6d4" fill-opacity="0.10" stroke="#06b6d4" stroke-opacity="0.3"/>
    <text x="290" y="418" text-anchor="middle" font-weight="700" fill="#06b6d4">③ 查找判断</text>
    <text x="290" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">includes等</text>
    <rect x="345" y="396" width="100" height="56" rx="8" fill="#a855f7" fill-opacity="0.10" stroke="#a855f7" stroke-opacity="0.3"/>
    <text x="395" y="418" text-anchor="middle" font-weight="700" fill="#a855f7">④ 截取分割</text>
    <text x="395" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">slice/split</text>
    <rect x="450" y="396" width="100" height="56" rx="8" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.3"/>
    <text x="500" y="418" text-anchor="middle" font-weight="700" fill="#3b82f6">⑤ 替换转换</text>
    <text x="500" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">replace</text>
    <rect x="555" y="396" width="100" height="56" rx="8" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.3"/>
    <text x="605" y="418" text-anchor="middle" font-weight="700" fill="#eab308">⑥ 陷阱</text>
    <text x="605" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">不可变/编码</text>
    <rect x="660" y="396" width="90"  height="56" rx="8" fill="#ec4899" fill-opacity="0.10" stroke="#ec4899" stroke-opacity="0.3"/>
    <text x="705" y="418" text-anchor="middle" font-weight="700" fill="#ec4899">⑦ 口诀</text>
    <text x="705" y="436" text-anchor="middle" font-size="8" fill="#94a3b8">速查表</text>
  </g>
  <text x="390" y="478" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">🎯 学完这 7 步，字符串操作不再有盲区</text>
</svg>
