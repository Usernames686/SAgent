<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
<rect width="780" height="580" fill="url(#bg)" rx="12"/>
<text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">块级作用域 · let/const的安全墙</text>
<text x="40" y="64" font-size="13" font-weight="600" fill="#22c55e">🧱 {}就是块 — let/const只在块内可见</text>
<rect x="30" y="76" width="720" height="200" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.2"/>
<text x="50" y="100" font-size="10" fill="#94a3b8" font-family="monospace">if (true) {</text>
<text x="70" y="120" font-size="10" fill="#22c55e" font-family="monospace">let a = 1;      // 只在if块内可见</text>
<text x="70" y="140" font-size="10" fill="#22c55e" font-family="monospace">const b = 2;    // 只在if块内可见</text>
<text x="70" y="160" font-size="10" fill="#ef4444" font-family="monospace">var c = 3;      // ⚠️ 泄漏到外面！</text>
<text x="50" y="180" font-size="10" fill="#94a3b8" font-family="monospace">}</text>
<text x="50" y="204" font-size="10" fill="#ef4444" font-family="monospace">console.log(a);  // ❌ ReferenceError</text>
<text x="50" y="222" font-size="10" fill="#ef4444" font-family="monospace">console.log(b);  // ❌ ReferenceError</text>
<text x="350" y="204" font-size="10" fill="#ef4444" font-family="monospace">console.log(c);  // 3 ✅ var泄漏了！</text>
<text x="40" y="296" font-size="13" font-weight="600" fill="#3b82f6">📋 各种块级作用域场景</text>
<rect x="30" y="308" width="225" height="120" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.2"/>
<text x="50" y="330" font-size="10" font-weight="600" fill="#3b82f6">for 循环</text>
<text x="50" y="350" font-size="9" fill="#94a3b8" font-family="monospace">for (let i=0; i&lt;3; i++) {</text>
<text x="65" y="368" font-size="9" fill="#22c55e" font-family="monospace">let temp = i*2;</text>
<text x="50" y="386" font-size="9" fill="#94a3b8" font-family="monospace">}</text>
<text x="50" y="410" font-size="8" fill="#22c55e">i, temp 块外不可见</text>
<rect x="275" y="308" width="225" height="120" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.2"/>
<text x="295" y="330" font-size="10" font-weight="600" fill="#a855f7">if/else 块</text>
<text x="295" y="350" font-size="9" fill="#94a3b8" font-family="monospace">if (cond) {</text>
<text x="310" y="368" font-size="9" fill="#22c55e" font-family="monospace">const x = 1;</text>
<text x="295" y="386" font-size="9" fill="#94a3b8" font-family="monospace">} else {</text>
<text x="310" y="404" font-size="9" fill="#22c55e" font-family="monospace">const x = 2; // ✅不冲突</text>
<text x="295" y="420" font-size="9" fill="#94a3b8" font-family="monospace">}</text>
<rect x="520" y="308" width="225" height="120" rx="8" fill="#f97316" fill-opacity="0.04" stroke="#f97316" stroke-opacity="0.2"/>
<text x="540" y="330" font-size="10" font-weight="600" fill="#f97316">switch case</text>
<text x="540" y="350" font-size="9" fill="#94a3b8" font-family="monospace">switch(x) {</text>
<text x="555" y="368" font-size="9" fill="#22c55e" font-family="monospace">case 1: {</text>
<text x="570" y="386" font-size="9" fill="#22c55e" font-family="monospace">const v=1;</text>
<text x="555" y="404" font-size="9" fill="#22c55e" font-family="monospace">} // 需要{}</text>
<text x="540" y="420" font-size="9" fill="#94a3b8" font-family="monospace">}</text>
<rect x="30" y="448" width="720" height="110" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.5"/>
<text x="50" y="474" font-size="11" font-weight="600" fill="#22c55e">💡 核心记忆</text>
<text x="50" y="498" font-size="10" fill="#94a3b8">• {} 内用 let/const 声明的变量，只在 {} 内可见</text>
<text x="50" y="518" font-size="10" fill="#ef4444">• var 没有 {} 块级作用域 — 变量泄漏到函数/全局</text>
<text x="50" y="538" font-size="10" fill="#22c55e">• 块级作用域是 ES6 最重要的安全改进 — 永远用 let/const</text>
</svg>