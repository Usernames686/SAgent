<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">循环闭包陷阱 · var vs let</text><text x="40" y="64" font-size="13" font-weight="600" fill="#ef4444">① var + setTimeout = 3,3,3</text><rect x="30" y="74" width="720" height="160" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.25"/><text x="50" y="96" font-size="10" fill="#ef4444" font-family="monospace">for (var i = 0; i &lt; 3; i++) {</text><text x="70" y="114" font-size="10" fill="#ef4444" font-family="monospace">setTimeout(() => console.log(i), 100);</text><text x="50" y="132" font-size="10" fill="#ef4444" font-family="monospace">}</text><text x="50" y="156" font-size="10" fill="#ef4444">输出: 3, 3, 3 ← 不是0,1,2！</text><text x="50" y="176" font-size="9" fill="#ef4444">var i 是函数作用域，3个回调共享同一个i</text><text x="50" y="196" font-size="9" fill="#ef4444">循环结束时i=3，3个回调都读到3</text><text x="50" y="216" font-size="9" fill="#ef4444">闭包"记住"的是i的引用，不是i当时的值</text><text x="40" y="250" font-size="13" font-weight="600" fill="#22c55e">② let + setTimeout = 0,1,2 ✅</text><rect x="30" y="260" width="720" height="100" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/><text x="50" y="282" font-size="10" fill="#22c55e" font-family="monospace">for (let i = 0; i &lt; 3; i++) {</text><text x="70" y="300" font-size="10" fill="#22c55e" font-family="monospace">setTimeout(() => console.log(i), 100);</text><text x="50" y="318" font-size="10" fill="#22c55e" font-family="monospace">}</text><text x="50" y="342" font-size="10" fill="#22c55e">输出: 0, 1, 2 ✅</text><text x="50" y="352" font-size="9" fill="#22c55e">let i 每次循环创建新的作用域，回调各自记住自己的i</text><text x="40" y="384" font-size="13" font-weight="600" fill="#a855f7">③ IIFE修复（不用let时）</text><rect x="30" y="394" width="720" height="80" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/><text x="50" y="416" font-size="10" fill="#a855f7" font-family="monospace">for (var i = 0; i &lt; 3; i++) {</text><text x="70" y="434" font-size="10" fill="#a855f7" font-family="monospace">(function(j) { setTimeout(() => console.log(j), 100); })(i);</text><text x="50" y="452" font-size="10" fill="#a855f7" font-family="monospace">}</text><text x="50" y="468" font-size="9" fill="#eab308">IIFE每次创建新作用域，j是独立副本</text><text x="40" y="498" font-size="13" font-weight="600" fill="#eab308">④ React闭包陷阱：stale closure</text><rect x="30" y="508" width="720" height="56" rx="8" fill="#eab308" fill-opacity="0.04" stroke="#eab308" stroke-opacity="0.2"/><text x="50" y="530" font-size="10" fill="#eab308">setTimeout里读到旧state → 用useRef或函数式更新解决</text><text x="50" y="550" font-size="9" fill="#94a3b8">setCount(c => c + 1) 而非 setCount(count + 1)</text></svg>
