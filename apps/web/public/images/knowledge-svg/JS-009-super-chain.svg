<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs><linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#0f172a"/></linearGradient></defs>
  <rect width="760" height="340" fill="url(#bg4)"/>
  <text x="380" y="28" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">super() 调用链 — 子类必须先 super()</text>
  <rect x="40" y="50" width="680" height="80" rx="10" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.3"/>
  <text x="60" y="75" font-size="11" font-weight="600" fill="#fca5a5" font-family="monospace">class Dog extends Animal {</text>
  <text x="80" y="95" font-size="10.5" fill="#94a3b8" font-family="monospace">constructor(name) {</text>
  <text x="100" y="115" font-size="10.5" fill="#f87171" font-family="monospace">// this.name = name;  // ❌ ReferenceError: Must call super()</text>
  <text x="100" y="125" font-size="10.5" fill="#34d399" font-family="monospace">super(name);         // ✅ 先调用父类构造函数</text>
  <rect x="40" y="150" width="680" height="70" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="60" y="175" font-size="11" font-weight="600" fill="#6ee7b7">super() 做了什么？</text>
  <text x="60" y="195" font-size="10" fill="#94a3b8">① 调用 Animal.constructor，初始化父类属性到 this 上</text>
  <text x="60" y="212" font-size="10" fill="#94a3b8">② 绑定 this — super() 之后 this 才可用，之前是 uninitialized</text>
  <text x="40" y="250" font-size="11" font-weight="600" fill="#fbbf24">super.method() — 调用父类方法</text>
  <text x="40" y="270" font-size="10" fill="#94a3b8" font-family="monospace">speak() { return super.speak() + "汪"; }  // 扩展父类方法</text>
  <text x="40" y="300" font-size="10" fill="#94a3b8">💡 super 在 constructor 中是函数调用，在方法中是对象（指向父类 prototype）</text>
  <text x="40" y="320" font-size="10" fill="#f87171">⚠️ 箭头函数没有 super — 因为没有自己的 this 绑定</text>
</svg>
