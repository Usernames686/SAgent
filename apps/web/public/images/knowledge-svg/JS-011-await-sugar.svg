<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="760" height="420" fill="url(#bg2)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#2dd4bf" text-anchor="middle">await 的本质 — 语法糖解构</text>

  <!-- left: async/await -->
  <rect x="30" y="60" width="340" height="340" rx="12" fill="#2dd4bf" fill-opacity="0.06" stroke="#2dd4bf" stroke-opacity="0.3"/>
  <text x="200" y="85" font-size="12" font-weight="700" fill="#5eead4" text-anchor="middle">async/await 写法</text>
  <text x="50" y="115" font-size="10" fill="#94a3b8" font-family="monospace">async function f() {</text>
  <text x="65" y="133" font-size="10" fill="#94a3b8" font-family="monospace">try {</text>
  <text x="80" y="151" font-size="10" fill="#fbbf24" font-family="monospace">const r = await p;</text>
  <text x="80" y="169" font-size="10" fill="#94a3b8" font-family="monospace">return r;</text>
  <text x="65" y="187" font-size="10" fill="#94a3b8" font-family="monospace">} catch (e) {</text>
  <text x="80" y="205" font-size="10" fill="#fca5a5" font-family="monospace">throw e;</text>
  <text x="65" y="223" font-size="10" fill="#94a3b8" font-family="monospace">}</text>
  <text x="50" y="241" font-size="10" fill="#94a3b8" font-family="monospace">}</text>

  <!-- arrow -->
  <path d="M 370 200 L 390 200" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="380" y="190" font-size="9" fill="#a78bfa" text-anchor="middle">等价</text>

  <!-- right: Promise -->
  <rect x="390" y="60" width="340" height="340" rx="12" fill="#a78bfa" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="560" y="85" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">Promise 链写法</text>
  <text x="410" y="115" font-size="10" fill="#94a3b8" font-family="monospace">function f() {</text>
  <text x="425" y="133" font-size="10" fill="#94a3b8" font-family="monospace">return p</text>
  <text x="440" y="151" font-size="10" fill="#fbbf24" font-family="monospace">.then(r => r)</text>
  <text x="440" y="169" font-size="10" fill="#fca5a5" font-family="monospace">.catch(e => { throw e; });</text>
  <text x="410" y="187" font-size="10" fill="#94a3b8" font-family="monospace">}</text>

  <!-- key points -->
  <text x="410" y="220" font-size="10" fill="#5eead4">🔑 await = .then() 的语法糖</text>
  <text x="410" y="240" font-size="10" fill="#5eead4">🔑 async = 自动包装返回值为 Promise</text>
  <text x="410" y="260" font-size="10" fill="#5eead4">🔑 try/catch = .catch() 的语法糖</text>
  <text x="410" y="280" font-size="10" fill="#fca5a5">⚠️ await 只能在 async 函数内</text>
  <text x="410" y="300" font-size="10" fill="#fca5a5">⚠️ 箭头函数也能 async</text>
  <text x="410" y="320" font-size="10" fill="#94a3b8">💡 顶层 await 需要 ES2022 + module</text>
  <text x="410" y="350" font-size="11" font-weight="600" fill="#fbbf24">🏆 async/await 让异步代码像同步</text>
</svg>
