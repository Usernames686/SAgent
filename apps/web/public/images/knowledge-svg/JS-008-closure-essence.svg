<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">闭包本质 · 函数"记住"外部变量</text><text x="40" y="64" font-size="13" font-weight="600" fill="#ec4899">① 闭包形成过程</text><rect x="30" y="74" width="720" height="200" rx="8" fill="#ec4899" fill-opacity="0.04" stroke="#ec4899" stroke-opacity="0.25"/><text x="50" y="96" font-size="10" fill="#94a3b8" font-family="monospace">function createCounter() {</text><text x="70" y="114" font-size="10" fill="#ec4899" font-family="monospace">let count = 0;  // ← 外层变量</text><text x="70" y="132" font-size="10" fill="#3b82f6" font-family="monospace">return () => {  // ← 返回的函数</text><text x="90" y="150" font-size="10" fill="#3b82f6" font-family="monospace">count++;       // ← 引用外层count</text><text x="90" y="168" font-size="10" fill="#3b82f6" font-family="monospace">return count;</text><text x="70" y="186" font-size="10" fill="#3b82f6" font-family="monospace">};</text><text x="50" y="204" font-size="10" fill="#94a3b8" font-family="monospace">}</text><rect x="50" y="214" width="680" height="44" rx="4" fill="#ec4899" fill-opacity="0.08"/><text x="62" y="232" font-size="9" fill="#ec4899">createCounter执行完 → count本该销毁</text><text x="62" y="250" font-size="9" fill="#22c55e">但返回的函数引用了count → 闭包保持count存活！</text><text x="40" y="294" font-size="13" font-weight="600" fill="#a855f7">② 闭包 = 函数 + 词法环境</text><rect x="30" y="304" width="350" height="100" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/><text x="50" y="326" font-size="11" font-weight="600" fill="#a855f7">返回的函数</text><text x="50" y="348" font-size="9" fill="#94a3b8">() => { count++; return count; }</text><text x="50" y="370" font-size="9" fill="#94a3b8">携带对count的引用</text><text x="50" y="392" font-size="9" fill="#eab308">count不被垃圾回收</text><rect x="400" y="304" width="350" height="100" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/><text x="420" y="326" font-size="11" font-weight="600" fill="#22c55e">外部无法直接访问count</text><text x="420" y="348" font-size="9" fill="#94a3b8">counter.count → undefined</text><text x="420" y="370" font-size="9" fill="#ef4444">count → ReferenceError</text><text x="420" y="392" font-size="9" fill="#22c55e">只能通过返回的方法操作</text><text x="40" y="428" font-size="13" font-weight="600" fill="#3b82f6">③ 四大应用场景</text><rect x="30" y="438" width="170" height="56" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-opacity="0.2"/><text x="115" y="460" text-anchor="middle" font-weight="600" fill="#ef4444" font-size="10">数据私有化</text><text x="115" y="478" text-anchor="middle" font-size="8" fill="#94a3b8">模拟private</text><rect x="210" y="438" width="170" height="56" rx="8" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.2"/><text x="295" y="460" text-anchor="middle" font-weight="600" fill="#3b82f6" font-size="10">状态保持</text><text x="295" y="478" text-anchor="middle" font-size="8" fill="#94a3b8">记住之前的值</text><rect x="390" y="438" width="170" height="56" rx="8" fill="#a855f7" fill-opacity="0.06" stroke="#a855f7" stroke-opacity="0.2"/><text x="475" y="460" text-anchor="middle" font-weight="600" fill="#a855f7" font-size="10">工厂函数</text><text x="475" y="478" text-anchor="middle" font-size="8" fill="#94a3b8">生成定制函数</text><rect x="570" y="438" width="170" height="56" rx="8" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-opacity="0.2"/><text x="655" y="460" text-anchor="middle" font-weight="600" fill="#22c55e" font-size="10">回调/事件</text><text x="655" y="478" text-anchor="middle" font-size="8" fill="#94a3b8">React Hooks</text><text x="390" y="520" font-size="11" font-weight="600" fill="#eab308" text-anchor="middle">React的useState就是闭包：组件执行完后state仍被保持</text></svg>
