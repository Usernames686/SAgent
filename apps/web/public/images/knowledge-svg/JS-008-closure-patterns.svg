<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui,sans-serif"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs><rect width="780" height="580" fill="url(#bg)" rx="12"/><text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">闭包实战 · 私有化 / 工厂 / 防抖节流</text><text x="40" y="64" font-size="13" font-weight="600" fill="#ef4444">① 数据私有化</text><rect x="30" y="74" width="720" height="110" rx="8" fill="#ef4444" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.25"/><text x="50" y="96" font-size="10" fill="#ef4444" font-family="monospace">function createCounter(init = 0) {</text><text x="70" y="114" font-size="10" fill="#ef4444" font-family="monospace">let count = init; // 私有！外部无法直接访问</text><text x="70" y="132" font-size="10" fill="#ef4444" font-family="monospace">return { increment: () => ++count, get: () => count };</text><text x="50" y="150" font-size="10" fill="#ef4444" font-family="monospace">}</text><text x="50" y="172" font-size="9" fill="#eab308">外部只能通过方法操作，无法直接改count</text><text x="40" y="204" font-size="13" font-weight="600" fill="#3b82f6">② 工厂函数</text><rect x="30" y="214" width="720" height="90" rx="8" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-opacity="0.25"/><text x="50" y="236" font-size="10" fill="#3b82f6" font-family="monospace">function createMultiplier(factor) {</text><text x="70" y="254" font-size="10" fill="#3b82f6" font-family="monospace">return (n) => n * factor; // 记住factor</text><text x="50" y="272" font-size="10" fill="#3b82f6" font-family="monospace">}</text><text x="50" y="292" font-size="9" fill="#eab308">const double = createMultiplier(2); double(5) → 10</text><text x="40" y="324" font-size="13" font-weight="600" fill="#a855f7">③ 防抖（debounce）</text><rect x="30" y="334" width="720" height="90" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/><text x="50" y="356" font-size="10" fill="#a855f7" font-family="monospace">function debounce(fn, ms) {</text><text x="70" y="374" font-size="10" fill="#a855f7" font-family="monospace">let timer; // 闭包保持timer引用</text><text x="70" y="392" font-size="10" fill="#a855f7" font-family="monospace">return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };</text><text x="50" y="410" font-size="10" fill="#a855f7" font-family="monospace">}</text><text x="40" y="444" font-size="13" font-weight="600" fill="#22c55e">④ 只执行一次（once）</text><rect x="30" y="454" width="720" height="110" rx="8" fill="#22c55e" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/><text x="50" y="476" font-size="10" fill="#22c55e" font-family="monospace">function once(fn) {</text><text x="70" y="494" font-size="10" fill="#22c55e" font-family="monospace">let called = false, result;</text><text x="70" y="512" font-size="10" fill="#22c55e" font-family="monospace">return (...args) => { if (!called) { called = true; result = fn(...args); } return result; };</text><text x="50" y="530" font-size="10" fill="#22c55e" font-family="monospace">}</text><text x="50" y="552" font-size="9" fill="#eab308">所有模式核心：let变量被闭包保持，外部无法直接访问</text></svg>
