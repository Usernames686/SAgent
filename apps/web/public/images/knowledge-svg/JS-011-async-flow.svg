<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2dd4bf"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="url(#bg)"/>
  <text x="380" y="30" font-size="14" font-weight="700" fill="#2dd4bf" text-anchor="middle">async/await 执行流程 — 同步写法，异步执行</text>

  <!-- async function box -->
  <rect x="40" y="60" width="680" height="90" rx="10" fill="#2dd4bf" fill-opacity="0.08" stroke="#2dd4bf" stroke-opacity="0.4"/>
  <text x="60" y="85" font-size="12" font-weight="700" fill="#5eead4" font-family="monospace">async function fetchUser(id) {</text>
  <text x="80" y="105" font-size="10.5" fill="#94a3b8" font-family="monospace">const res  = await fetch(`/api/users/${id}`);  // ← 暂停，等待 Promise</text>
  <text x="80" y="125" font-size="10.5" fill="#94a3b8" font-family="monospace">const data = await res.json();                  // ← 再次暂停</text>
  <text x="80" y="143" font-size="9.5" fill="#64748b">return data;  // ← 自动包装成 Promise.resolve(data)</text>

  <!-- timeline -->
  <line x1="100" y1="200" x2="100" y2="380" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="195" font-size="9" fill="#64748b" text-anchor="middle">t=0</text>

  <!-- step 1 -->
  <circle cx="100" cy="220" r="4" fill="#2dd4bf"/>
  <text x="120" y="225" font-size="10" fill="#94a3b8">① 调用 fetchUser(123) → 立即返回 Promise(pending)</text>

  <!-- step 2 -->
  <circle cx="100" cy="260" r="4" fill="#2dd4bf"/>
  <text x="120" y="265" font-size="10" fill="#94a3b8">② 执行到 await fetch(...) → 函数暂停，控制权返回调用者</text>

  <!-- step 3 -->
  <circle cx="100" cy="300" r="4" fill="#2dd4bf"/>
  <text x="120" y="305" font-size="10" fill="#94a3b8">③ fetch 完成，Promise resolve → 函数恢复，res 有值</text>

  <!-- step 4 -->
  <circle cx="100" cy="340" r="4" fill="#2dd4bf"/>
  <text x="120" y="345" font-size="10" fill="#94a3b8">④ 执行到 await res.json() → 再次暂停...</text>

  <!-- step 5 -->
  <circle cx="100" cy="375" r="4" fill="#34d399"/>
  <text x="120" y="380" font-size="10" fill="#6ee7b7">⑤ json 完成 → return data → Promise resolve</text>

  <text x="40" y="405" font-size="10" fill="#a78bfa">💡 async 函数永远返回 Promise。await 暂停函数但不阻塞主线程。</text>
</svg>
