<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">for...of vs for...in · 遍历的本质区别</text>

  <!-- for...of -->
  <text x="40" y="62" font-size="12" font-weight="600" fill="#3b82f6">① for...of — 遍历"值"</text>
  <rect x="30" y="72" width="350" height="220" rx="10" fill="#3b82f6" fill-opacity="0.03" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.8"/>

  <!-- 数组可视化 -->
  <text x="50" y="94" font-size="10" fill="#94a3b8">数组：const arr = ["🍎", "🍌", "🍒"]</text>

  <!-- 数组方格 -->
  <g font-size="14" text-anchor="middle">
    <rect x="50"  y="108" width="60" height="50" rx="4" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="80"  y="140" fill="#3b82f6">🍎</text>
    <text x="80"  y="172" font-size="9" fill="#64748b">index 0</text>

    <rect x="120" y="108" width="60" height="50" rx="4" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="150" y="140" fill="#3b82f6">🍌</text>
    <text x="150" y="172" font-size="9" fill="#64748b">index 1</text>

    <rect x="190" y="108" width="60" height="50" rx="4" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.5"/>
    <text x="220" y="140" fill="#3b82f6">🍒</text>
    <text x="220" y="172" font-size="9" fill="#64748b">index 2</text>
  </g>

  <!-- 迭代箭头 -->
  <line x1="80" y1="200" x2="80" y2="220" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="216" font-size="9" fill="#22c55e">第1次：🍎</text>

  <line x1="150" y1="200" x2="150" y2="240" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="236" font-size="9" fill="#22c55e">第2次：🍌</text>

  <line x1="220" y1="200" x2="220" y2="260" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="256" font-size="9" fill="#22c55e">第3次：🍒</text>

  <rect x="50" y="276" width="310" height="12" rx="2" fill="#22c55e" fill-opacity="0.06"/>
  <text x="58" y="285" font-size="9" fill="#22c55e">✅ 拿到的是"值"：苹果、香蕉、樱桃</text>

  <!-- for...in -->
  <text x="400" y="62" font-size="12" font-weight="600" fill="#eab308">② for...in — 遍历"键名"</text>
  <rect x="400" y="72" width="350" height="220" rx="10" fill="#eab308" fill-opacity="0.03" stroke="#eab308" stroke-opacity="0.2" stroke-width="0.8"/>

  <text x="420" y="94" font-size="10" fill="#94a3b8">对象：const user = { name: "小明", age: 20 }</text>

  <!-- 对象可视化 -->
  <rect x="420" y="108" width="140" height="56" rx="6" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.4" stroke-width="1"/>
  <text x="430" y="124" font-size="9" fill="#eab308" font-family="monospace">key: "name"</text>
  <text x="430" y="140" font-size="9" fill="#94a3b8" font-family="monospace">value: "小明"</text>
  <text x="430" y="156" font-size="9" fill="#64748b" font-family="monospace">→ 拿到 "name"</text>

  <rect x="580" y="108" width="140" height="56" rx="6" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.4" stroke-width="1"/>
  <text x="590" y="124" font-size="9" fill="#eab308" font-family="monospace">key: "age"</text>
  <text x="590" y="140" font-size="9" fill="#94a3b8" font-family="monospace">value: 20</text>
  <text x="590" y="156" font-size="9" fill="#64748b" font-family="monospace">→ 拿到 "age"</text>

  <!-- 迭代 -->
  <line x1="490" y1="164" x2="490" y2="200" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="196" font-size="9" fill="#22c55e">第1次拿 key = "name"</text>

  <line x1="650" y1="164" x2="650" y2="240" stroke="#22c55e" stroke-width="1.5"/>
  <text x="660" y="236" font-size="9" fill="#22c55e">第2次拿 key = "age"</text>

  <rect x="420" y="276" width="310" height="12" rx="2" fill="#eab308" fill-opacity="0.10"/>
  <text x="428" y="285" font-size="9" fill="#eab308">⚠️ 拿到的是"键名字符串"，不是值</text>

  <!-- 陷阱区 -->
  <text x="40" y="316" font-size="12" font-weight="600" fill="#ef4444">③ 三个致命陷阱</text>

  <rect x="30" y="328" width="230" height="80" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="45" y="348" font-size="10" font-weight="600" fill="#ef4444">🚫 用 for...in 遍历数组</text>
  <text x="45" y="366" font-size="9" fill="#94a3b8" font-family="monospace">for (const i in [10,20]) {</text>
  <text x="45" y="380" font-size="9" fill="#94a3b8" font-family="monospace">  console.log(i); // "0","1" 字符串</text>
  <text x="45" y="398" font-size="8.5" fill="#ef4444">→ 拿到字符串键名，做算术会出错</text>

  <rect x="275" y="328" width="230" height="80" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="290" y="348" font-size="10" font-weight="600" fill="#ef4444">🚫 for...of 普通对象</text>
  <text x="290" y="366" font-size="9" fill="#94a3b8" font-family="monospace">for (const v of {a:1}) {</text>
  <text x="290" y="380" font-size="9" fill="#ef4444" font-family="monospace">  // ❌ TypeError: not iterable</text>
  <text x="290" y="398" font-size="8.5" fill="#ef4444">→ 普通对象不可迭代，只能用 for...in</text>

  <rect x="520" y="328" width="230" height="80" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="0.6"/>
  <text x="535" y="348" font-size="10" font-weight="600" fill="#ef4444">🚫 for...in 包含原型链</text>
  <text x="535" y="366" font-size="9" fill="#94a3b8" font-family="monospace">for (const k in obj) {</text>
  <text x="535" y="380" font-size="9" fill="#94a3b8" font-family="monospace">  if (obj.hasOwnProperty(k)) { ... }</text>
  <text x="535" y="398" font-size="8.5" fill="#ef4444">→ 不过滤会遍历到原型上的属性</text>

  <!-- 决策表 -->
  <text x="40" y="438" font-size="12" font-weight="600" fill="#22c55e">④ 决策速查表</text>

  <rect x="30" y="450" width="720" height="100" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="0.6"/>

  <!-- 表头 -->
  <rect x="30" y="450" width="180" height="28" rx="4" fill="#f97316" fill-opacity="0.10"/>
  <text x="120" y="468" font-size="10" font-weight="600" fill="#f97316" text-anchor="middle">数据类型</text>

  <rect x="210" y="450" width="270" height="28" rx="4" fill="#3b82f6" fill-opacity="0.10"/>
  <text x="345" y="468" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">推荐方式</text>

  <rect x="480" y="450" width="270" height="28" rx="4" fill="#22c55e" fill-opacity="0.10"/>
  <text x="615" y="468" font-size="10" font-weight="600" fill="#22c55e" text-anchor="middle">原因</text>

  <!-- 行 -->
  <text x="120" y="498" font-size="9" fill="#cbd5e1" text-anchor="middle">数组 [1,2,3]</text>
  <text x="345" y="498" font-size="9" fill="#3b82f6" text-anchor="middle">for...of</text>
  <text x="615" y="498" font-size="9" fill="#94a3b8" text-anchor="middle">直接拿到值，代码简洁</text>

  <text x="120" y="520" font-size="9" fill="#cbd5e1" text-anchor="middle">对象 {a:1}</text>
  <text x="345" y="520" font-size="9" fill="#eab308" text-anchor="middle">for...in 或 Object.keys()</text>
  <text x="615" y="520" font-size="9" fill="#94a3b8" text-anchor="middle">对象不可迭代，只能遍历键名</text>

  <text x="120" y="542" font-size="9" fill="#cbd5e1" text-anchor="middle">字符串 "abc"</text>
  <text x="345" y="542" font-size="9" fill="#3b82f6" text-anchor="middle">for...of</text>
  <text x="615" y="542" font-size="9" fill="#94a3b8" text-anchor="middle">字符串可迭代，按字符遍历</text>
</svg>
