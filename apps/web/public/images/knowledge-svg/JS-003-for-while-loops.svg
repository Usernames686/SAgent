<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="32" font-size="16" font-weight="700" fill="white" text-anchor="middle">for · while · do...while 三种循环对比</text>

  <!-- for 循环 -->
  <text x="40" y="62" font-size="12" font-weight="600" fill="#f97316">① for 循环 — 已知次数</text>
  <rect x="30" y="72" width="230" height="430" rx="10" fill="#f97316" fill-opacity="0.03" stroke="#f97316" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="60" y="88" width="170" height="26" rx="13" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4"/>
  <text x="145" y="105" font-size="10" font-weight="600" fill="#f97316" text-anchor="middle">for (let i=0; i&lt;5; i++)</text>

  <!-- 流程 -->
  <rect x="60" y="130" width="170" height="28" rx="6" fill="#eab308" fill-opacity="0.10" stroke="#eab308" stroke-opacity="0.4" stroke-width="1"/>
  <text x="145" y="148" font-size="10" fill="#eab308" text-anchor="middle">① 初始化：let i = 0</text>

  <line x1="145" y1="158" x2="145" y2="172" stroke="#475569"/>
  <polygon points="145,172 140,164 150,164" fill="#475569"/>

  <rect x="60" y="178" width="170" height="28" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="145" y="196" font-size="10" fill="#3b82f6" text-anchor="middle">② 判断：i &lt; 5 ?</text>

  <line x1="145" y1="206" x2="145" y2="220" stroke="#22c55e" stroke-width="1.4"/>
  <text x="152" y="216" font-size="9" fill="#22c55e">是</text>
  <polygon points="145,220 140,212 150,212" fill="#22c55e"/>

  <rect x="60" y="226" width="170" height="28" rx="6" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="145" y="244" font-size="10" fill="#22c55e" text-anchor="middle">③ 执行循环体</text>

  <line x1="145" y1="254" x2="145" y2="268" stroke="#475569"/>
  <polygon points="145,268 140,260 150,260" fill="#475569"/>

  <rect x="60" y="274" width="170" height="28" rx="6" fill="#a855f7" fill-opacity="0.10" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="145" y="292" font-size="10" fill="#a855f7" text-anchor="middle">④ 更新：i++</text>

  <!-- 回到判断 -->
  <path d="M 145 274 Q 60 274 60 192" stroke="#a855f7" stroke-width="1.2" fill="none" stroke-dasharray="3,3"/>
  <text x="50" y="240" font-size="8" fill="#a855f7" text-anchor="end">↻ 重新判断</text>

  <text x="145" y="330" font-size="9" fill="#94a3b8" text-anchor="middle" font-family="monospace">输出：0, 1, 2, 3, 4</text>

  <rect x="50" y="350" width="190" height="138" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="62" y="368" font-size="9" fill="#22c55e" font-family="monospace">// 数组求和</text>
  <text x="62" y="382" font-size="9" fill="#94a3b8" font-family="monospace">const arr = [1,2,3,4];</text>
  <text x="62" y="396" font-size="9" fill="#94a3b8" font-family="monospace">let sum = 0;</text>
  <text x="62" y="410" font-size="9" fill="#94a3b8" font-family="monospace">for (let i = 0;</text>
  <text x="62" y="424" font-size="9" fill="#94a3b8" font-family="monospace">     i &lt; arr.length;</text>
  <text x="62" y="438" font-size="9" fill="#94a3b8" font-family="monospace">     i++) {</text>
  <text x="62" y="452" font-size="9" fill="#94a3b8" font-family="monospace">  sum += arr[i];</text>
  <text x="62" y="466" font-size="9" fill="#94a3b8" font-family="monospace">}</text>
  <text x="62" y="480" font-size="9" fill="#22c55e" font-family="monospace">// sum = 10</text>

  <!-- while 循环 -->
  <text x="280" y="62" font-size="12" font-weight="600" fill="#3b82f6">② while — 先判断后执行</text>
  <rect x="270" y="72" width="230" height="430" rx="10" fill="#3b82f6" fill-opacity="0.03" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="300" y="88" width="170" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="385" y="105" font-size="10" font-weight="600" fill="#3b82f6" text-anchor="middle">while (条件)</text>

  <rect x="300" y="130" width="170" height="28" rx="6" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="385" y="148" font-size="10" fill="#3b82f6" text-anchor="middle">① 判断条件</text>

  <line x1="385" y1="158" x2="385" y2="172" stroke="#22c55e" stroke-width="1.4"/>
  <text x="392" y="216" font-size="9" fill="#22c55e">是</text>

  <rect x="300" y="178" width="170" height="28" rx="6" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="385" y="196" font-size="10" fill="#22c55e" text-anchor="middle">② 执行循环体</text>

  <path d="M 385 206 Q 385 220 385 130" stroke="#22c55e" stroke-width="1.2" fill="none" stroke-dasharray="3,3"/>
  <text x="395" y="240" font-size="8" fill="#22c55e">↻ 重新判断</text>

  <rect x="300" y="260" width="170" height="28" rx="6" fill="#ef4444" fill-opacity="0.10" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <text x="385" y="278" font-size="10" fill="#ef4444" text-anchor="middle">③ 条件为假 → 跳出</text>

  <text x="385" y="320" font-size="9" fill="#94a3b8" text-anchor="middle">适合：未知次数、读取流、</text>
  <text x="385" y="334" font-size="9" fill="#94a3b8" text-anchor="middle">轮询条件直到满足</text>

  <rect x="290" y="350" width="190" height="138" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="302" y="368" font-size="9" fill="#22c55e" font-family="monospace">// 倒计时</text>
  <text x="302" y="382" font-size="9" fill="#94a3b8" font-family="monospace">let n = 3;</text>
  <text x="302" y="396" font-size="9" fill="#94a3b8" font-family="monospace">while (n &gt; 0) {</text>
  <text x="302" y="410" font-size="9" fill="#94a3b8" font-family="monospace">  console.log(n);</text>
  <text x="302" y="424" font-size="9" fill="#94a3b8" font-family="monospace">  n--;</text>
  <text x="302" y="438" font-size="9" fill="#94a3b8" font-family="monospace">}</text>
  <text x="302" y="452" font-size="9" fill="#22c55e" font-family="monospace">// 输出 3, 2, 1</text>

  <!-- do...while -->
  <text x="520" y="62" font-size="12" font-weight="600" fill="#a855f7">③ do...while — 先执行后判断</text>
  <rect x="510" y="72" width="240" height="430" rx="10" fill="#a855f7" fill-opacity="0.03" stroke="#a855f7" stroke-opacity="0.2" stroke-width="0.8"/>

  <rect x="540" y="88" width="180" height="26" rx="13" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.4"/>
  <text x="630" y="105" font-size="10" font-weight="600" fill="#a855f7" text-anchor="middle">do { } while (条件)</text>

  <rect x="540" y="130" width="180" height="28" rx="6" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="630" y="148" font-size="10" fill="#22c55e" text-anchor="middle">① 先执行一次循环体</text>

  <line x1="630" y1="158" x2="630" y2="172" stroke="#475569"/>
  <polygon points="630,172 625,164 635,164" fill="#475569"/>

  <rect x="540" y="178" width="180" height="28" rx="6" fill="#a855f7" fill-opacity="0.10" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="630" y="196" font-size="10" fill="#a855f7" text-anchor="middle">② 判断条件</text>

  <rect x="540" y="226" width="180" height="28" rx="6" fill="#22c55e" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="630" y="244" font-size="10" fill="#22c55e" text-anchor="middle">③ 为真 → 回到 ①</text>

  <rect x="540" y="270" width="180" height="28" rx="6" fill="#ef4444" fill-opacity="0.10" stroke="#ef4444" stroke-opacity="0.4" stroke-width="1"/>
  <text x="630" y="288" font-size="10" fill="#ef4444" text-anchor="middle">④ 为假 → 跳出</text>

  <text x="630" y="320" font-size="10" fill="#eab308" text-anchor="middle" font-weight="600">🔑 至少执行一次！</text>
  <text x="630" y="336" font-size="9" fill="#94a3b8" text-anchor="middle">适合：菜单选择、输入校验</text>
  <text x="630" y="350" font-size="9" fill="#94a3b8" text-anchor="middle">必须先做一次再判断的场景</text>

  <rect x="540" y="368" width="180" height="120" rx="6" fill="#0f172a" stroke="#1e293b"/>
  <text x="552" y="386" font-size="9" fill="#22c55e" font-family="monospace">// 至少询问一次</text>
  <text x="552" y="400" font-size="9" fill="#94a3b8" font-family="monospace">let input;</text>
  <text x="552" y="414" font-size="9" fill="#94a3b8" font-family="monospace">do {</text>
  <text x="552" y="428" font-size="9" fill="#94a3b8" font-family="monospace">  input = getInput();</text>
  <text x="552" y="442" font-size="9" fill="#94a3b8" font-family="monospace">} while (input !== "exit");</text>
  <text x="552" y="460" font-size="9" fill="#22c55e" font-family="monospace">// 即使第一次就 "exit"</text>
  <text x="552" y="474" font-size="9" fill="#22c55e" font-family="monospace">// 也已经执行了一次</text>

  <text x="390" y="535" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">💡 选择口诀：次数已知用 for · 条件未知用 while · 至少一次用 do...while</text>
</svg>
