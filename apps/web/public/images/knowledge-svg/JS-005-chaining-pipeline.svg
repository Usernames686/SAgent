<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="system-ui, -apple-system, sans-serif">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#0a1628"/></linearGradient></defs>
  <rect width="780" height="580" fill="url(#bg)" rx="12"/>
  <text x="390" y="34" font-size="17" font-weight="700" fill="white" text-anchor="middle">链式调用 · 数据处理管道</text>

  <text x="40" y="64" font-size="13" font-weight="600" fill="#06b6d4">① 链式调用 = 数据流水线</text>

  <rect x="30" y="74" width="720" height="200" rx="8" fill="#0f172a" stroke="#1e293b"/>
  <text x="50" y="96" font-size="10" fill="#94a3b8">原始数据：students = [{ name: "小明", score: 92 }, { name: "小红", score: 78 }, ...]</text>

  <!-- Step 1: filter -->
  <rect x="50" y="112" width="160" height="56" rx="6" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.4"/>
  <text x="130" y="132" font-size="10" font-weight="700" fill="#a855f7" text-anchor="middle">.filter(s =&gt; s.score &gt;= 80)</text>
  <text x="130" y="150" font-size="9" fill="#94a3b8" text-anchor="middle">筛选 80 分以上</text>

  <line x1="210" y1="140" x2="230" y2="140" stroke="#475569" stroke-width="2"/>
  <polygon points="230,140 222,136 222,144" fill="#475569"/>

  <!-- Step 2: map -->
  <rect x="235" y="112" width="160" height="56" rx="6" fill="#06b6d4" fill-opacity="0.12" stroke="#06b6d4" stroke-opacity="0.4"/>
  <text x="315" y="132" font-size="10" font-weight="700" fill="#06b6d4" text-anchor="middle">.map(s =&gt; s.name)</text>
  <text x="315" y="150" font-size="9" fill="#94a3b8" text-anchor="middle">提取名字</text>

  <line x1="395" y1="140" x2="415" y2="140" stroke="#475569" stroke-width="2"/>
  <polygon points="415,140 407,136 407,144" fill="#475569"/>

  <!-- Step 3: map uppercase -->
  <rect x="420" y="112" width="160" height="56" rx="6" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.4"/>
  <text x="500" y="132" font-size="10" font-weight="700" fill="#f97316" text-anchor="middle">.map(n =&gt; n.toUpperCase())</text>
  <text x="500" y="150" font-size="9" fill="#94a3b8" text-anchor="middle">转大写</text>

  <line x1="580" y1="140" x2="600" y2="140" stroke="#475569" stroke-width="2"/>
  <polygon points="600,140 592,136 592,144" fill="#475569"/>

  <!-- Result -->
  <rect x="605" y="112" width="130" height="56" rx="6" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.4"/>
  <text x="670" y="132" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">["小明", "小美"]</text>
  <text x="670" y="150" font-size="9" fill="#94a3b8" text-anchor="middle">最终结果</text>

  <text x="50" y="192" font-size="10" fill="#eab308">💡 每一步的输出是下一步的输入 — 就像工厂流水线</text>
  <text x="50" y="210" font-size="10" fill="#94a3b8">关键：map/filter 返回新数组，所以能继续链式调用</text>
  <text x="50" y="228" font-size="10" fill="#94a3b8">reduce 返回单个值，所以通常放在链式末尾</text>

  <!-- 实战模式 -->
  <text x="40" y="256" font-size="13" font-weight="600" fill="#a855f7">② 常见链式模式</text>

  <rect x="30" y="268" width="350" height="120" rx="8" fill="#a855f7" fill-opacity="0.04" stroke="#a855f7" stroke-opacity="0.25"/>
  <text x="50" y="290" font-size="10" font-weight="600" fill="#a855f7">筛选 + 转换 + 汇总</text>
  <text x="50" y="310" font-size="9" fill="#94a3b8" font-family="monospace">students</text>
  <text x="50" y="326" font-size="9" fill="#94a3b8" font-family="monospace">  .filter(s =&gt; s.score &gt;= 60)</text>
  <text x="50" y="342" font-size="9" fill="#94a3b8" font-family="monospace">  .map(s =&gt; s.score)</text>
  <text x="50" y="358" font-size="9" fill="#94a3b8" font-family="monospace">  .reduce((a,b) =&gt; a+b, 0)</text>
  <text x="50" y="378" font-size="9" fill="#22c55e" font-family="monospace">// 及格学生总分</text>

  <rect x="400" y="268" width="350" height="120" rx="8" fill="#f97316" fill-opacity="0.04" stroke="#f97316" stroke-opacity="0.25"/>
  <text x="420" y="290" font-size="10" font-weight="600" fill="#f97316">去重</text>
  <text x="420" y="310" font-size="9" fill="#94a3b8" font-family="monospace">const unique = arr</text>
  <text x="420" y="326" font-size="9" fill="#94a3b8" font-family="monospace">  .filter((v, i) =&gt; arr.indexOf(v) === i)</text>
  <text x="420" y="350" font-size="10" font-weight="600" fill="#f97316">更简洁：Set 去重</text>
  <text x="420" y="370" font-size="9" fill="#94a3b8" font-family="monospace">const unique = [...new Set(arr)]</text>

  <!-- 不可变 vs 可变 -->
  <text x="40" y="414" font-size="13" font-weight="600" fill="#22c55e">③ 不可变 vs 可变方法分类</text>

  <rect x="30" y="426" width="350" height="130" rx="8" fill="#22c55e" fill-opacity="0.05" stroke="#22c55e" stroke-opacity="0.2"/>
  <text x="50" y="448" font-size="11" font-weight="600" fill="#22c55e">✅ 不可变（返回新数组/值）</text>
  <text x="50" y="468" font-size="9" fill="#94a3b8">map / filter / reduce / concat / slice</text>
  <text x="50" y="484" font-size="9" fill="#94a3b8">find / findIndex / some / every / includes</text>
  <text x="50" y="504" font-size="9" fill="#94a3b8">flat / flatMap / forEach</text>
  <text x="50" y="524" font-size="9" fill="#eab308">💡 优先用这些 — 安全，适合链式调用</text>

  <rect x="400" y="426" width="350" height="130" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2"/>
  <text x="420" y="448" font-size="11" font-weight="600" fill="#ef4444">⚠️ 可变（修改原数组）</text>
  <text x="420" y="468" font-size="9" fill="#94a3b8">push / pop / unshift / shift / splice</text>
  <text x="420" y="484" font-size="9" fill="#94a3b8">sort / reverse</text>
  <text x="420" y="504" font-size="9" fill="#ef4444">⚠️ 不能链式调用（返回值不是数组）</text>
  <text x="420" y="524" font-size="9" fill="#eab308">💡 ES2023: toSorted()/toReversed()/toSpliced() 返回新数组</text>
</svg>
