      <text x="20" y="266" fill="#c084fc" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">else</text>
      <text x="46" y="266" fill="rgba(255,255,255,0.7)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace"> {</text>
