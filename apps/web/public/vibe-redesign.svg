      <text x="74" y="60" fill="rgba(255,255,255,0.7)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace"> i = 0; i &lt; 5; i++) {</text>
      
      <text x="36" y="82" fill="rgba(255,255,255,0.6)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">console.log(i);</text>
      <text x="20" y="104" fill="rgba(255,255,255,0.7)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">}</text>
      
      <text x="20" y="136" fill="#4ade80" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">// 输出: 0, 1, 2, 3, 4</text>
      
      <line x1="20" y1="156" x2="528" y2="156" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      
      <text x="20" y="178" fill="#c084fc" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">const</text>
      <text x="62" y="178" fill="rgba(255,255,255,0.7)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace"> score = 85;</text>
      
      <text x="20" y="200" fill="#c084fc" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">if</text>
      <text x="36" y="200" fill="rgba(255,255,255,0.7)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace"> (score &gt;= 90) {</text>
      <text x="36" y="222" fill="rgba(255,255,255,0.6)" font-size="12" font-family="'Fira Code','Cascadia Code',monospace">console.log(</text>
