<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Component Preview Test</title>
<style>
body { margin: 0; background: #0f172a; }
</style>
</head>
<body>
<iframe id="preview" style="width:100%;height:100vh;border:none;"></iframe>
<script>
const testCode = `
function Component() {
  return (
    <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 flex items-center justify-center p-8">
      <div className="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl p-6 shadow-2xl max-w-sm w-full">
        <div className="flex items-center gap-4 mb-4">
          <div className="w-12 h-12 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-white font-bold text-lg">
            U
          </div>
          <div>
            <h2 className="text-white font-bold text-lg">用户统计</h2>
            <p className="text-gray-400 text-sm">实时数据概览</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-4 mt-6">
          <div className="bg-white/5 rounded-xl p-4 text-center">
            <p className="text-2xl font-bold text-white">1,234</p>
            <p className="text-xs text-gray-400 mt-1">总用户</p>
          </div>
          <div className="bg-white/5 rounded-xl p-4 text-center">
            <p className="text-2xl font-bold text-orange-400">89%</p>
            <p className="text-xs text-gray-400 mt-1">活跃率</p>
          </div>
        </div>
      </div>
    </div>
  );
}
`;

const html = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin><\/script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin><\/script>
<script src="https://cdn.tailwindcss.com"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
</style>
</head>
<body>
<div id="root"></div>
<script>
try{
${testCode}
const Comp = typeof Component !== 'undefined' ? Component : null;
if(Comp){
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Comp));
} else {
  document.getElementById('root').innerHTML = '<div style="padding:20px;color:#f87171;">No Component</div>';
}
}catch(e){
  document.getElementById('root').innerHTML = '<div style="padding:20px;color:#f87171;">Error: ' + e.message + '</div>';
}
<\/script>
</body>
</html>`;

document.getElementById('preview').srcdoc = html;
</script>
</body>
</html>
