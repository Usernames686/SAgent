<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="400" fill="#0f172a" rx="16"/>
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#f8fafc">进化总体流程图</text>
  
  <rect x="30" y="80" width="180" height="100" rx="12" fill="#f97316"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1. 数据收集</text>
  <text x="120" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">学生学习交互</text>
  <text x="120" y="155" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">记录策略/得分/用时</text>
  
  <line x1="210" y1="130" x2="240" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="240,130 250,125 250,135" fill="#94a3b8"/>
  
  <rect x="260" y="80" width="180" height="100" rx="12" fill="#8b5cf6"/>
  <text x="350" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2. 数据分析</text>
  <text x="350" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">计算各策略效果</text>
  <text x="350" y="155" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">综合效果 = 分 x 0.6 + 率 x 0.4</text>
  
  <line x1="440" y1="130" x2="470" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="470,130 480,125 480,135" fill="#94a3b8"/>
  
  <rect x="490" y="80" width="180" height="100" rx="12" fill="#10b981"/>
  <text x="580" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3. 策略选择</text>
  <text x="580" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">选择最优策略</text>
  <text x="580" y="155" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">淘汰最差策略</text>
  
  <line x1="670" y1="130" x2="700" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="700,130 710,125 710,135" fill="#94a3b8"/>
  
  <rect x="720" y="80" width="180" height="100" rx="12" fill="#3b82f6"/>
  <text x="810" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">4. 策略优化</text>
  <text x="810" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">优化 Prompt 模板</text>
  <text x="810" y="155" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">生成新策略变体</text>
  
  <path d="M 810 180 L 810 220 L 120 220 L 120 180" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="120,180 115,190 125,190" fill="#f97316"/>
  <text x="465" y="240" text-anchor="middle" font-size="12" fill="#f97316">持续循环优化</text>
  
  <rect x="100" y="280" width="800" height="100" rx="12" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-opacity="0.3"/>
  <text x="500" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">渐进放量流程</text>
  
  <rect x="130" y="330" width="120" height="35" rx="6" fill="#3b82f6"/>
  <text x="190" y="352" text-anchor="middle" font-size="10" fill="white">1% 灰度</text>
  
  <line x1="250" y1="347" x2="280" y2="347" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="280,347 290,342 290,352" fill="#94a3b8"/>
  
  <rect x="300" y="330" width="120" height="35" rx="6" fill="#3b82f6"/>
  <text x="360" y="352" text-anchor="middle" font-size="10" fill="white">5% 灰度</text>
  
  <line x1="420" y1="347" x2="450" y2="347" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="450,347 460,342 460,352" fill="#94a3b8"/>
  
  <rect x="470" y="330" width="120" height="35" rx="6" fill="#3b82f6"/>
  <text x="530" y="352" text-anchor="middle" font-size="10" fill="white">50% 流量</text>
  
  <line x1="590" y1="347" x2="620" y2="347" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="620,347 630,342 630,352" fill="#94a3b8"/>
  
  <rect x="640" y="330" width="120" height="35" rx="6" fill="#10b981"/>
  <text x="700" y="352" text-anchor="middle" font-size="10" fill="white">100% 发布</text>
</svg>
