<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="#0f172a" rx="16"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#f8fafc" font-family="system-ui">Overall Evolution Flow</text>
  <text x="500" y="62" text-anchor="middle" font-size="12" fill="#64748b" font-family="system-ui">Evolution Agent - Continuous Self-Improvement Cycle</text>
  
  <!-- Step 1: Collect Data -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="180" height="100" rx="12" fill="url(#grad1)" />
    <text x="120" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="system-ui">1. Collect Data</text>
    <text x="120" y="140" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Student Learning</text>
    <text x="120" y="158" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Record Score and Time</text>
    <text x="120" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="system-ui">Every interaction</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="210" y1="140" x2="250" y2="140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />
  
  <!-- Step 2: Analyze Data -->
  <g filter="url(#shadow)">
    <rect x="260" y="90" width="180" height="100" rx="12" fill="url(#grad3)" />
    <text x="350" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="system-ui">2. Analyze Data</text>
    <text x="350" y="140" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Compare Strategies</text>
    <text x="350" y="158" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Score = Avg x 0.6 + Rate x 0.4</text>
    <text x="350" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="system-ui">Statistical analysis</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="440" y1="140" x2="480" y2="140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />
  
  <!-- Step 3: Select Best -->
  <g filter="url(#shadow)">
    <rect x="490" y="90" width="180" height="100" rx="12" fill="url(#grad2)" />
    <text x="580" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="system-ui">3. Select Best</text>
    <text x="580" y="140" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Choose Optimal Strategy</text>
    <text x="580" y="158" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Discard Worst Strategy</text>
    <text x="580" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="system-ui">Data-driven decision</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="670" y1="140" x2="710" y2="140" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" />
  
  <!-- Step 4: Optimize -->
  <g filter="url(#shadow)">
    <rect x="720" y="90" width="180" height="100" rx="12" fill="#f97316" />
    <text x="810" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="system-ui">4. Optimize</text>
    <text x="810" y="140" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Improve Prompt</text>
    <text x="810" y="158" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)" font-family="system-ui">Generate Variant</text>
    <text x="810" y="176" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)" font-family="system-ui">A/B Test and Rollout</text>
  </g>
  
  <!-- Loop Arrow -->
  <path d="M 810 190 L 810 230 L 120 230 L 120 190" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowOrange)" />
  <text x="465" y="248" text-anchor="middle" font-size="12" fill="#f97316" font-family="system-ui">Continuous Improvement Loop</text>
  
  <!-- A/B Test Section -->
  <rect x="100" y="280" width="800" height="100" rx="12" fill="rgba(59,130,246,0.08)" stroke="#3b82f6" stroke-opacity="0.3" />
  <text x="500" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6" font-family="system-ui">A/B Testing Pipeline</text>
  
  <rect x="130" y="330" width="150" height="35" rx="6" fill="#3b82f6" />
  <text x="205" y="352" text-anchor="middle" font-size="10" fill="white" font-family="system-ui">1% Traffic</text>
  
  <line x1="280" y1="347" x2="310" y2="347" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  
  <rect x="320" y="330" width="150" height="35" rx="6" fill="#3b82f6" />
  <text x="395" y="352" text-anchor="middle" font-size="10" fill="white" font-family="system-ui">5% Traffic</text>
  
  <line x1="470" y1="347" x2="500" y2="347" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  
  <rect x="510" y="330" width="150" height="35" rx="6" fill="#3b82f6" />
  <text x="585" y="352" text-anchor="middle" font-size="10" fill="white" font-family="system-ui">50% Traffic</text>
  
  <line x1="660" y1="347" x2="690" y2="347" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
  
  <rect x="700" y="330" width="150" height="35" rx="6" fill="#10b981" />
  <text x="775" y="352" text-anchor="middle" font-size="10" fill="white" font-family="system-ui">100% Release</text>
  
  <!-- Labels -->
  <text x="500" y="390" text-anchor="middle" font-size="11" fill="#64748b" font-family="system-ui">Gradual Rollout: Safe deployment with monitoring</text>
</svg>
