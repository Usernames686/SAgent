  <text x="480" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">sAgent 系统分层架构</text>

  <!-- L0 接入层 -->
  <rect x="40" y="56" width="880" height="90" rx="10" fill="#1e293b" filter="url(#sh)"/>
  <text x="60" y="78" fill="#94a3b8" font-size="12" font-weight="600">接入层 Access Layer</text>
  <rect x="120" y="88" width="180" height="44" rx="8" fill="url(#g1)" opacity=".9"/><text x="210" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Web Client</text><text x="210" y="128" text-anchor="middle" fill="#c7d2fe" font-size="10">Next.js 15</text>
  <rect x="390" y="88" width="180" height="44" rx="8" fill="url(#g1)" opacity=".9"/><text x="480" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Mobile PWA</text><text x="480" y="128" text-anchor="middle" fill="#c7d2fe" font-size="10">响应式适配</text>
  <rect x="660" y="88" width="180" height="44" rx="8" fill="url(#g1)" opacity=".9"/><text x="750" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">IDE Plugin</text><text x="750" y="128" text-anchor="middle" fill="#c7d2fe" font-size="10">VS Code Ext</text>
  <!-- 箭头 -->
  <line x1="480" y1="146" x2="480" y2="164" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker></defs>
  <text x="500" y="158" fill="#64748b" font-size="10">HTTPS / WSS</text>

  <!-- L1 网关层 -->
