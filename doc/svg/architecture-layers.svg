  <rect x="170" y="578" width="80" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="210" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Redis</text>
  <rect x="260" y="578" width="90" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="305" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">MongoDB</text>
  <rect x="360" y="578" width="110" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="415" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">ClickHouse</text>
  <rect x="480" y="578" width="80" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="520" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">MinIO</text>
  <rect x="570" y="578" width="100" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="620" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Elastic</text>
  <rect x="680" y="578" width="80" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="720" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Milvus</text>
  <rect x="770" y="578" width="130" height="32" rx="6" fill="url(#g4)" opacity=".85"/><text x="835" y="599" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">RabbitMQ</text>

  <!-- 底部标注 -->
  <text x="480" y="660" text-anchor="middle" fill="#475569" font-size="11">sAgent · 自我进化多智能体个性化学习氛围编程平台</text>
  <text x="480" y="680" text-anchor="middle" fill="#334155" font-size="10">Self-Evolving Multi-Agent Personalized Vibe Coding Learning Platform</text>
