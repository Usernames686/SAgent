  <rect x="60" y="330" width="130" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="125" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">内容服务</text>
  <rect x="200" y="330" width="130" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="265" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">数据分析</text>
  <rect x="340" y="330" width="130" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="405" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Vibe 学习</text>
  <rect x="480" y="330" width="130" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="545" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">社区服务</text>
  <rect x="620" y="330" width="130" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="685" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">成就系统</text>
  <rect x="760" y="330" width="140" height="32" rx="6" fill="url(#g3)" opacity=".7"/><text x="830" y="351" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">面试模拟</text>

