  <rect x="168" y="456" width="100" height="30" rx="6" fill="#7c3aed" opacity=".8"/><text x="218" y="476" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Evaluator</text>
  <rect x="276" y="456" width="100" height="30" rx="6" fill="#7c3aed" opacity=".8"/><text x="326" y="476" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Path Planner</text>
  <rect x="384" y="456" width="100" height="30" rx="6" fill="#7c3aed" opacity=".8"/><text x="434" y="476" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Debug</text>
  <rect x="492" y="456" width="100" height="30" rx="6" fill="#7c3aed" opacity=".8"/><text x="542" y="476" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Code Review</text>
  <rect x="600" y="456" width="100" height="30" rx="6" fill="#7c3aed" opacity=".8"/><text x="650" y="476" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Knowledge</text>
