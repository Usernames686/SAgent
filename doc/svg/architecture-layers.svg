  <rect x="400" y="494" width="160" height="30" rx="6" fill="#6d28d9" opacity=".8"/><text x="480" y="514" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">LLM Gateway (Qwen3.6)</text>

