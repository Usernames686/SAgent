  <rect x="200" y="292" width="130" height="32" rx="6" fill="url(#g3)" opacity=".85"/><text x="265" y="313" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">课程服务</text>
  <rect x="340" y="292" width="130" height="32" rx="6" fill="url(#g3)" opacity=".85"/><text x="405" y="313" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">练习服务</text>
  <rect x="480" y="292" width="130" height="32" rx="6" fill="url(#g3)" opacity=".85"/><text x="545" y="313" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">评估服务</text>
  <rect x="620" y="292" width="130" height="32" rx="6" fill="url(#g3)" opacity=".85"/><text x="685" y="313" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Agent 编排</text>
  <rect x="760" y="292" width="140" height="32" rx="6" fill="url(#g3)" opacity=".85"/><text x="830" y="313" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">代码沙箱</text>
