  <text x="480" y="221" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Kong API Gateway</text>
  <text x="310" y="221" text-anchor="middle" fill="#bae6fd" font-size="10">认证鉴权</text>
  <text x="420" y="221" text-anchor="middle" fill="#bae6fd" font-size="10">限流熔断</text>
