<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050210"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- 标题栏 -->
  <rect x="24" y="16" width="40" height="40" rx="10" fill="#ec4899" fill-opacity="0.15"/>
  <text x="44" y="40" font-size="18" text-anchor="middle">💻</text>
  <text x="76" y="34" font-size="15" font-weight="700" fill="white">编码实验室</text>
  <text x="76" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">JS-003 — 在编辑器中编写并提交代码</text>

  <!-- 得分徽章 -->
  <rect x="1090" y="22" width="80" height="28" rx="8" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="1100" y="40" font-size="10" fill="#22c55e">✅ 95%</text>

  <!-- Monaco 编辑器 -->
  <rect x="24" y="68" width="740" height="480" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <rect x="24" y="68" width="740" height="36" rx="16" fill="#ffffff" fill-opacity="0.02"/>
  <circle cx="44" cy="86" r="5" fill="#ef4444" fill-opacity="0.4"/>
  <circle cx="60" cy="86" r="5" fill="#eab308" fill-opacity="0.4"/>
  <circle cx="76" cy="86" r="5" fill="#22c55e" fill-opacity="0.4"/>
  <text x="100" y="90" font-size="10" font-family="monospace" fill="#ffffff" fill-opacity="0.2">main.js</text>

  <!-- 代码内容 -->
  <text x="44" y="128" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">1</text>
  <text x="68" y="128" font-size="12" font-family="monospace" fill="#c084fc">function</text>
  <text x="132" y="128" font-size="12" font-family="monospace" fill="#60a5fa">checkScore</text>
  <text x="216" y="128" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">(score) {</text>

  <text x="44" y="150" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">2</text>
  <text x="68" y="150" font-size="12" font-family="monospace" fill="#c084fc">  if</text>
  <text x="92" y="150" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6"> (score >= 90) {</text>

  <text x="44" y="172" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">3</text>
  <text x="68" y="172" font-size="12" font-family="monospace" fill="#c084fc">    return</text>
  <text x="140" y="172" font-size="12" font-family="monospace" fill="#34d399"> "优秀"</text>
  <text x="192" y="172" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">;</text>

  <text x="44" y="194" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">4</text>
  <text x="68" y="194" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  }</text>
  <text x="92" y="194" font-size="12" font-family="monospace" fill="#c084fc"> else if</text>
  <text x="148" y="194" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6"> (score >= 60) {</text>

  <text x="44" y="216" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">5</text>
  <text x="68" y="216" font-size="12" font-family="monospace" fill="#c084fc">    return</text>
  <text x="140" y="216" font-size="12" font-family="monospace" fill="#34d399"> "及格"</text>
  <text x="192" y="216" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">;</text>

  <text x="44" y="238" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">6</text>
  <text x="68" y="238" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  }</text>
  <text x="92" y="238" font-size="12" font-family="monospace" fill="#c084fc"> else</text>
  <text x="124" y="238" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6"> {</text>

  <text x="44" y="260" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">7</text>
  <text x="68" y="260" font-size="12" font-family="monospace" fill="#c084fc">    return</text>
  <text x="140" y="260" font-size="12" font-family="monospace" fill="#34d399"> "不及格"</text>
  <text x="204" y="260" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">;</text>

  <text x="44" y="282" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">8</text>
  <text x="68" y="282" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  }</text>

  <text x="44" y="304" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.3">9</text>
  <text x="68" y="304" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">}</text>

  <!-- 光标闪烁 -->
  <rect x="68" y="320" width="2" height="16" fill="#60a5fa" fill-opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- 右侧结果面板 -->

  <!-- 评分卡片 -->
  <rect x="780" y="68" width="396" height="120" rx="16" fill="#22c55e" fill-opacity="0.03" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="828" cy="128" r="32" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="4"/>
  <circle cx="828" cy="128" r="32" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="181 201" stroke-linecap="round" transform="rotate(-90 828 128)"/>
  <text x="828" y="132" font-size="16" font-weight="700" fill="white" text-anchor="middle">95</text>
  <text x="872" y="112" font-size="13" font-weight="700" fill="#22c55e">✅ 通过！</text>
  <text x="872" y="132" font-size="11" fill="#ffffff" fill-opacity="0.4">代码逻辑正确，条件判断完整。</text>
  <text x="872" y="148" font-size="11" fill="#ffffff" fill-opacity="0.4">建议：可以增加边界值测试。</text>

  <!-- AI 分析 -->
  <rect x="780" y="200" width="396" height="180" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="800" y="224" font-size="11" font-weight="600" fill="#ffffff" fill-opacity="0.5">🤖 AI 分析</text>
  <text x="800" y="250" font-size="10" fill="#22c55e" fill-opacity="0.7" font-weight="600">✅ 已实现</text>
  <rect x="800" y="258" width="64" height="20" rx="4" fill="#22c55e" fill-opacity="0.1"/>
  <text x="832" y="272" font-size="10" fill="#34d399" text-anchor="middle">if/else</text>
  <rect x="872" y="258" width="72" height="20" rx="4" fill="#22c55e" fill-opacity="0.1"/>
  <text x="908" y="272" font-size="10" fill="#34d399" text-anchor="middle">返回值</text>
  <rect x="952" y="258" width="80" height="20" rx="4" fill="#22c55e" fill-opacity="0.1"/>
  <text x="992" y="272" font-size="10" fill="#34d399" text-anchor="middle">多条件判断</text>

  <text x="800" y="306" font-size="10" fill="#eab308" fill-opacity="0.7" font-weight="600">💡 改进建议</text>
  <text x="800" y="324" font-size="10" fill="#ffffff" fill-opacity="0.4">• 增加 score 边界值检查（负数、>100）</text>
  <text x="800" y="340" font-size="10" fill="#ffffff" fill-opacity="0.4">• 考虑使用 switch 或三元运算符替代</text>

  <!-- 参考答案(折叠) -->
  <rect x="780" y="392" width="396" height="40" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="800" y="416" font-size="11" font-weight="600" fill="#60a5fa" fill-opacity="0.6">▸ 参考答案</text>

  <!-- 提交按钮 -->
  <rect x="24" y="560" width="740" height="48" rx="12" fill="url(#pinkGrad)"/>
  <text x="394" y="588" font-size="14" font-weight="600" fill="white" text-anchor="middle">📤 提交代码</text>
</svg>