<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="ext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="880" height="400" fill="#0f172a" rx="16"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f8fafc">场景复用能力 · 从西亚斯到全行业</text>
