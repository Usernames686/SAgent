    <text x="700" y="140" text-anchor="middle" fill="#cbd5e1">转行求职加速</text>
    <text x="700" y="154" text-anchor="middle" font-size="9" fill="#94a3b8">达内/传智广播</text>

    <rect x="620" y="260" width="160" height="60" rx="10" fill="#1e293b" stroke="#f59e0b"/>
