  <circle cx="440" cy="210" r="80" fill="url(#ext)" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd">sAgent</text>
  <text x="440" y="223" text-anchor="middle" font-size="10" fill="#e2e8f0">多智能体 + Vibe</text>
  <text x="440" y="237" text-anchor="middle" font-size="10" fill="#e2e8f0">+ 自进化内核</text>

  <g font-size="10">
    <rect x="370" y="70" width="140" height="60" rx="10" fill="#1e293b" stroke="#34d399"/>
    <text x="440" y="92" text-anchor="middle" font-weight="700" fill="#34d399">高校编程课</text>
    <text x="440" y="110" text-anchor="middle" fill="#cbd5e1">替代助教答疑</text>
