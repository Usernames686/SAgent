    <line x1="620" y1="130" x2="500" y2="190"/>
    <line x1="620" y1="290" x2="500" y2="230"/>
    <line x1="440" y1="260" x2="440" y2="290"/>
    <line x1="260" y1="290" x2="380" y2="230"/>
