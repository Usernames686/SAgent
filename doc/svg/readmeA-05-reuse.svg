    <text x="700" y="300" text-anchor="middle" fill="#cbd5e1">零基础启蒙</text>
    <text x="700" y="314" text-anchor="middle" font-size="9" fill="#94a3b8">趣味化降门槛</text>

    <rect x="370" y="300" width="140" height="60" rx="10" fill="#1e293b" stroke="#ec4899"/>
    <text x="440" y="322" text-anchor="middle" font-weight="700" fill="#f472b6">企业内训</text>
    <text x="440" y="340" text-anchor="middle" fill="#cbd5e1">新技术速学</text>
    <text x="440" y="354" text-anchor="middle" font-size="9" fill="#94a3b8">Rust/AI 内训</text>

    <rect x="100" y="260" width="160" height="60" rx="10" fill="#1e293b" stroke="#06b6d4"/>
