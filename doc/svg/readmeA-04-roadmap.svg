<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="ph" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="880" height="520" fill="#0f172a" rx="16"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f8fafc">西亚斯学院 · 8 周落地实施路线图</text>

  <line x1="60" y1="100" x2="820" y2="100" stroke="url(#ph)" stroke-width="3"/>

  <g font-size="11">
    <circle cx="130" cy="100" r="14" fill="#f97316"/><text x="130" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">W1</text>
    <circle cx="330" cy="100" r="14" fill="#f59e0b"/><text x="330" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">W3</text>
    <circle cx="530" cy="100" r="14" fill="#8b5cf6"/><text x="530" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">W5</text>
    <circle cx="730" cy="100" r="14" fill="#10b981"/><text x="730" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">W7</text>
  </g>

  <g filter="url(#sh)">
    <rect x="50"  y="130" width="170" height="170" rx="10" fill="#1e293b" stroke="#f97316"/>
    <text x="135" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#f97316">阶段一 · 部署接入</text>
    <text x="65" y="180" font-size="10" fill="#cbd5e1">• Docker 部署到校内服务器</text>
    <text x="65" y="198" font-size="10" fill="#cbd5e1">• 50 名学生账号导入</text>
    <text x="65" y="216" font-size="10" fill="#cbd5e1">• Onboarding 目标选择</text>
    <text x="65" y="234" font-size="10" fill="#cbd5e1">• IRT 初始能力诊断</text>
    <text x="65" y="252" font-size="10" fill="#cbd5e1">• 生成个性化路径</text>
    <text x="65" y="285" font-size="10" font-weight="600" fill="#fb923c">产出：基线能力画像</text>
  </g>

  <g filter="url(#sh)">
    <rect x="245" y="130" width="170" height="170" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="330" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">阶段二 · 核心学习</text>
    <text x="260" y="180" font-size="10" fill="#cbd5e1">• Vibe Coding 八大模块</text>
    <text x="260" y="198" font-size="10" fill="#cbd5e1">• Tutor Agent 辅导答疑</text>
    <text x="260" y="216" font-size="10" fill="#cbd5e1">• Debug Agent 调试陪练</text>
    <text x="260" y="234" font-size="10" fill="#cbd5e1">• Evaluator 代码评估</text>
    <text x="260" y="252" font-size="10" fill="#cbd5e1">• 行为采集体系启动</text>
    <text x="260" y="285" font-size="10" font-weight="600" fill="#fbbf24">产出：学习行为数据池</text>
  </g>

  <g filter="url(#sh)">
    <rect x="445" y="130" width="170" height="170" rx="10" fill="#1e293b" stroke="#8b5cf6"/>
    <text x="530" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">阶段三 · 实战衔接</text>
    <text x="460" y="180" font-size="10" fill="#cbd5e1">• Code Review 审查训练</text>
    <text x="460" y="198" font-size="10" fill="#cbd5e1">• 项目实战模板启用</text>
    <text x="460" y="216" font-size="10" fill="#cbd5e1">• Interview Agent 模拟面试</text>
    <text x="460" y="234" font-size="10" fill="#cbd5e1">• 作品集自动生成</text>
    <text x="460" y="252" font-size="10" fill="#cbd5e1">• 路径动态调整触发</text>
    <text x="460" y="285" font-size="10" font-weight="600" fill="#c4b5fd">产出：可求职作品集</text>
  </g>

  <g filter="url(#sh)">
    <rect x="640" y="130" width="180" height="170" rx="10" fill="#1e293b" stroke="#10b981"/>
    <text x="730" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">阶段四 · 进化验证</text>
    <text x="655" y="180" font-size="10" fill="#cbd5e1">• Evolution Agent 启动</text>
    <text x="655" y="198" font-size="10" fill="#cbd5e1">• A/B 测试 Prompt 策略</text>
    <text x="655" y="216" font-size="10" fill="#cbd5e1">• 统计显著性检验</text>
    <text x="655" y="234" font-size="10" fill="#cbd5e1">• 灰度放量 + 回滚保护</text>
    <text x="655" y="252" font-size="10" fill="#cbd5e1">• 效果对比报告</text>
    <text x="655" y="285" font-size="10" font-weight="600" fill="#34d399">产出：进化收益报告</text>
  </g>

  <rect x="50" y="320" width="770" height="170" rx="10" fill="#1e1b4b" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#fb923c">实施机制 · 三位一体保障</text>

  <g font-size="10">
    <rect x="70"  y="360" width="240" height="115" rx="8" fill="#0f172a" stroke="#34d399"/>
    <text x="190" y="382" text-anchor="middle" font-weight="700" fill="#34d399">技术保障</text>
    <text x="85" y="404" fill="#cbd5e1">• JWT 鉴权 + 限流守卫</text>
    <text x="85" y="422" fill="#cbd5e1">• Docker 沙箱隔离执行</text>
    <text x="85" y="440" fill="#cbd5e1">• WebSocket 流式 ≤ 2s TTFT</text>
    <text x="85" y="458" fill="#cbd5e1">• 自动备份 + 一键回滚</text>

    <rect x="320" y="360" width="240" height="115" rx="8" fill="#0f172a" stroke="#38bdf8"/>
    <text x="440" y="382" text-anchor="middle" font-weight="700" fill="#38bdf8">教学协同</text>
    <text x="335" y="404" fill="#cbd5e1">• 教师 dashboard 查看学情</text>
    <text x="335" y="422" fill="#cbd5e1">• 薄弱点周报自动推送</text>
    <text x="335" y="440" fill="#cbd5e1">• AI 建议 + 教师裁决结合</text>
    <text x="335" y="458" fill="#cbd5e1">• 班级排行榜激励机制</text>

    <rect x="570" y="360" width="230" height="115" rx="8" fill="#0f172a" stroke="#a78bfa"/>
    <text x="685" y="382" text-anchor="middle" font-weight="700" fill="#a78bfa">数据迭代</text>
    <text x="585" y="404" fill="#cbd5e1">• 8 大采集域全埋点</text>
    <text x="585" y="422" fill="#cbd5e1">• 缓冲队列 + 批量落库</text>
    <text x="585" y="440" fill="#cbd5e1">• 每周自动进化策略</text>
    <text x="585" y="458" fill="#cbd5e1">• Cohen's d ≥ 0.2 才放量</text>
  </g>
</svg>
