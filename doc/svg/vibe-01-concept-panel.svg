  <text x="316" y="520" font-size="11" fill="#ffffff" fill-opacity="0.4">1. for...of 和 for...in 有什么区别？</text>
  <text x="316" y="536" font-size="11" fill="#ffffff" fill-opacity="0.4">2. 什么时候用 while 而不是 for？</text>

  <rect x="744" y="482" width="440" height="90" rx="16" fill="url(#glassFill)"/>
  <rect x="744" y="482" width="3" height="90" rx="1" fill="#eab308" fill-opacity="0.3"/>
  <text x="764" y="502" font-size="11" font-weight="600" fill="#eab308">💡 学习贴士</text>
  <text x="764" y="520" font-size="11" fill="#ffffff" fill-opacity="0.4">• switch 的 case 必须有 break</text>
  <text x="764" y="536" font-size="11" fill="#ffffff" fill-opacity="0.4">• 避免无限循环：确保循环条件最终为 false</text>

