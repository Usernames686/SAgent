  <rect x="296" y="104" width="888" height="80" rx="16" fill="#f97316" fill-opacity="0.05" stroke="#f97316" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="312" y="116" width="40" height="40" rx="10" fill="#f97316" fill-opacity="0.15"/>
  <text x="332" y="140" font-size="18" text-anchor="middle">✨</text>
  <text x="364" y="130" font-size="10" font-weight="600" fill="#f97316" fill-opacity="0.8">为什么学这个？</text>
  <text x="364" y="148" font-size="12" fill="#ffffff" fill-opacity="0.5">条件判断和循环是程序"做决策"和"重复做事"的方式。没有条件，程序只能走一条路；</text>
  <text x="364" y="164" font-size="12" fill="#ffffff" fill-opacity="0.5">没有循环，程序只能做一次。掌握它们，你的代码才能处理真实世界的复杂性。</text>

  <!-- 核心概念卡 -->
  <rect x="296" y="196" width="436" height="200" rx="16" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <rect x="296" y="196" width="436" height="32" rx="16" fill="#ffffff" fill-opacity="0.02"/>
  <text x="316" y="216" font-size="11" font-weight="600" fill="#60a5fa">📖 核心概念</text>
  <text x="316" y="248" font-size="13" font-weight="600" fill="white">条件判断：if/else 与 switch</text>
  <text x="316" y="268" font-size="11" fill="#ffffff" fill-opacity="0.4">if/else 是最基础的条件判断：</text>
  <text x="316" y="284" font-size="11" fill="#ffffff" fill-opacity="0.4">- if (条件) { 执行体 }</text>
  <text x="316" y="300" font-size="11" fill="#ffffff" fill-opacity="0.4">- if/else — 二选一</text>
  <text x="316" y="324" font-size="13" font-weight="600" fill="white">循环结构：for/while/for...of</text>
  <text x="316" y="344" font-size="11" fill="#ffffff" fill-opacity="0.4">for 循环用于已知次数的重复：</text>
  <text x="316" y="360" font-size="11" fill="#ffffff" fill-opacity="0.4">for (let i = 0; i &lt; 10; i++) { ... }</text>

