  <text x="1142" y="214" font-size="9" fill="#ffffff" fill-opacity="0.2" text-anchor="middle">示例2</text>
  <rect x="756" y="236" width="416" height="120" rx="8" fill="#0a0a0f"/>
  <text x="768" y="256" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">if (score >= 90) {</text>
  <text x="768" y="272" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  console.log("优秀");</text>
  <text x="768" y="288" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">} else if (score >= 60) {</text>
  <text x="768" y="304" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  console.log("及格");</text>
  <text x="768" y="320" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">} else {</text>
  <text x="768" y="336" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">  console.log("不及格");</text>
  <text x="768" y="352" font-size="11" font-family="monospace" fill="#ffffff" fill-opacity="0.6">}</text>

  <!-- 要点总结 -->
  <rect x="296" y="410" width="888" height="60" rx="16" fill="url(#glassFill)" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="296" y="410" width="3" height="60" rx="1" fill="#a855f7" fill-opacity="0.4"/>
  <text x="316" y="430" font-size="11" font-weight="600" fill="#a855f7">📋 要点总结</text>
  <text x="316" y="448" font-size="11" fill="#ffffff" fill-opacity="0.45">1. if/else 用于条件判断，switch 用于多值匹配</text>
  <text x="316" y="462" font-size="11" fill="#ffffff" fill-opacity="0.45">2. for/while/for...of 用于不同场景的循环</text>

  <!-- 思考题 + 学习贴士 -->
  <rect x="296" y="482" width="436" height="90" rx="16" fill="url(#glassFill)"/>
