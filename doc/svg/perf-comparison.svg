<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".12"/></filter>
  </defs>
  <rect width="960" height="520" fill="#0f172a" rx="16"/>
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">启动耗时对比（开发环境）</text>

  <!-- 优化前标题 -->
  <text x="60" y="72" fill="#f87171" font-size="14" font-weight="700">优化前</text>
  <text x="140" y="72" fill="#64748b" font-size="11">传统 build 模式 — 总计 50-80s</text>

  <!-- 优化前柱状图 -->
  <rect x="60" y="82" width="540" height="24" rx="4" fill="#ef4444" opacity=".7"/>
  <text x="80" y="99" fill="#fff" font-size="11" font-weight="600">nest build 全量编译</text>
  <text x="560" y="99" fill="#fca5a5" font-size="10">25-40s</text>

  <rect x="60" y="112" width="100" height="24" rx="4" fill="#f97316" opacity=".7"/>
  <text x="80" y="129" fill="#fff" font-size="11" font-weight="600">node dist/main</text>
  <text x="170" y="129" fill="#fdba74" font-size="10">3-5s</text>

  <rect x="60" y="142" width="50" height="24" rx="4" fill="#eab308" opacity=".7"/>
  <text x="120" y="159" fill="#fde68a" font-size="10">TypeORM sync 1-3s</text>

  <rect x="60" y="172" width="30" height="24" rx="4" fill="#a3e635" opacity=".7"/>
  <text x="100" y="189" fill="#bef264" font-size="10">Seed 0.5-1s</text>

  <rect x="60" y="202" width="30" height="24" rx="4" fill="#22d3ee" opacity=".7"/>
  <text x="100" y="219" fill="#67e8f9" font-size="10">Swagger 0.5-1s</text>

  <rect x="60" y="232" width="420" height="24" rx="4" fill="#a78bfa" opacity=".7"/>
  <text x="80" y="249" fill="#fff" font-size="11" font-weight="600">next dev (webpack)</text>
  <text x="440" y="249" fill="#c4b5fd" font-size="10">20-30s</text>

  <!-- 分隔线 -->
  <line x1="480" y1="270" x2="480" y2="280" stroke="#334155" stroke-width="1"/>

  <!-- 优化后标题 -->
  <text x="60" y="300" fill="#34d399" font-size="14" font-weight="700">优化后</text>
  <text x="140" y="300" fill="#64748b" font-size="11">dev watch + Turbopack — 总计 12-25s</text>

  <!-- 优化后柱状图 -->
  <rect x="60" y="312" width="100" height="24" rx="4" fill="#10b981" opacity=".8"/>
  <text x="80" y="329" fill="#fff" font-size="11" font-weight="600">nest --watch</text>
  <text x="170" y="329" fill="#6ee7b7" font-size="10">3-8s</text>

  <rect x="60" y="342" width="30" height="24" rx="4" fill="#14b8a6" opacity=".8"/>
  <text x="100" y="359" fill="#5eead4" font-size="10">TypeORM 仅首次 0-1s</text>

  <rect x="60" y="372" width="10" height="24" rx="4" fill="#2dd4bf" opacity=".8"/>
  <text x="80" y="389" fill="#99f6e4" font-size="10">Seed 懒加载 0s</text>

  <rect x="60" y="402" width="30" height="24" rx="4" fill="#22d3ee" opacity=".8"/>
  <text x="100" y="419" fill="#67e8f9" font-size="10">Swagger 仅开发 0.5-1s</text>

  <rect x="60" y="432" width="220" height="24" rx="4" fill="#06b6d4" opacity=".8"/>
  <text x="80" y="449" fill="#fff" font-size="11" font-weight="600">next dev --turbopack</text>
  <text x="240" y="449" fill="#67e8f9" font-size="10">8-15s</text>

  <!-- 净节省 -->
  <rect x="60" y="472" width="880" height="36" rx="8" fill="#10b981" opacity=".15" stroke="#10b981" stroke-width="1"/>
  <text x="480" y="496" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">净节省 35-55 秒 ▼ 启动速度提升 3-4 倍</text>
</svg>
