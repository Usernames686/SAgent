    <rect x="480" y="172" width="85" height="22" rx="4" fill="url(#cost)" opacity="0.6"/>
    <text x="490" y="187" fill="#fbbf24">¥ 80</text>
    <text x="660" y="187" fill="#34d399" font-weight="700">省 75%</text>

    <text x="480" y="220" fill="#e2e8f0">教师评阅时间</text>
    <text x="480" y="238" font-size="9" fill="#94a3b8">传统手工批改</text>
    <rect x="480" y="246" width="340" height="22" rx="4" fill="#ef4444" opacity="0.25"/>
    <text x="490" y="261" fill="#fca5a5">10 min/份</text>
    <rect x="480" y="272" width="17" height="22" rx="4" fill="url(#cost)" opacity="0.6"/>
    <text x="505" y="287" fill="#fbbf24">0.5 min</text>
    <text x="660" y="287" fill="#34d399" font-weight="700">省 95%</text>

    <text x="480" y="320" fill="#e2e8f0">材料更新成本</text>
