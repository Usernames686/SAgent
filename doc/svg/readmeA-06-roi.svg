    <rect x="480" y="372" width="34" height="22" rx="4" fill="url(#cost)" opacity="0.6"/>
    <text x="525" y="387" fill="#fbbf24">¥ 1.5K</text>
    <text x="660" y="387" fill="#34d399" font-weight="700">省 90%</text>

    <text x="480" y="425" font-size="9" fill="#64748b">红条=传统成本 · 橙条=sAgent 成本</text>
