    <text x="265" y="241" fill="#34d399" font-weight="700">85%</text>

    <text x="60" y="270" fill="#e2e8f0">30 日留存</text>
    <rect x="60" y="278" width="72" height="18" fill="#475569" rx="3"/>
    <rect x="60" y="278" width="152" height="18" fill="url(#roi)" rx="3"/>
    <text x="162" y="291" fill="#34d399" font-weight="700">38%</text>

