<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="280" fill="url(#bg)" rx="16"/>
  <!-- 装饰光圈 -->
  <circle cx="120" cy="140" r="80" fill="#6366f1" opacity=".06"/>
  <circle cx="840" cy="140" r="100" fill="#f97316" opacity=".05"/>
  <circle cx="480" cy="60" r="60" fill="#10b981" opacity=".04"/>
  <!-- 标题 -->
  <text x="480" y="72" text-anchor="middle" fill="url(#t2)" font-size="42" font-weight="800" filter="url(#gl)">sAgent</text>
  <text x="480" y="110" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">自我进化多智能体个性化学习氛围编程平台</text>
  <!-- 三个核心标签 -->
  <rect x="180" y="136" width="160" height="36" rx="18" fill="url(#t1)" opacity=".85"/>
  <text x="260" y="159" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🧬 自我进化</text>
  <rect x="400" y="136" width="160" height="36" rx="18" fill="url(#t2)" opacity=".85"/>
  <text x="480" y="159" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🤖 多智能体</text>
  <rect x="620" y="136" width="160" height="36" rx="18" fill="url(#t3)" opacity=".85"/>
  <text x="700" y="159" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🎨 氛围编程</text>
  <!-- 底部描述 -->
  <text x="480" y="210" text-anchor="middle" fill="#94a3b8" font-size="13">说意图 · 定氛围 · 控结果 — 让每个人都能获得世界级的个性化编程教育</text>
  <!-- 技术栈小标签 -->
  <rect x="240" y="232" width="70" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="275" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">Next.js 15</text>
  <rect x="318" y="232" width="60" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="348" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">NestJS</text>
  <rect x="386" y="232" width="70" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="421" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">TypeORM</text>
  <rect x="464" y="232" width="50" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="489" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">Qwen</text>
  <rect x="522" y="232" width="60" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="552" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">SQLite</text>
  <rect x="590" y="232" width="70" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="625" y="247" text-anchor="middle" fill="#94a3b8" font-size="10">Turbopack</text>
</svg>
