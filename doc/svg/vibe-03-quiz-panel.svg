<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050210"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- 标题栏 -->
  <rect x="24" y="16" width="40" height="40" rx="10" fill="#60a5fa" fill-opacity="0.15"/>
  <text x="44" y="40" font-size="18" text-anchor="middle">📝</text>
  <text x="76" y="34" font-size="15" font-weight="700" fill="white">知识评估</text>
  <text x="76" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">JS-003 — 共3题，答对90%以上通过</text>

  <!-- 进度条 -->
  <rect x="24" y="68" width="1152" height="8" rx="4" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="24" y="68" width="768" height="8" rx="4" fill="url(#accentGrad)"/>
  <text x="1100" y="88" font-size="10" fill="#ffffff" fill-opacity="0.3" text-anchor="end">2/3</text>

  <!-- 题目1 已答 -->
  <rect x="24" y="100" width="1152" height="48" rx="12" fill="#22c55e" fill-opacity="0.03" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="44" y="128" font-size="12" font-weight="600" fill="#22c55e" fill-opacity="0.8">✅ Q1</text>
  <text x="80" y="128" font-size="12" fill="#ffffff" fill-opacity="0.5">以下哪个循环语句保证至少执行一次循环体？</text>
  <text x="1100" y="128" font-size="10" fill="#22c55e" text-anchor="end">答对</text>

  <!-- 题目2 已答 -->
  <rect x="24" y="158" width="1152" height="48" rx="12" fill="#22c55e" fill-opacity="0.03" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="44" y="186" font-size="12" font-weight="600" fill="#22c55e" fill-opacity="0.8">✅ Q2</text>
  <text x="80" y="186" font-size="12" fill="#ffffff" fill-opacity="0.5">for...of 可以遍历以下哪种数据？</text>
  <text x="1100" y="186" font-size="10" fill="#22c55e" text-anchor="end">答对</text>

  <!-- 题目3 当前作答 -->
  <rect x="24" y="216" width="1152" height="320" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>
  <text x="44" y="248" font-size="12" font-weight="600" fill="#60a5fa">▶ Q3</text>
  <text x="80" y="248" font-size="14" font-weight="600" fill="white">以下代码的输出是什么？</text>
  <rect x="44" y="260" width="500" height="36" rx="8" fill="#0a0a0f"/>
  <text x="56" y="282" font-size="12" font-family="monospace" fill="#ffffff" fill-opacity="0.6">for (let i = 0; i &lt; 3; i++) { setTimeout(() =&gt; console.log(i), 0); }</text>

  <!-- 选项 -->
  <rect x="44" y="310" width="540" height="40" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="334" font-size="12" fill="#ffffff" fill-opacity="0.5">A. 0 1 2</text>

  <rect x="44" y="358" width="540" height="40" rx="10" fill="#60a5fa" fill-opacity="0.08" stroke="#60a5fa" stroke-opacity="0.3" stroke-width="1"/>
  <text x="64" y="382" font-size="12" font-weight="500" fill="#60a5fa">B. 3 3 3  ← 已选</text>

  <rect x="44" y="406" width="540" height="40" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="430" font-size="12" fill="#ffffff" fill-opacity="0.5">C. undefined x3</text>

  <rect x="44" y="454" width="540" height="40" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="64" y="478" font-size="12" fill="#ffffff" fill-opacity="0.5">D. 0 0 0</text>

  <!-- 导航按钮 -->
  <rect x="44" y="516" width="100" height="36" rx="8" fill="#ffffff" fill-opacity="0.04"/>
  <text x="94" y="538" font-size="12" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">← 上一题</text>
  <rect x="484" y="516" width="100" height="36" rx="8" fill="url(#accentGrad)"/>
  <text x="534" y="538" font-size="12" font-weight="600" fill="white" text-anchor="middle">提交答案</text>

  <!-- 结果预览区 -->
  <rect x="600" y="260" width="552" height="280" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="620" y="290" font-size="11" font-weight="600" fill="#ffffff" fill-opacity="0.4">📊 答题回顾（已答部分）</text>
  <rect x="620" y="306" width="512" height="48" rx="8" fill="#22c55e" fill-opacity="0.05"/>
  <text x="636" y="326" font-size="10" fill="#ffffff" fill-opacity="0.4">Q1: 以下哪个循环保证至少执行一次？</text>
  <text x="636" y="342" font-size="10" fill="#22c55e">✅ 你的答案：do...while（正确）</text>
  <rect x="620" y="364" width="512" height="48" rx="8" fill="#22c55e" fill-opacity="0.05"/>
  <text x="636" y="384" font-size="10" fill="#ffffff" fill-opacity="0.4">Q2: for...of 可以遍历哪种数据？</text>
  <text x="636" y="400" font-size="10" fill="#22c55e">✅ 你的答案：数组（正确）</text>
</svg>