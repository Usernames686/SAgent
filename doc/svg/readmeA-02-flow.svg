      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
