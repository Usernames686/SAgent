  </defs>
  <rect width="880" height="280" fill="#0f172a" rx="16"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f8fafc">用户学习闭环 · 五步流程</text>

  <g font-size="11" fill="#e2e8f0">
    <circle cx="100" cy="150" r="44" fill="url(#g1)" opacity="0.2" stroke="#f97316"/>
    <text x="100" y="145" text-anchor="middle" font-weight="700" fill="#fb923c">① 注册</text>
    <text x="100" y="162" text-anchor="middle" font-size="10" fill="#cbd5e1">选目标</text>

    <circle cx="260" cy="150" r="44" fill="url(#g1)" opacity="0.2" stroke="#f97316"/>
    <text x="260" y="145" text-anchor="middle" font-weight="700" fill="#fb923c">② 诊断</text>
    <text x="260" y="162" text-anchor="middle" font-size="10" fill="#cbd5e1">IRT 估能力</text>

    <circle cx="420" cy="150" r="44" fill="url(#g1)" opacity="0.2" stroke="#f97316"/>
