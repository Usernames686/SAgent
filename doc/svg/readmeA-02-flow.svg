  <line x1="148" y1="150" x2="212" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="308" y1="150" x2="372" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="468" y1="150" x2="532" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="628" y1="150" x2="692" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <path d="M 740 106 Q 740 70 420 70 Q 100 70 100 106" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="420" y="62" text-anchor="middle" font-size="10" fill="#34d399">行为数据回流 · 驱动路径动态调整与策略进化</text>

  <text x="440" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">注册 → IRT 自适应诊断 → Vibe Coding 实战 → 多 Agent 评测 → 进化引擎优化策略 → 闭环</text>
