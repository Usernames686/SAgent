    <text x="420" y="162" text-anchor="middle" font-size="10" fill="#cbd5e1">Vibe Coding</text>

    <circle cx="580" cy="150" r="44" fill="url(#g1)" opacity="0.2" stroke="#f97316"/>
    <text x="580" y="145" text-anchor="middle" font-weight="700" fill="#fb923c">④ 评测</text>
    <text x="580" y="162" text-anchor="middle" font-size="10" fill="#cbd5e1">Agent 评分</text>

    <circle cx="740" cy="150" r="44" fill="url(#g1)" opacity="0.2" stroke="#f97316"/>
