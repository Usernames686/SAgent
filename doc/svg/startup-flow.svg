<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity=".12"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker>
  </defs>
  <rect width="960" height="580" fill="#0f172a" rx="16"/>
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">start.bat 启动流程</text>
  <text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="12">Dev Watch 模式 + Turbopack — 跳过冗余 build</text>

  <!-- Step 1 -->
  <rect x="80" y="76" width="800" height="80" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="80" y="76" width="6" height="80" rx="3" fill="url(#s1)"/>
  <circle cx="120" cy="100" r="16" fill="#6366f1"/><text x="120" y="105" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <text x="150" y="100" fill="#e2e8f0" font-size="14" font-weight="700">清理端口 4000 / 4001</text>
  <text x="150" y="120" fill="#94a3b8" font-size="11">netstat 找到占用进程 → taskkill /F /PID</text>
  <text x="150" y="140" fill="#64748b" font-size="10">确保旧服务已停止，避免端口冲突</text>

  <!-- Arrow -->
  <line x1="480" y1="156" x2="480" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 2 -->
  <rect x="80" y="180" width="800" height="100" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="80" y="180" width="6" height="100" rx="3" fill="url(#s2)"/>
  <circle cx="120" cy="210" r="16" fill="#0ea5e9"/><text x="120" y="215" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
  <text x="150" y="210" fill="#e2e8f0" font-size="14" font-weight="700">启动 API（dev watch 模式，跳过 nest build）</text>
  <text x="150" y="232" fill="#94a3b8" font-size="11">pnpm --filter @sagent/api dev → nest start --watch</text>
  <text x="150" y="252" fill="#38bdf8" font-size="10">✦ 增量 TypeScript 编译 — 改代码自动热重启</text>
  <text x="150" y="268" fill="#38bdf8" font-size="10">✦ 省掉全量 nest build（原需 15-40s）</text>

  <!-- Arrow -->
  <line x1="480" y1="280" x2="480" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 3 -->
  <rect x="80" y="304" width="800" height="100" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="80" y="304" width="6" height="100" rx="3" fill="url(#s3)"/>
  <circle cx="120" cy="334" r="16" fill="#f97316"/><text x="120" y="339" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <text x="150" y="334" fill="#e2e8f0" font-size="14" font-weight="700">启动 Web（next dev --turbopack）</text>
  <text x="150" y="356" fill="#94a3b8" font-size="11">pnpm --filter @sagent/web dev → next dev -H 0.0.0.0 --turbopack</text>
  <text x="150" y="376" fill="#fb923c" font-size="10">✦ Turbopack 增量编译 — 比 webpack 快 10-700 倍</text>
  <text x="150" y="392" fill="#fb923c" font-size="10">✦ 端口 4000，自动代理 /api → localhost:4001</text>

  <!-- Arrow -->
  <line x1="480" y1="404" x2="480" y2="424" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 4 -->
  <rect x="80" y="428" width="800" height="100" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="80" y="428" width="6" height="100" rx="3" fill="url(#s4)"/>
  <circle cx="120" cy="458" r="16" fill="#10b981"/><text x="120" y="463" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <text x="150" y="458" fill="#e2e8f0" font-size="14" font-weight="700">轮询等待服务就绪（最长 180s）</text>
  <text x="150" y="480" fill="#94a3b8" font-size="11">netstat 检测 4001 / 4000 端口 LISTENING</text>
  <text x="150" y="500" fill="#34d399" font-size="10">✦ API ready → Web ready → 自动打开浏览器 http://localhost:4000</text>
  <text x="150" y="516" fill="#34d399" font-size="10">✦ Swagger 文档: http://localhost:4001/docs</text>
</svg>
