  <rect x="484" y="274" width="215" height="180" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="484" y="274" width="215" height="6" rx="3" fill="url(#m7)"/>
  <text x="591" y="302" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">七、质量、安全与避坑</text>
  <text x="504" y="322" fill="#94a3b8" font-size="10">• AI 代码评审清单</text>
  <text x="504" y="338" fill="#94a3b8" font-size="10">• 幻觉识别与修复</text>
  <text x="504" y="354" fill="#94a3b8" font-size="10">• 安全漏洞防范</text>
  <text x="504" y="370" fill="#94a3b8" font-size="10">• 性能优化 / 依赖管理</text>
  <text x="504" y="386" fill="#94a3b8" font-size="10">• TDD 流程</text>
  <rect x="496" y="398" width="50" height="18" rx="4" fill="#ef4444" opacity=".3"/><text x="521" y="411" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">D3-D4</text>
  <text x="554" y="411" fill="#ef4444" font-size="9">不翻车的关键</text>

  <rect x="711" y="274" width="215" height="180" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="711" y="274" width="215" height="6" rx="3" fill="url(#m8)"/>
  <text x="818" y="302" text-anchor="middle" fill="#5eead4" font-size="13" font-weight="700">八、实战项目</text>
  <text x="731" y="322" fill="#94a3b8" font-size="10">• 入门级 (纯前端)</text>
