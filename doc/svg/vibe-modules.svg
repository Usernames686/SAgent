  <rect width="960" height="520" fill="#0f172a" rx="16"/>
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">氛围编程八大知识模块</text>
  <text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="12">Vibe Coding Knowledge Modules — 认知思维 → 工具链 → Prompt → 代码阅读 → 全栈工程 → AI高级 → 质量安全 → 实战项目</text>

