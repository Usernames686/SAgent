  <text x="731" y="172" fill="#94a3b8" font-size="10">• 幻觉排查 / 结构判断</text>
  <text x="731" y="188" fill="#94a3b8" font-size="10">• React/Vue 概念级理解</text>
  <rect x="723" y="200" width="50" height="18" rx="4" fill="#10b981" opacity=".3"/><text x="748" y="213" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">D1-D3</text>
  <text x="781" y="213" fill="#10b981" font-size="9">能读能改能调</text>

  <!-- Row 2 -->
  <rect x="30" y="274" width="215" height="180" rx="12" fill="#1e293b" filter="url(#sh)"/>
