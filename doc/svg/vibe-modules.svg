  <text x="731" y="354" fill="#94a3b8" font-size="10">• 高级 (全栈+AI+部署)</text>
  <text x="731" y="370" fill="#94a3b8" font-size="10">• AI 聊天 / RAG 知识库</text>
  <text x="731" y="386" fill="#94a3b8" font-size="10">• 带支付的全栈应用</text>
  <rect x="723" y="398" width="50" height="18" rx="4" fill="#14b8a6" opacity=".3"/><text x="748" y="411" text-anchor="middle" fill="#5eead4" font-size="9" font-weight="600">D2-D4</text>
