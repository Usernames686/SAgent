  <text x="50" y="124" fill="#94a3b8" font-size="10">• Vibe Coding 范式理解</text>
  <text x="50" y="140" fill="#94a3b8" font-size="10">• 氛围(Vibe)抽象能力</text>
  <text x="50" y="156" fill="#94a3b8" font-size="10">• 产品化思维</text>
  <text x="50" y="172" fill="#94a3b8" font-size="10">• 人机协作思维</text>
  <text x="50" y="188" fill="#94a3b8" font-size="10">• 氛围描述黄金公式</text>
  <rect x="42" y="200" width="50" height="18" rx="4" fill="#6366f1" opacity=".3"/><text x="67" y="213" text-anchor="middle" fill="#a5b4fc" font-size="9" font-weight="600">D1-D3</text>
  <text x="100" y="213" fill="#6366f1" font-size="9">决定上限</text>

  <rect x="257" y="76" width="215" height="180" rx="12" fill="#1e293b" filter="url(#sh)"/>
