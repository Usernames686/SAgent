  <text x="364" y="104" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">二、工具链</text>
  <text x="277" y="124" fill="#94a3b8" font-size="10">• AI IDE (Cursor/Claude Code)</text>
