<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050210"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- 4个统计卡片 -->
  <rect x="24" y="24" width="210" height="88" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="40" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">🎯 总进度</text>
  <text x="40" y="78" font-size="28" font-weight="900" fill="#f97316">42%</text>
  <text x="40" y="96" font-size="9" fill="#ffffff" fill-opacity="0.2">29/69 知识点</text>

  <rect x="248" y="24" width="210" height="88" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="264" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">🔥 学习天数</text>
  <text x="264" y="78" font-size="28" font-weight="900" fill="#ef4444">12</text>
  <text x="264" y="96" font-size="9" fill="#ffffff" fill-opacity="0.2">累计学习</text>

  <rect x="472" y="24" width="210" height="88" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="488" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">🕐 学习时长</text>
  <text x="488" y="78" font-size="28" font-weight="900" fill="#3b82f6">8h30m</text>
  <text x="488" y="96" font-size="9" fill="#ffffff" fill-opacity="0.2">累计投入</text>

  <rect x="696" y="24" width="180" height="88" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="712" y="48" font-size="10" fill="#ffffff" fill-opacity="0.3">🏆 精通数</text>
  <text x="712" y="78" font-size="28" font-weight="900" fill="#eab308">15</text>
  <text x="712" y="96" font-size="9" fill="#ffffff" fill-opacity="0.2">熟练 8 · 学习中 6</text>

  <!-- 总体进度条 -->
  <rect x="24" y="130" width="852" height="64" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="44" y="152" font-size="11" font-weight="600" fill="#ffffff" fill-opacity="0.5">📈 总体学习进度</text>
  <text x="848" y="152" font-size="11" font-weight="700" fill="url(#accentGrad)" text-anchor="end">42%</text>
  <rect x="44" y="162" width="812" height="10" rx="5" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="44" y="162" width="341" height="10" rx="5" fill="url(#accentGrad)"/>

  <!-- 分阶段进度 -->
  <rect x="24" y="210" width="852" height="300" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="44" y="238" font-size="11" font-weight="600" fill="#ffffff" fill-opacity="0.5">📊 分阶段进度</text>

  <!-- P1 -->
  <rect x="44" y="256" width="24" height="24" rx="6" fill="url(#phase1)"/>
  <text x="56" y="272" font-size="9" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="80" y="268" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.7">🧱 基础夯实</text>
  <text x="780" y="268" font-size="10" fill="#ffffff" fill-opacity="0.25" text-anchor="end">8/14</text>
  <rect x="840" y="260" width="24" height="14" rx="3" fill="#3b82f6" fill-opacity="0.1"/>
  <text x="852" y="270" font-size="8" font-weight="700" fill="#3b82f6" text-anchor="middle">均72</text>
  <rect x="80" y="280" width="788" height="8" rx="4" fill="#ffffff" fill-opacity="0.03"/>
  <rect x="80" y="280" width="449" height="8" rx="4" fill="url(#phase1)"/>

  <!-- P2 -->
  <rect x="44" y="304" width="24" height="24" rx="6" fill="url(#phase2)"/>
  <text x="56" y="320" font-size="9" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="80" y="316" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.4">⚡ 进阶突破</text>
  <text x="780" y="316" font-size="10" fill="#ffffff" fill-opacity="0.25" text-anchor="end">4/27</text>
  <rect x="80" y="328" width="788" height="8" rx="4" fill="#ffffff" fill-opacity="0.03"/>
  <rect x="80" y="328" width="118" height="8" rx="4" fill="url(#phase2)"/>

  <!-- P3 -->
  <rect x="44" y="352" width="24" height="24" rx="6" fill="#ffffff" fill-opacity="0.04"/>
  <text x="56" y="368" font-size="9" font-weight="700" fill="#ffffff" fill-opacity="0.3" text-anchor="middle">3</text>
  <text x="80" y="364" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.25">🏗️ 框架实战</text>
  <rect x="80" y="376" width="788" height="8" rx="4" fill="#ffffff" fill-opacity="0.03"/>
  <rect x="80" y="376" width="44" height="8" rx="4" fill="url(#phase3)"/>

  <!-- P4 -->
  <rect x="44" y="400" width="24" height="24" rx="6" fill="#ffffff" fill-opacity="0.03"/>
  <text x="56" y="416" font-size="9" font-weight="700" fill="#ffffff" fill-opacity="0.2" text-anchor="middle">4</text>
  <text x="80" y="412" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.2">🔧 工程规范</text>
  <rect x="80" y="424" width="788" height="8" rx="4" fill="#ffffff" fill-opacity="0.03"/>

  <!-- P5 -->
  <rect x="44" y="448" width="24" height="24" rx="6" fill="#ffffff" fill-opacity="0.03"/>
  <text x="56" y="464" font-size="9" font-weight="700" fill="#ffffff" fill-opacity="0.2" text-anchor="middle">5</text>
  <text x="80" y="460" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.2">🎓 精通掌握</text>
  <rect x="80" y="472" width="788" height="8" rx="4" fill="#ffffff" fill-opacity="0.03"/>

  <!-- 掌握度分布柱状图 -->
  <rect x="24" y="526" width="852" height="150" rx="16" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="44" y="554" font-size="11" font-weight="600" fill="#ffffff" fill-opacity="0.5">📚 掌握度分布</text>

  <rect x="100" y="590" width="120" height="60" rx="4" fill="#22c55e" fill-opacity="0.6"/>
  <text x="160" y="625" font-size="14" font-weight="700" fill="white" text-anchor="middle">15</text>
  <text x="160" y="660" font-size="9" fill="#ffffff" fill-opacity="0.25" text-anchor="middle">精通</text>

  <rect x="280" y="610" width="120" height="40" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
  <text x="340" y="635" font-size="14" font-weight="700" fill="white" text-anchor="middle">8</text>
  <text x="340" y="660" font-size="9" fill="#ffffff" fill-opacity="0.25" text-anchor="middle">熟练</text>

  <rect x="460" y="625" width="120" height="25" rx="4" fill="#f97316" fill-opacity="0.6"/>
  <text x="520" y="642" font-size="14" font-weight="700" fill="white" text-anchor="middle">6</text>
  <text x="520" y="660" font-size="9" fill="#ffffff" fill-opacity="0.25" text-anchor="middle">学习中</text>

  <rect x="640" y="638" width="120" height="12" rx="4" fill="#ffffff" fill-opacity="0.1"/>
  <text x="700" y="648" font-size="14" font-weight="700" fill="#ffffff" fill-opacity="0.3" text-anchor="middle">40</text>
  <text x="700" y="660" font-size="9" fill="#ffffff" fill-opacity="0.25" text-anchor="middle">未开始</text>
</svg>